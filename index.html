// Modal close
Q('moClose').addEventListener('click',function(){UI.closeModal()});

Q('pnX').addEventListener('click',function(){UI.closePanel()});

// Keyboard
document.addEventListener('keydown',function(e){
  if(!S.on)return;
  var tag=e.target.tagName;if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
  if(e.key===' '||e.code==='Space'){e.preventDefault();G.spd(S.sp===0?1:0)}
  if(e.key==='Escape'){if(Q('ov').classList.contains('on'))UI.closeModal();else if(Q('pn').classList.contains('op'))UI.closePanel();else UI.toMenu()}
  if(e.key>='1'&&e.key<='4')G.spd(parseInt(e.key)-1);
});
