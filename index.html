  const now=Date.now();

    const a=S.as[i],b=S.as[j];if(a.fid===b.fid)continue;if(Math.hypot(a.x-b.x,a.y-b.y)>25)continue;

// Generic CRUD helper
_crud(title,lsKey,defaults,fields,listRender){
  const data=LS.get(lsKey)||J(defaults);
  const save=()=>LS.set(lsKey,data);
  const refresh=()=>this._crud(title,lsKey,data,fields,listRender);
  let h=`<div class="sb"><input class="fi" placeholder="搜索..." oninput="UI.fl(this,'crud_list')"><button class="b bp" id="crud_add">+ 新建</button></div><div id="crud_list">`;
  data.forEach((item,i)=>{h+=`<div class="li" data-s="${E(listRender(item))}"><div class="li-i"><div class="li-n">${listRender(item)}</div></div><div class="li-a"><button class="b bxs bs" data-action="edit" data-idx="${i}">✏</button><button class="b bxs bd" data-action="del" data-idx="${i}">✕</button></div></div>`});
  h+='</div>';
  this.modal(title,h,`<button class="b bs" onclick="UI.closeModal()">关闭</button>`,true);
  // Bind events
  $('crud_add').onclick=()=>{const nw={id:U()};fields.forEach(f=>{nw[f.key]=f.def});data.push(nw);save();this.closeModal();refresh()};
  document.querySelectorAll('[data-action="edit"]').forEach(btn=>{btn.onclick=e=>{e.stopPropagation();const idx=+btn.dataset.idx;this._crudEdit(data,idx,fields,save,refresh)}});
  document.querySelectorAll('[data-action="del"]').forEach(btn=>{btn.onclick=e=>{e.stopPropagation();if(!confirm('删除？'))return;data.splice(+btn.dataset.idx,1);save();this.closeModal();refresh()}});
},
_crudEdit(data,idx,fields,save,refresh){
  const item=data[idx];
  let h='';fields.forEach(f=>{
    if(f.type==='text')h+=`<div class="fr"><label class="fl">${f.label}</label><input class="fi" id="cf_${f.key}" value="${E(String(item[f.key]||''))}"></div>`;
    else if(f.type==='number')h+=`<div class="fr"><label class="fl">${f.label}</label><input type="number" class="fi" id="cf_${f.key}" value="${item[f.key]||0}"></div>`;
    else if(f.type==='textarea')h+=`<div class="fr"><label class="fl">${f.label}</label><textarea class="ft" id="cf_${f.key}">${E(String(item[f.key]||''))}</textarea></div>`;
    else if(f.type==='select')h+=`<div class="fr"><label class="fl">${f.label}</label><select class="fsel" id="cf_${f.key}">${f.options.map(o=>`<option value="${o}"${o===(item[f.key]||'')?' selected':''}>${o}</option>`).join('')}</select></div>`;
  });
  this.modal('编辑',h,`<button class="b bs" onclick="UI.closeModal()">取消</button><button class="b bp" id="crud_save">保存</button>`);
  $('crud_save').onclick=()=>{fields.forEach(f=>{const el=$('cf_'+f.key);if(!el)return;if(f.type==='number')item[f.key]=+el.value;else item[f.key]=el.value});save();this.closeModal();refresh()};
},

},
mapUpload(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{this._es.map=e.target.result;this.stab('b')};r.readAsDataURL(f)},
editSF(i){const f=this._es.fs[i];$('stc').innerHTML=`<div class="fr"><label class="fl">名称</label><input class="fi" id="sf_n" value="${E(f.name)}"></div><div class="fr"><label class="fl">颜色</label><input type="color" id="sf_c" value="${f.col}"></div><div class="fr"><label class="fl">金币</label><input type="number" class="fi fi-s" id="sf_g" value="${f.gold||1000}"></div><div class="fr"><label class="fl">旗帜色(逗号HEX)</label><input class="fi" id="sf_f" value="${(f.fc||[]).join(',')}"></div><div style="margin-top:.5rem"><button class="b bs" onclick="UI.stab('f')">取消</button> <button class="b bp" onclick="const f=UI._es.fs[${i}];f.name=$('sf_n').value;f.col=$('sf_c').value;f.gold=+$('sf_g').value||1000;f.fc=$('sf_f').value.split(',').map(s=>s.trim()).filter(Boolean);UI.stab('f')">保存</button></div>`},
editSC(i){const ct=this._es.cs[i],s=this._es;$('stc').innerHTML=`<div class="fr"><label class="fl">名称</label><input class="fi" id="sc_n" value="${E(ct.name)}"></div><div class="frr"><div class="fr"><label class="fl">X</label><input type="number" class="fi" id="sc_x" value="${Math.round(ct.x)}"></div><div class="fr"><label class="fl">Y</label><input type="number" class="fi" id="sc_y" value="${Math.round(ct.y)}"></div></div><div class="frr"><div class="fr"><label class="fl">人口</label><input type="number" class="fi" id="sc_p" value="${ct.pop}"></div><div class="fr"><label class="fl">经济</label><input type="number" class="fi" id="sc_e" value="${ct.eco}"></div></div><div class="frr"><div class="fr"><label class="fl">防御</label><input type="number" class="fi" id="sc_d" value="${ct.def}"></div><div class="fr"><label class="fl">驻军</label><input type="number" class="fi" id="sc_g" value="${ct.gar||0}"></div></div><div class="fr"><label class="fl">派系</label><select class="fsel" id="sc_f"><option value="">无</option>${s.fs.map(f=>`<option value="${f.id}"${f.id===ct.fid?' selected':''}>${E(f.name)}</option>`).join('')}</select></div><div style="margin-top:.5rem"><button class="b bs" onclick="UI.stab('c')">取消</button> <button class="b bp" onclick="const c=UI._es.cs[${i}];c.name=$('sc_n').value;c.x=+$('sc_x').value;c.y=+$('sc_y').value;c.pop=+$('sc_p').value;c.eco=+$('sc_e').value;c.def=+$('sc_d').value;c.gar=+$('sc_g').value;c.fid=$('sc_f').value;UI.stab('c')">保存</button></div>`},
editSCh(i){const ch=this._es.ch[i],s=this._es;$('stc').innerHTML=`<div class="fr"><label class="fl">名称</label><input class="fi" id="sch_n" value="${E(ch.name)}"></div><div class="fr"><label class="fl">派系</label><select class="fsel" id="sch_f"><option value="">无</option>${s.fs.map(f=>`<option value="${f.id}"${f.id===ch.fid?' selected':''}>${E(f.name)}</option>`).join('')}</select></div><div class="fr"><label class="fl">职位</label><input class="fi" id="sch_r" value="${E(ch.role||'')}"></div><div class="frr"><div class="fr"><label class="fl">统率</label><input type="number" class="fi" id="sch_c" value="${ch.sk?.c||50}"></div><div class="fr"><label class="fl">政治</label><input type="number" class="fi" id="sch_a" value="${ch.sk?.a||50}"></div><div class="fr"><label class="fl">外交</label><input type="number" class="fi" id="sch_d" value="${ch.sk?.d||50}"></div></div><div style="margin-top:.5rem"><button class="b bs" onclick="UI.stab('ch')">取消</button> <button class="b bp" onclick="const c=UI._es.ch[${i}];c.name=$('sch_n').value;c.fid=$('sch_f').value;c.role=$('sch_r').value;c.sk={c:CL(+$('sch_c').value,0,100),a:CL(+$('sch_a').value,0,100),d:CL(+$('sch_d').value,0,100)};UI.stab('ch')">保存</button></div>`},
svScen(){const s=this._es;s.name=$('se_n')?.value||s.name;s.sy=+$('se_y')?.value||s.sy;const scs=LS.get('scenarios')||[];if(this._esi>=0)scs[this._esi]=s;else scs.push(s);LS.set('scenarios',scs);this.closeModal();this.scenarioEditor()},
useScen(i){const scs=LS.get('scenarios')||[];this.closeModal();this.scenSetup(J(scs[i]))},
delScen(i){if(!confirm('删除？'))return;const scs=LS.get('scenarios')||[];scs.splice(i,1);LS.set('scenarios',scs);this.scenarioEditor()},

startGame(){this.scenarioEditor()},
saveManager(){const keys=LS.keys('sv_');let h=`<div class="sb"><input class="fi" placeholder="搜索..." oninput="UI.fl(this,'svl')"></div><div id="svl">`;if(!keys.length)h+='<div class="empty">暂无存档</div>';keys.forEach(k=>{const d=LS.get(k);if(!d)return;h+=`<div class="li" data-s="${E(d._n||k)}"><div class="li-i"><div class="li-n">${E(d._n||k)}</div><div class="li-d">${d._d||''}</div></div><div class="li-a"><button class="b bsm bp" onclick="UI.closeModal();G.load('${k}')">读取</button><button class="b bsm bd" onclick="LS.del('${k}');UI.closeModal();UI.saveManager()">删除</button></div></div>`});h+='</div>';this.modal('存档管理',h)},

// CRUD Editors for custom data
techEditor(){this._crud('科技树','custom_tech',D_TECH[0].techs.length?D_TECH:D_TECH,
  [{key:'era',label:'时代',type:'text',def:'新时代'}],
  item=>item.era+' ('+item.techs.length+'科技)')},
cultureEditor(){this._crud('民族文化','custom_cul',D_CUL,
  [{key:'name',label:'名称',type:'text',def:'新文化'},{key:'desc',label:'描述',type:'textarea',def:''}],
  item=>item.name)},
charEditor(){this._crud('重要人物','custom_char',D_CHAR,
  [{key:'name',label:'名称',type:'text',def:'新人物'},{key:'cul',label:'文化',type:'text',def:''},{key:'desc',label:'描述',type:'textarea',def:''}],
  item=>item.name)},
unitEditor(){this._crud('兵种','custom_unit',D_UNIT,
  [{key:'name',label:'名称',type:'text',def:'新兵种'},{key:'cul',label:'文化',type:'text',def:'通用'},{key:'tp',label:'类型',type:'select',def:'land',options:['land','naval','air']},{key:'atk',label:'攻击',type:'number',def:5},{key:'def',label:'防御',type:'number',def:5},{key:'cost',label:'费用',type:'number',def:20},{key:'up',label:'维护',type:'number',def:2}],
  item=>`${item.name} [${item.cul||'通用'}]`)},

toMenu(){if(S.on&&!confirm('返回？未保存进度将丢失'))return;S.on=false;if(G.iv)clearInterval(G.iv);$('game').classList.remove('on');$('menu').style.display='';this.closePanel()},
};

// ==== KEYBOARD ====
document.addEventListener('keydown',e=>{
  if(!S.on)return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key===' '||e.code==='Space'){e.preventDefault();G.spd(S.sp===0?1:0)}
  if(e.key==='Escape'){if($('ov').classList.contains('on'))UI.closeModal();else if($('pn').classList.contains('op'))UI.closePanel();else UI.toMenu()}
  if(e.key>='1'&&e.key<='4')G.spd(+e.key-1);
});

// ==== INIT ====
M.init();
</script>
</body></html>
