<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>铁与王冠 — 万世征途</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap');

:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-panel: #1a2235;
  --bg-card: #1e293b;
  --bg-hover: #263044;
  --border: #2d3a4f;
  --border-active: #4a7c9b;
  --text-primary: #e8e0d4;
  --text-secondary: #9ca3af;
  --text-dim: #6b7280;
  --accent-gold: #c9a84c;
  --accent-red: #b44040;
  --accent-blue: #3b82a0;
  --accent-green: #4a8c5c;
  --accent-purple: #7c5cbf;
  --accent-orange: #c47830;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg-primary); color:var(--text-primary); font-family:'Noto Serif SC',serif; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg-secondary); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--border-active); }

/* ===== MAIN MENU ===== */
#mainMenu {
  position:fixed; inset:0; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background: linear-gradient(180deg, #060a12 0%, #0d1520 40%, #15202e 100%);
  overflow:hidden;
}
#mainMenu::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 80% 50% at 50% 30%, rgba(201,168,76,0.06) 0%, transparent 70%);
  pointer-events:none;
}
.menu-title {
  font-family:'Ma Shan Zheng',cursive;
  font-size:clamp(2.5rem,6vw,5rem);
  color:var(--accent-gold);
  text-shadow: 0 0 40px rgba(201,168,76,0.3), 0 4px 12px rgba(0,0,0,0.8);
  letter-spacing:0.15em;
  margin-bottom:0.2em;
  position:relative; z-index:1;
}
.menu-subtitle {
  font-size:clamp(0.8rem,1.5vw,1.1rem);
  color:var(--text-dim);
  letter-spacing:0.4em;
  margin-bottom:3rem;
  position:relative; z-index:1;
}
.menu-buttons {
  display:flex; flex-direction:column; gap:0.7rem;
  position:relative; z-index:1; width:clamp(240px,30vw,360px);
}
.menu-btn {
  background: linear-gradient(135deg, rgba(26,34,53,0.9), rgba(30,41,59,0.9));
  border:1px solid var(--border);
  color:var(--text-primary);
  padding:0.9rem 1.5rem;
  font-family:'Noto Serif SC',serif;
  font-size:clamp(0.85rem,1.2vw,1rem);
  cursor:pointer;
  transition:all 0.3s;
  letter-spacing:0.1em;
  text-align:left;
  position:relative;
  overflow:hidden;
}
.menu-btn::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--accent-gold); transform:scaleY(0); transition:transform 0.3s;
}
.menu-btn:hover {
  background: linear-gradient(135deg, rgba(38,48,68,0.95), rgba(42,55,75,0.95));
  border-color:var(--border-active);
  transform:translateX(4px);
}
.menu-btn:hover::before { transform:scaleY(1); }
.menu-btn .btn-icon { margin-right:0.8rem; opacity:0.6; }
.menu-btn-sub { font-size:0.7rem; color:var(--text-dim); display:block; margin-top:2px; }

/* Version tag */
.version-tag {
  position:absolute; bottom:1.5rem; right:2rem;
  font-size:0.7rem; color:var(--text-dim); letter-spacing:0.2em;
}

/* ===== MODAL / EDITOR SYSTEM ===== */
.modal-overlay {
  position:fixed; inset:0; z-index:10000;
  background:rgba(0,0,0,0.75); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.modal-overlay.active { opacity:1; pointer-events:auto; }
.modal {
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:4px;
  width:clamp(400px,70vw,900px);
  max-height:85vh;
  display:flex; flex-direction:column;
  box-shadow:var(--shadow);
}
.modal-wide { width:clamp(500px,85vw,1200px); }
.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:1rem 1.5rem;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.modal-header h2 {
  font-size:1.1rem; font-weight:700;
  color:var(--accent-gold); letter-spacing:0.08em;
}
.modal-close {
  background:none; border:none; color:var(--text-dim);
  font-size:1.3rem; cursor:pointer; padding:0.2rem 0.5rem;
  transition:color 0.2s;
}
.modal-close:hover { color:var(--accent-red); }
.modal-body {
  padding:1.5rem;
  overflow-y:auto;
  flex:1;
}
.modal-footer {
  padding:1rem 1.5rem;
  border-top:1px solid var(--border);
  display:flex; gap:0.5rem; justify-content:flex-end;
  flex-shrink:0;
}

/* ===== FORM ELEMENTS ===== */
.form-row { margin-bottom:1rem; }
.form-label {
  display:block; font-size:0.8rem; color:var(--text-secondary);
  margin-bottom:0.4rem; letter-spacing:0.05em;
}
.form-input, .form-select, .form-textarea {
  width:100%;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  color:var(--text-primary);
  padding:0.6rem 0.8rem;
  font-family:'Noto Serif SC',serif;
  font-size:0.85rem;
  border-radius:2px;
  transition:border-color 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline:none; border-color:var(--accent-gold);
}
.form-textarea { min-height:80px; resize:vertical; }
.form-input-sm { width:120px; display:inline-block; }
.form-row-inline { display:flex; gap:1rem; flex-wrap:wrap; }
.form-row-inline .form-row { flex:1; min-width:120px; margin-bottom:0; }

/* Buttons */
.btn {
  padding:0.5rem 1.2rem;
  font-family:'Noto Serif SC',serif;
  font-size:0.8rem;
  border:1px solid var(--border);
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.05em;
  border-radius:2px;
}
.btn-primary {
  background:linear-gradient(135deg,var(--accent-gold),#a88a3a);
  color:#0a0e17; border-color:var(--accent-gold); font-weight:700;
}
.btn-primary:hover { filter:brightness(1.15); }
.btn-secondary {
  background:var(--bg-card); color:var(--text-primary);
}
.btn-secondary:hover { background:var(--bg-hover); border-color:var(--border-active); }
.btn-danger {
  background:rgba(180,64,64,0.15); color:var(--accent-red); border-color:var(--accent-red);
}
.btn-danger:hover { background:rgba(180,64,64,0.3); }
.btn-sm { padding:0.3rem 0.7rem; font-size:0.75rem; }
.btn-icon-only { padding:0.3rem 0.5rem; line-height:1; }

/* Tags / Chips */
.tag {
  display:inline-block; padding:0.15rem 0.5rem;
  font-size:0.7rem; border-radius:2px;
  background:var(--bg-hover); border:1px solid var(--border);
  color:var(--text-secondary);
}
.tag-gold { border-color:var(--accent-gold); color:var(--accent-gold); }

/* Searchbar */
.search-bar {
  display:flex; gap:0.5rem; margin-bottom:1rem;
}
.search-bar .form-input { flex:1; }

/* List items */
.list-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.7rem 1rem;
  background:var(--bg-card);
  border:1px solid var(--border);
  margin-bottom:0.4rem;
  transition:all 0.2s;
  border-radius:2px;
}
.list-item:hover { border-color:var(--border-active); background:var(--bg-hover); }
.list-item-info { flex:1; }
.list-item-name { font-size:0.9rem; font-weight:700; }
.list-item-desc { font-size:0.75rem; color:var(--text-dim); margin-top:2px; }
.list-item-actions { display:flex; gap:0.3rem; }

/* Tabs */
.tabs {
  display:flex; border-bottom:1px solid var(--border); margin-bottom:1rem;
}
.tab {
  padding:0.6rem 1.2rem;
  font-size:0.8rem;
  color:var(--text-dim);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all 0.2s;
  background:none; border-top:none; border-left:none; border-right:none;
  font-family:'Noto Serif SC',serif;
}
.tab:hover { color:var(--text-secondary); }
.tab.active { color:var(--accent-gold); border-bottom-color:var(--accent-gold); }

/* Grid layouts */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:0.8rem; }
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:0.6rem; }

/* ===== GAME UI ===== */
#gameUI {
  position:fixed; inset:0; display:none;
  background:var(--bg-primary);
}
#gameUI.active { display:block; }

/* Top Bar */
.game-topbar {
  position:absolute; top:0; left:0; right:0; height:48px;
  background:linear-gradient(180deg, rgba(10,14,23,0.95), rgba(10,14,23,0.8));
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 1rem;
  z-index:100; backdrop-filter:blur(8px);
}
.topbar-section { display:flex; align-items:center; gap:0.8rem; }
.topbar-left { flex:1; }
.topbar-center { flex:2; justify-content:center; }
.topbar-right { flex:1; justify-content:flex-end; }
.topbar-stat {
  display:flex; align-items:center; gap:0.3rem;
  font-size:0.78rem; color:var(--text-secondary);
  padding:0.2rem 0.6rem;
  background:rgba(255,255,255,0.03);
  border-radius:2px;
}
.topbar-stat .val { color:var(--accent-gold); font-weight:700; }
.topbar-faction {
  font-family:'Ma Shan Zheng',cursive;
  font-size:1.2rem; color:var(--accent-gold);
  letter-spacing:0.1em;
}
.time-display {
  font-size:0.8rem; color:var(--text-primary);
  font-variant-numeric:tabular-nums;
}
.speed-controls { display:flex; gap:2px; }
.speed-btn {
  background:var(--bg-card); border:1px solid var(--border);
  color:var(--text-dim); padding:0.15rem 0.5rem;
  font-size:0.7rem; cursor:pointer; transition:all 0.15s;
  font-family:monospace;
}
.speed-btn:hover, .speed-btn.active {
  color:var(--accent-gold); border-color:var(--accent-gold);
}

/* Map Container */
#mapContainer {
  position:absolute; top:48px; left:0; right:0; bottom:0;
  overflow:hidden; cursor:grab;
  background:#0d1926;
}
#mapContainer.dragging { cursor:grabbing; }
#mapCanvas {
  position:absolute;
  transform-origin:0 0;
}
#mapImage {
  display:block;
  image-rendering:auto;
  user-select:none;
  -webkit-user-drag:none;
}

/* City markers on map */
.city-marker {
  position:absolute;
  transform:translate(-50%,-50%);
  cursor:pointer;
  z-index:10;
  transition:transform 0.15s;
}
.city-marker:hover { transform:translate(-50%,-50%) scale(1.15); z-index:20; }
.city-dot {
  width:14px; height:14px;
  border-radius:50%;
  border:2px solid var(--accent-gold);
  background:var(--bg-primary);
  box-shadow:0 0 8px rgba(201,168,76,0.4);
  position:relative;
}
.city-dot.capital {
  width:20px; height:20px;
  border-width:3px;
  background:var(--accent-gold);
}
.city-label {
  position:absolute; top:100%; left:50%; transform:translateX(-50%);
  white-space:nowrap;
  font-size:0.65rem; color:var(--text-primary);
  text-shadow:0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.7);
  margin-top:3px; pointer-events:none;
  font-weight:700;
}

/* Army markers */
.army-marker {
  position:absolute;
  transform:translate(-50%,-50%);
  cursor:pointer; z-index:15;
  transition:left 0.5s linear, top 0.5s linear;
}
.army-icon {
  width:24px; height:24px;
  display:flex; align-items:center; justify-content:center;
  font-size:0.7rem;
  border-radius:3px;
  border:1px solid;
  box-shadow:0 2px 6px rgba(0,0,0,0.5);
  font-weight:700;
}
.army-count {
  position:absolute; top:-6px; right:-8px;
  font-size:0.55rem;
  background:var(--accent-red);
  color:#fff;
  padding:0 3px;
  border-radius:8px;
  min-width:14px;
  text-align:center;
  font-weight:700;
}

/* Bandit markers */
.bandit-marker {
  position:absolute;
  transform:translate(-50%,-50%);
  cursor:pointer; z-index:12;
}
.bandit-icon {
  width:18px; height:18px;
  display:flex; align-items:center; justify-content:center;
  font-size:0.65rem;
  background:rgba(80,30,30,0.8);
  border:1px solid #8b4040;
  border-radius:50%;
  box-shadow:0 0 6px rgba(139,64,64,0.4);
}

/* Side Panel */
.side-panel {
  position:absolute; top:48px; right:0; bottom:0;
  width:320px; max-width:40vw;
  background:var(--bg-panel);
  border-left:1px solid var(--border);
  z-index:50;
  display:flex; flex-direction:column;
  transform:translateX(100%);
  transition:transform 0.3s;
}
.side-panel.open { transform:translateX(0); }
.panel-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.8rem 1rem;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.panel-header h3 { font-size:0.95rem; color:var(--accent-gold); }
.panel-body { flex:1; overflow-y:auto; padding:1rem; }
.panel-section { margin-bottom:1.2rem; }
.panel-section-title {
  font-size:0.75rem; color:var(--text-dim);
  text-transform:uppercase; letter-spacing:0.1em;
  margin-bottom:0.5rem;
  padding-bottom:0.3rem;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.stat-row {
  display:flex; justify-content:space-between;
  padding:0.3rem 0;
  font-size:0.8rem;
}
.stat-row .label { color:var(--text-secondary); }
.stat-row .value { color:var(--text-primary); font-weight:700; }

/* Bottom toolbar */
.game-bottombar {
  position:absolute; bottom:1rem; left:50%; transform:translateX(-50%);
  display:flex; gap:0.4rem;
  z-index:100;
  background:rgba(10,14,23,0.85);
  padding:0.4rem;
  border:1px solid var(--border);
  border-radius:4px;
  backdrop-filter:blur(8px);
}
.toolbar-btn {
  width:40px; height:40px;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg-card);
  border:1px solid var(--border);
  color:var(--text-secondary);
  font-size:0.9rem;
  cursor:pointer;
  transition:all 0.15s;
  border-radius:2px;
  position:relative;
}
.toolbar-btn:hover { color:var(--accent-gold); border-color:var(--border-active); }
.toolbar-btn.active { color:var(--accent-gold); border-color:var(--accent-gold); background:rgba(201,168,76,0.1); }
.toolbar-btn .tooltip {
  position:absolute; bottom:110%; left:50%; transform:translateX(-50%);
  background:var(--bg-primary); border:1px solid var(--border);
  padding:0.2rem 0.5rem; font-size:0.65rem;
  white-space:nowrap; pointer-events:none;
  opacity:0; transition:opacity 0.15s;
  color:var(--text-secondary);
}
.toolbar-btn:hover .tooltip { opacity:1; }

/* Minimap */
.minimap {
  position:absolute; bottom:1rem; left:1rem;
  width:180px; height:110px;
  background:var(--bg-card);
  border:1px solid var(--border);
  z-index:100;
  overflow:hidden;
  border-radius:2px;
}
.minimap img { width:100%; height:100%; object-fit:cover; opacity:0.7; }
.minimap-viewport {
  position:absolute;
  border:1px solid var(--accent-gold);
  background:rgba(201,168,76,0.1);
  pointer-events:none;
}

/* Notification area */
.notifications {
  position:absolute; top:56px; right:8px;
  z-index:200; width:280px;
  display:flex; flex-direction:column; gap:0.3rem;
}
.notification {
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-left:3px solid var(--accent-gold);
  padding:0.6rem 0.8rem;
  font-size:0.75rem;
  animation:slideIn 0.3s ease-out, fadeOut 0.5s 4s forwards;
  border-radius:2px;
}
.notification.war { border-left-color:var(--accent-red); }
.notification.peace { border-left-color:var(--accent-green); }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
@keyframes fadeOut { to { opacity:0; transform:translateY(-10px); } }

/* ===== TECH TREE VISUAL ===== */
.tech-tree-container {
  width:100%; overflow:auto;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  border-radius:2px;
  padding:1rem;
  min-height:300px;
  position:relative;
}
.tech-era {
  margin-bottom:1.5rem;
}
.tech-era-label {
  font-size:0.75rem; color:var(--accent-gold);
  letter-spacing:0.15em; margin-bottom:0.6rem;
  text-transform:uppercase;
  padding-bottom:0.3rem;
  border-bottom:1px solid rgba(201,168,76,0.2);
}
.tech-nodes { display:flex; flex-wrap:wrap; gap:0.5rem; }
.tech-node {
  background:var(--bg-card);
  border:1px solid var(--border);
  padding:0.5rem 0.8rem;
  font-size:0.75rem;
  cursor:pointer;
  transition:all 0.2s;
  border-radius:2px;
  min-width:100px;
  position:relative;
}
.tech-node:hover { border-color:var(--border-active); }
.tech-node.researched { border-color:var(--accent-green); background:rgba(74,140,92,0.1); }
.tech-node.researching { border-color:var(--accent-blue); background:rgba(59,130,160,0.1); }
.tech-node.locked { opacity:0.5; }
.tech-node-name { font-weight:700; }
.tech-node-cost { font-size:0.65rem; color:var(--text-dim); }
.tech-progress {
  position:absolute; bottom:0; left:0; height:2px;
  background:var(--accent-blue);
  transition:width 0.3s;
}

/* ===== FLAG EDITOR ===== */
.flag-preview {
  width:80px; height:54px;
  border:1px solid var(--border);
  display:flex; overflow:hidden;
}
.flag-stripe { flex:1; }
.flag-editor-colors {
  display:flex; gap:0.3rem; flex-wrap:wrap; margin-top:0.5rem;
}
.flag-color-btn {
  width:24px; height:24px;
  border:2px solid transparent;
  cursor:pointer;
  border-radius:2px;
  transition:border-color 0.15s;
}
.flag-color-btn:hover, .flag-color-btn.active { border-color:#fff; }

/* ===== DRAG & DROP HIERARCHY ===== */
.hierarchy-tree {
  padding:0.5rem;
  min-height:100px;
}
.hierarchy-node {
  background:var(--bg-card);
  border:1px solid var(--border);
  padding:0.5rem 0.8rem;
  margin:0.3rem 0;
  cursor:grab;
  font-size:0.8rem;
  display:flex; align-items:center; gap:0.5rem;
  border-radius:2px;
  transition:all 0.15s;
}
.hierarchy-node:active { cursor:grabbing; }
.hierarchy-node.dragging { opacity:0.5; border-style:dashed; }
.hierarchy-node.drag-over { border-color:var(--accent-gold); background:rgba(201,168,76,0.05); }
.hierarchy-children {
  margin-left:1.5rem;
  border-left:1px dashed var(--border);
  padding-left:0.5rem;
}
.hierarchy-handle { color:var(--text-dim); cursor:grab; }

/* Context Menu */
.context-menu {
  position:fixed; z-index:10001;
  background:var(--bg-panel); border:1px solid var(--border);
  min-width:160px; box-shadow:var(--shadow);
  display:none; border-radius:2px;
}
.context-menu.visible { display:block; }
.context-menu-item {
  padding:0.5rem 1rem;
  font-size:0.8rem;
  cursor:pointer;
  transition:background 0.1s;
  display:flex; align-items:center; gap:0.5rem;
}
.context-menu-item:hover { background:var(--bg-hover); }
.context-menu-sep { height:1px; background:var(--border); margin:0.2rem 0; }

/* Loading overlay for game init */
.loading-overlay {
  position:fixed; inset:0; z-index:99999;
  background:var(--bg-primary);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:1rem;
}
.loading-text {
  font-family:'Ma Shan Zheng',cursive;
  font-size:1.5rem; color:var(--accent-gold);
  animation:pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
.loading-bar {
  width:200px; height:3px;
  background:var(--border);
  border-radius:2px;
  overflow:hidden;
}
.loading-bar-inner {
  height:100%; width:0;
  background:var(--accent-gold);
  transition:width 0.3s;
}

/* Tooltip */
.game-tooltip {
  position:fixed; z-index:10002;
  background:var(--bg-primary);
  border:1px solid var(--border);

const Storage = {
  save(key, data) {
    try { localStorage.setItem('ironCrown_'+key, JSON.stringify(data)); return true; }
    catch(e) { console.warn('Save failed',e); return false; }
  },
  load(key) {
    try { const d = localStorage.getItem('ironCrown_'+key); return d ? JSON.parse(d) : null; }
    catch(e) { return null; }
  },
  delete(key) { localStorage.removeItem('ironCrown_'+key); },
  listSaves() {
    const saves = [];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k.startsWith('ironCrown_save_')){
        try {
          const d = JSON.parse(localStorage.getItem(k));
          saves.push({key:k.replace('ironCrown_',''), name:d._saveName||k, date:d._saveDate||'', faction:d.playerFaction});
        } catch(e){}
      }
    }
    return saves;
  },
};

const MapCtrl = {
  scale: 1,
  offsetX: 0,
  offsetY: 0,
  isDragging: false,
  lastX: 0,
  lastY: 0,
  imgW: 0,
  imgH: 0,

  init() {
    const container = $('mapContainer');
    const img = $('mapImage');
    
    container.addEventListener('mousedown', e => {
      if(e.button===2) return;
      this.isDragging = true;
      this.lastX = e.clientX;
      this.lastY = e.clientY;
      container.classList.add('dragging');
    });
    window.addEventListener('mousemove', e => {
      if(!this.isDragging) return;
      const dx = e.clientX - this.lastX;
      const dy = e.clientY - this.lastY;
      this.lastX = e.clientX;
      this.lastY = e.clientY;
      this.offsetX += dx;
      this.offsetY += dy;
      this.applyTransform();
    });
    window.addEventListener('mouseup', () => {
      this.isDragging = false;
      container.classList.remove('dragging');
    });
    container.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = container.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const oldScale = this.scale;
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      this.scale = clamp(this.scale * delta, 0.2, 5);
      const ratio = this.scale / oldScale;
      this.offsetX = mx - (mx - this.offsetX) * ratio;
      this.offsetY = my - (my - this.offsetY) * ratio;
      this.applyTransform();
    });

    // Right-click for placing things
    container.addEventListener('contextmenu', e => {
      e.preventDefault();
      const rect = container.getBoundingClientRect();
      const mapX = (e.clientX - rect.left - this.offsetX) / this.scale;
      const mapY = (e.clientY - rect.top - this.offsetY) / this.scale;
      UI.showMapContextMenu(e.clientX, e.clientY, mapX, mapY);
    });

    img.onload = () => {
      this.imgW = img.naturalWidth;
      this.imgH = img.naturalHeight;
      // Center map
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      this.scale = Math.min(cw / this.imgW, ch / this.imgH) * 0.9;
      this.offsetX = (cw - this.imgW * this.scale) / 2;
      this.offsetY = (ch - this.imgH * this.scale) / 2;
      this.applyTransform();
      // Minimap
      $('minimapImg').src = img.src;
    };
  },

  loadMap(src) {
    $('mapImage').src = src;
  },

  applyTransform() {
    const canvas = $('mapCanvas');
    canvas.style.transform = `translate(${this.offsetX}px,${this.offsetY}px) scale(${this.scale})`;
    this.updateMinimap();
  },

  updateMinimap() {
    const container = $('mapContainer');
    const mm = $('minimap');
    if(!this.imgW) return;
    const mmW = mm.clientWidth;
    const mmH = mm.clientHeight;
    const scaleX = mmW / this.imgW;
    const scaleY = mmH / this.imgH;
    const cw = container.clientWidth;
    const ch = container.clientHeight;
    const vp = $('minimapViewport');
    const vpW = (cw / this.scale) * scaleX;
    const vpH = (ch / this.scale) * scaleY;
    const vpX = (-this.offsetX / this.scale) * scaleX;
    const vpY = (-this.offsetY / this.scale) * scaleY;
    vp.style.width = clamp(vpW,5,mmW)+'px';
    vp.style.height = clamp(vpH,5,mmH)+'px';
    vp.style.left = clamp(vpX,0,mmW)+'px';
    vp.style.top = clamp(vpY,0,mmH)+'px';
  },

  screenToMap(sx, sy) {
    const container = $('mapContainer');
    const rect = container.getBoundingClientRect();
    return {
      x: (sx - rect.left - this.offsetX) / this.scale,
      y: (sy - rect.top - this.offsetY) / this.scale,
    };
  },

  mapToScreen(mx, my) {
    const container = $('mapContainer');
    const rect = container.getBoundingClientRect();
    return {
      x: mx * this.scale + this.offsetX + rect.left,
      y: my * this.scale + this.offsetY + rect.top,
    };
  },

  renderEntities() {
    // Remove old markers
    document.querySelectorAll('.city-marker,.army-marker,.bandit-marker').forEach(el=>el.remove());
    const canvas = $('mapCanvas');

    // Cities
    GameState.cities.forEach(city => {
      const el = document.createElement('div');
      el.className = 'city-marker';
      el.style.left = city.x + 'px';
      el.style.top = city.y + 'px';
      const faction = GameState.factions.find(f=>f.id===city.factionId);
      const color = faction ? faction.color : '#888';
      const isCapital = faction && faction.capitalId === city.id;
      el.innerHTML = `
        <div class="city-dot ${isCapital?'capital':''}" style="border-color:${color};${isCapital?'background:'+color:''}"></div>
        <div class="city-label">${city.name}</div>
      `;
      el.onclick = (e) => { e.stopPropagation(); UI.openCityPanel(city.id); };
      canvas.appendChild(el);
    });

    // Armies
    GameState.armies.forEach(army => {
      const el = document.createElement('div');
      el.className = 'army-marker';
      el.style.left = army.x + 'px';
      el.style.top = army.y + 'px';
      const faction = GameState.factions.find(f=>f.id===army.factionId);
      const color = faction ? faction.color : '#888';
      const typeIcon = army.type==='naval'?'⛵':army.type==='air'?'✈':'⚔';
      el.innerHTML = `
        <div class="army-icon" style="background:${color}22;border-color:${color};color:${color}">${typeIcon}</div>
        <div class="army-count">${fmtNum(army.troops)}</div>
      `;
      el.onclick = (e) => { e.stopPropagation(); UI.openArmyPanel(army.id); };
      canvas.appendChild(el);
    });

    // Bandits
    GameState.bandits.forEach(b => {
      const el = document.createElement('div');
      el.className = 'bandit-marker';
      el.style.left = b.x + 'px';
      el.style.top = b.y + 'px';
      el.innerHTML = `<div class="bandit-icon">💀</div>`;
      el.onclick = (e) => { e.stopPropagation(); UI.showBanditInfo(b); };
      canvas.appendChild(el);
    });
  }
};

// ============================================================
// GAME LOGIC
// ============================================================
const Game = {
  tickInterval: null,
  TICK_MS: [0, 1000, 400, 100], // speed 0-3

  setSpeed(s) {
    GameState.speed = s;
    document.querySelectorAll('.speed-btn').forEach((btn,i)=>{
      btn.classList.toggle('active', i===s);
    });
    this.restartTick();
  },

  restartTick() {
    if(this.tickInterval) clearInterval(this.tickInterval);
    if(GameState.speed > 0) {
      this.tickInterval = setInterval(() => this.tick(), this.TICK_MS[GameState.speed]);
    }
  },

  tick() {
    if(!GameState.playing) return;
    const t = GameState.time;
    t.day++;
    if(t.day > 30) { t.day = 1; t.month++; this.monthlyTick(); }
    if(t.month > 12) { t.month = 1; t.year++; this.yearlyTick(); }
    
    // Update display
    $('timeDisplay').textContent = `第 ${fmtNum(t.year)} 年 ${t.month} 月 ${t.day} 日`;
    
    // Move armies
    this.moveArmies();
    
    // Check battles
    this.checkBattles();

    // Move bandits randomly sometimes
    if(Math.random()<0.02) this.moveBandits();

    // AI tick
    if(t.day % 5 === 0) AI.tick();

    // Render
    MapCtrl.renderEntities();
    this.updateTopbar();
  },

  monthlyTick() {
    // Tax collection
    const playerFaction = GameState.factions.find(f=>f.id===GameState.playerFaction);
    if(!playerFaction) return;
    
    const taxMult = this.getLawEffect('tax','tax_mult') ?? 1;
    
    GameState.factions.forEach(faction => {
      let income = 0;
      let totalPop = 0;
      const fCities = GameState.cities.filter(c=>c.factionId===faction.id);
      fCities.forEach(city => {
        const baseTax = city.population * 0.01 * (1 + city.economyLevel * 0.1);
        income += baseTax * taxMult;
        totalPop += city.population;
        // Population growth
        const growthRate = 0.001 + (this.getTechEffect('pop_growth')||0) + (this.getLawEffect('tax','pop_growth')||0);
        city.population = Math.floor(city.population * (1 + growthRate));
      });
      // Army upkeep
      const fArmies = GameState.armies.filter(a=>a.factionId===faction.id);
      let upkeep = 0;
      fArmies.forEach(a => { upkeep += a.upkeep || a.troops * 0.5; });
      faction.gold = (faction.gold||0) + income - upkeep;
      faction.totalPop = totalPop;
    });

    // Research progress
    if(GameState.currentResearch && playerFaction) {
      const speed = 1 + (this.getTechEffect('research_speed')||0);
      GameState.researchProgress += speed * 2;
      const tech = this.findTech(GameState.currentResearch);
      if(tech && GameState.researchProgress >= tech.cost) {
        GameState.researchedTechs[tech.id] = true;
        UI.notify(`科技「${tech.name}」研究完成！`, 'peace');
        GameState.currentResearch = null;
        GameState.researchProgress = 0;
      }
    }
  },

  yearlyTick() {
    // Yearly events
    if(Math.random()<0.1) {
      // Random bandit spawn
      if(MapCtrl.imgW > 0) {
        GameState.bandits.push({
          id:uid(),
          name:pick(['黑山贼','流寇','海盗','叛军','山匪']),
          x:randInt(50,MapCtrl.imgW-50),
          y:randInt(50,MapCtrl.imgH-50),
          troops:randInt(50,500),
          atk:randInt(3,10),
          def:randInt(2,8),
        });
        UI.notify('有新的匪寇出没！','war');
      }
    }
  },

  moveArmies() {
    GameState.armies.forEach(army => {
      if(!army.targetX && !army.targetY) return;
      const dx = army.targetX - army.x;
      const dy = army.targetY - army.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const speed = (army.type==='air'?8:army.type==='naval'?4:3) * (1+(this.getTechEffect('army_speed')||0));
      if(dist < speed) {
        army.x = army.targetX;
        army.y = army.targetY;
        army.targetX = null;
        army.targetY = null;
        // Check if arrived at target city
        if(army.targetCityId) {
          const targetCity = GameState.cities.find(c=>c.id===army.targetCityId);
          if(targetCity && targetCity.factionId !== army.factionId) {
            this.siegeCity(army, targetCity);
          }
          army.targetCityId = null;
        }
      } else {
        army.x += (dx/dist)*speed;
        army.y += (dy/dist)*speed;
      }
    });
  },

  moveBandits() {
    GameState.bandits.forEach(b => {
      b.x = clamp(b.x + randInt(-30,30), 10, MapCtrl.imgW-10);
      b.y = clamp(b.y + randInt(-30,30), 10, MapCtrl.imgH-10);
    });
  },

  checkBattles() {
    // Army vs Army
    for(let i=0;i<GameState.armies.length;i++){
      for(let j=i+1;j<GameState.armies.length;j++){
        const a = GameState.armies[i], b = GameState.armies[j];
        if(a.factionId === b.factionId) continue;
        const dist = Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);
        if(dist < 20) {
          // Check if at war
          if(this.areAtWar(a.factionId, b.factionId)) {
            this.battle(a,b);
          }
        }
      }
    }
    // Army vs Bandit
    GameState.armies.forEach(army => {
      GameState.bandits.forEach(bandit => {
        const dist = Math.sqrt((army.x-bandit.x)**2+(army.y-bandit.y)**2);
        if(dist < 20) {
          this.battleBandit(army, bandit);
        }
      });
    });
    // Remove dead
    GameState.armies = GameState.armies.filter(a=>a.troops>0);
    GameState.bandits = GameState.bandits.filter(b=>b.troops>0);
  },

  battle(a, b) {
    const atkBonus = this.getTechEffect('army_atk')||0;
    const aPower = a.troops * ((a.atk||5)+atkBonus);
    const bPower = b.troops * ((b.atk||5)+atkBonus);
    const total = aPower + bPower;
    const aLoss = Math.floor(a.troops * (bPower/total) * (0.1+Math.random()*0.1));
    const bLoss = Math.floor(b.troops * (aPower/total) * (0.1+Math.random()*0.1));
    a.troops = Math.max(0, a.troops - aLoss);
    b.troops = Math.max(0, b.troops - bLoss);
    const fA = GameState.factions.find(f=>f.id===a.factionId);
    const fB = GameState.factions.find(f=>f.id===b.factionId);
    UI.notify(`${fA?.name||'?'} vs ${fB?.name||'?'}: 损失 ${aLoss}/${bLoss}`,'war');
  },

  battleBandit(army, bandit) {
    const atkBonus = this.getTechEffect('army_atk')||0;
    const aPower = army.troops * ((army.atk||5)+atkBonus);
    const bPower = bandit.troops * (bandit.atk||3);
    const total = aPower + bPower;
    const aLoss = Math.floor(army.troops * (bPower/total) * 0.08);
    const bLoss = Math.floor(bandit.troops * (aPower/total) * 0.15);
    army.troops = Math.max(0, army.troops - aLoss);
    bandit.troops = Math.max(0, bandit.troops - bLoss);
    if(bandit.troops <= 0) {
      UI.notify(`匪寇「${bandit.name}」被消灭！`,'peace');
    }
  },

  siegeCity(army, city) {
    const defBonus = (this.getTechEffect('city_def')||0) + (city.defense||10);
    const siegeBonus = this.getTechEffect('siege')||0;
    const armyPower = army.troops * ((army.atk||5) + siegeBonus);
    const cityPower = (city.garrison||0) * 5 + defBonus * 10;
    if(armyPower > cityPower) {
      const oldFaction = GameState.factions.find(f=>f.id===city.factionId);
      const newFaction = GameState.factions.find(f=>f.id===army.factionId);
      city.factionId = army.factionId;
      city.garrison = Math.floor(army.troops * 0.2);
      army.troops = Math.floor(army.troops * 0.8);
      UI.notify(`${newFaction?.name||'?'} 攻占了 ${city.name}！`,'war');
    } else {
      army.troops = Math.floor(army.troops * 0.7);
      UI.notify(`攻城失败：${city.name} 防守成功`,'peace');
    }
  },

  areAtWar(fid1, fid2) {
    return GameState.wars.some(w =>
      (w.attacker===fid1 && w.defender===fid2) ||
      (w.attacker===fid2 && w.defender===fid1)
    );
  },

  declareWar(fid1, fid2) {
    if(this.areAtWar(fid1,fid2)) return;
    GameState.wars.push({attacker:fid1, defender:fid2, startYear:GameState.time.year});
    const f1 = GameState.factions.find(f=>f.id===fid1);
    const f2 = GameState.factions.find(f=>f.id===fid2);
    UI.notify(`${f1?.name||'?'} 对 ${f2?.name||'?'} 宣战！`,'war');
  },

  makePeace(fid1, fid2) {
    GameState.wars = GameState.wars.filter(w =>
      !((w.attacker===fid1&&w.defender===fid2)||(w.attacker===fid2&&w.defender===fid1))
    );
    const f1 = GameState.factions.find(f=>f.id===fid1);
    const f2 = GameState.factions.find(f=>f.id===fid2);
    UI.notify(`${f1?.name||'?'} 与 ${f2?.name||'?'} 达成和平`,'peace');
  },

  getTechEffect(key) {
    let total = 0;
    for(const era of GameState.techTree) {
      for(const tech of era.techs) {
        if(GameState.researchedTechs[tech.id] && tech.effects && tech.effects[key]) {
          total += tech.effects[key];
        }
      }
    }
    return total;
  },

  getLawEffect(category, key) {
    const law = GameState.laws[category];
    if(!law) return 0;
    const effects = LAW_EFFECTS[category];
    if(!effects || !effects[law.current]) return 0;
    return effects[law.current][key] || 0;
  },

  findTech(id) {
    for(const era of GameState.techTree) {
      for(const tech of era.techs) {
        if(tech.id === id) return tech;
      }
    }
    return null;
  },

  recruitArmy(cityId, unitId, count) {
    const city = GameState.cities.find(c=>c.id===cityId);
    const unit = GameState.units.find(u=>u.id===unitId);
    const faction = GameState.factions.find(f=>f.id===city.factionId);
    if(!city||!unit||!faction) return;
    const costMult = this.getLawEffect('military','recruit_cost') || 1;
    const totalCost = unit.cost * count * costMult;
    if(faction.gold < totalCost) { UI.notify('金币不足！','war'); return; }
    faction.gold -= totalCost;
    // Create or merge army
    let existingArmy = GameState.armies.find(a=>a.factionId===faction.id && Math.abs(a.x-city.x)<10 && Math.abs(a.y-city.y)<10);
    if(existingArmy) {
      existingArmy.troops += count;
      existingArmy.upkeep += unit.upkeep * count;
    } else {
      GameState.armies.push({
        id:uid(),
        name:unit.name+'部队',
        factionId:faction.id,
        type:unit.type,
        x:city.x,
        y:city.y,
        troops:count,
        atk:unit.atk,
        def:unit.def,
        upkeep:unit.upkeep*count,
        targetX:null,targetY:null,targetCityId:null,
      });
    }
    UI.notify(`在 ${city.name} 招募了 ${count} 名 ${unit.name}`,'peace');
  },

  startResearch(techId) {
    const tech = this.findTech(techId);
    if(!tech) return;
    if(GameState.researchedTechs[techId]) return;
    if(tech.requires && !tech.requires.every(r=>GameState.researchedTechs[r])) {
      UI.notify('前置科技未完成！','war');
      return;
    }
    GameState.currentResearch = techId;
    GameState.researchProgress = 0;
    UI.notify(`开始研究「${tech.name}」`);
  },

  updateTopbar() {
    const faction = GameState.factions.find(f=>f.id===GameState.playerFaction);
    if(!faction) return;
    $('playerFactionName').textContent = faction.name;
    $('statGold').textContent = fmtNum(faction.gold||0);
    $('statPop').textContent = fmtNum(faction.totalPop||0);
    const armyCount = GameState.armies.filter(a=>a.factionId===faction.id).reduce((s,a)=>s+a.troops,0);
    $('statArmy').textContent = fmtNum(armyCount);
    const techCount = Object.keys(GameState.researchedTechs).length;
    $('statTech').textContent = techCount;
  },

  saveGame() {
    const name = prompt('存档名称：', `存档_${GameState.time.year}年`);
    if(!name) return;
    const saveData = JSON.parse(JSON.stringify(GameState));
    saveData._saveName = name;
    saveData._saveDate = new Date().toLocaleString();
    Storage.save('save_'+uid(), saveData);
    UI.notify('游戏已保存！','peace');
  },

  loadGame(key) {
    const data = Storage.load(key);
    if(!data) { UI.notify('读取失败！','war'); return; }
    Object.assign(GameState, data);
    GameState.playing = true;
    $('mainMenu').style.display = 'none';
    $('gameUI').classList.add('active');
    MapCtrl.loadMap(GameState.mapImage || DEFAULT_MAP_SRC);
    this.setSpeed(GameState.speed || 1);
    setTimeout(()=>MapCtrl.renderEntities(), 500);
    UI.notify('存档已读取','peace');
  },

  initNewGame(scenario) {
    // Reset state
    GameState.playing = true;
    GameState.time = {year:scenario.startYear||1,month:1,day:1};
    GameState.factions = JSON.parse(JSON.stringify(scenario.factions||[]));
    GameState.cities = JSON.parse(JSON.stringify(scenario.cities||[]));
    GameState.armies = JSON.parse(JSON.stringify(scenario.armies||[]));
    GameState.bandits = JSON.parse(JSON.stringify(scenario.bandits||[]));
    GameState.techTree = JSON.parse(JSON.stringify(scenario.techTree||DEFAULT_TECH_TREE));
    GameState.cultures = JSON.parse(JSON.stringify(scenario.cultures||DEFAULT_CULTURES));
    GameState.units = JSON.parse(JSON.stringify(scenario.units||DEFAULT_UNITS));
    GameState.characters = JSON.parse(JSON.stringify(scenario.characters||DEFAULT_CHARACTERS));
    GameState.laws = JSON.parse(JSON.stringify(scenario.laws||DEFAULT_LAWS));
    GameState.researchedTechs = {};
    GameState.currentResearch = null;
    GameState.researchProgress = 0;
    GameState.wars = [];
    GameState.playerFaction = scenario.playerFaction || (scenario.factions[0]?.id);
    GameState.playerMode = scenario.playerMode || 'nation';
    GameState.mapImage = scenario.mapImage || DEFAULT_MAP_SRC;

    // Give each faction starting gold
    GameState.factions.forEach(f => {
      f.gold = f.gold || 1000;
      f.totalPop = 0;
    });

    $('mainMenu').style.display = 'none';
    $('gameUI').classList.add('active');
    MapCtrl.loadMap(GameState.mapImage);
    this.setSpeed(1);
    setTimeout(()=>{ MapCtrl.renderEntities(); this.updateTopbar(); }, 500);
  },
};

// ============================================================
// AI SYSTEM
// ============================================================
const AI = {
  tick() {
    GameState.factions.forEach(faction => {
      if(faction.id === GameState.playerFaction) return;
      this.factionAI(faction);
    });
  },

  factionAI(faction) {
    const fCities = GameState.cities.filter(c=>c.factionId===faction.id);
    const fArmies = GameState.armies.filter(a=>a.factionId===faction.id);
    const totalTroops = fArmies.reduce((s,a)=>s+a.troops,0);

    // Recruit if gold available and few troops
    if(faction.gold > 500 && totalTroops < (faction.totalPop||100)*0.1 && fCities.length>0) {
      const city = pick(fCities);
      const unit = pick(GameState.units.filter(u=>u.type==='land'));
      if(unit) {
        const count = Math.min(Math.floor(faction.gold / unit.cost / 2), 100);
        if(count > 5) {
          faction.gold -= unit.cost * count;
          GameState.armies.push({
            id:uid(),
            name:unit.name+'部队',
            factionId:faction.id,
            type:'land',
            x:city.x+randInt(-5,5), y:city.y+randInt(-5,5),
            troops:count,
            atk:unit.atk, def:unit.def,
            upkeep:unit.upkeep*count,
          });
        }
      }
    }

    // Consider war
    if(fArmies.length > 0 && Math.random() < 0.02) {
      const otherFactions = GameState.factions.filter(f=>f.id!==faction.id);
      const target = pick(otherFactions);
      if(target && !Game.areAtWar(faction.id, target.id)) {
        const myPower = totalTroops;
        const theirPower = GameState.armies.filter(a=>a.factionId===target.id).reduce((s,a)=>s+a.troops,0);
        if(myPower > theirPower * 1.5) {
          Game.declareWar(faction.id, target.id);
        }
      }
    }

    // Move armies toward enemy cities if at war
    GameState.wars.forEach(war => {
      let enemyId = null;
      if(war.attacker === faction.id) enemyId = war.defender;
      if(war.defender === faction.id) enemyId = war.attacker;
      if(!enemyId) return;
      const enemyCities = GameState.cities.filter(c=>c.factionId===enemyId);
      if(enemyCities.length === 0) return;
      fArmies.forEach(army => {
        if(!army.targetX) {
          const target = pick(enemyCities);
          army.targetX = target.x;
          army.targetY = target.y;
          army.targetCityId = target.id;
        }
      });
    });

    // Consider peace if losing
    GameState.wars.forEach(war => {
      let enemyId = null;
      if(war.attacker === faction.id) enemyId = war.defender;
      if(war.defender === faction.id) enemyId = war.attacker;
      if(!enemyId) return;
      if(fCities.length <= 1 && Math.random() < 0.1) {
        Game.makePeace(faction.id, enemyId);
      }
    });

    // Attack nearby bandits
    fArmies.forEach(army => {
      if(army.targetX) return;
      const nearBandit = GameState.bandits.find(b => Math.sqrt((b.x-army.x)**2+(b.y-army.y)**2) < 100);
      if(nearBandit && army.troops > nearBandit.troops * 1.5) {
        army.targetX = nearBandit.x;
        army.targetY = nearBandit.y;
      }
    });
  }
};

// ============================================================
// UI SYSTEM
// ============================================================
const UI = {
  currentPanel: null,

  // Modal
  openModal(title, bodyHTML, footerHTML, wide) {
    $('modalTitle').textContent = title;
    $('modalBody').innerHTML = bodyHTML;
    $('modalFooter').innerHTML = footerHTML || '';
    $('modalContent').classList.toggle('modal-wide', !!wide);
    $('modalOverlay').classList.add('active');
  },
  closeModal() {
    $('modalOverlay').classList.remove('active');
  },

  // Notifications
  notify(msg, type='') {
    const el = document.createElement('div');
    el.className = 'notification ' + type;
    el.textContent = msg;
    $('notifications').appendChild(el);
    setTimeout(()=>el.remove(), 5000);
  },

  // Panel
  togglePanel(name) {
    if(this.currentPanel === name) { this.closePanel(); return; }
    this.currentPanel = name;
    const panel = $('sidePanel');
    panel.classList.add('open');
    switch(name) {
      case 'city': this.renderCityListPanel(); break;
      case 'army': this.renderArmyPanel(); break;
      case 'tech': this.renderTechPanel(); break;
      case 'diplomacy': this.renderDiplomacyPanel(); break;
      case 'law': this.renderLawPanel(); break;
      case 'faction': this.renderFactionPanel(); break;
    }
  },
  closePanel() {
    this.currentPanel = null;
    $('sidePanel').classList.remove('open');
  },

  // ===== CITY LIST PANEL =====
  renderCityListPanel() {
    $('panelTitle').textContent = '城池管理';
    const myCities = GameState.cities.filter(c=>c.factionId===GameState.playerFaction);
    let html = '';
    myCities.forEach(city => {
      html += `<div class="list-item" onclick="UI.openCityPanel('${city.id}')">
        <div class="list-item-info">
          <div class="list-item-name">${city.name}</div>
          <div class="list-item-desc">人口:${fmtNum(city.population)} 经济:Lv${city.economyLevel} 防御:${city.defense}</div>
        </div>
        <div class="list-item-actions">
          <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();UI.editCity('${city.id}')">编辑</button>
        </div>
      </div>`;
    });
    if(!myCities.length) html = '<div class="empty-state">暂无城池</div>';
    $('panelBody').innerHTML = html;
  },

  openCityPanel(cityId) {
    const city = GameState.cities.find(c=>c.id===cityId);
    if(!city) return;
    $('panelTitle').textContent = city.name;
    $('sidePanel').classList.add('open');
    this.currentPanel = 'cityDetail';
    const faction = GameState.factions.find(f=>f.id===city.factionId);
    const culture = GameState.cultures.find(c=>c.id===city.cultureId);
    const isMine = city.factionId === GameState.playerFaction;

    let html = `
      <div class="panel-section">
        <div class="panel-section-title">基本信息</div>
        <div class="stat-row"><span class="label">所属</span><span class="value">${faction?.name||'无'}</span></div>
        <div class="stat-row"><span class="label">民族</span><span class="value">${culture?.name||'无'}</span></div>
        <div class="stat-row"><span class="label">人口</span><span class="value">${fmtNum(city.population)}</span></div>
        <div class="stat-row"><span class="label">经济等级</span><span class="value">Lv ${city.economyLevel}</span></div>
        <div class="stat-row"><span class="label">防御系数</span><span class="value">${city.defense}</span></div>
        <div class="stat-row"><span class="label">驻军</span><span class="value">${fmtNum(city.garrison||0)}</span></div>
        <div class="stat-row"><span class="label">类型</span><span class="value">${city.type||'普通城池'}</span></div>
        ${city.tags?`<div class="stat-row"><span class="label">标签</span><span class="value">${city.tags.map(t=>'<span class="tag">'+t+'</span>').join(' ')}</span></div>`:''}
      </div>`;

    if(isMine) {
      html += `
      <div class="panel-section">
        <div class="panel-section-title">招募军队</div>
        <div style="display:flex;flex-direction:column;gap:0.4rem;">`;
      
      const availableUnits = GameState.units.filter(u => {
        if(u.type==='air' && !Game.getTechEffect('can_air')) return false;
        if(u.type==='naval' && !Game.getTechEffect('can_naval')) return false;
        return u.culture==='通用' || u.culture===culture?.name;
      });
      availableUnits.forEach(unit => {
        html += `<div class="list-item">
          <div class="list-item-info">
            <div class="list-item-name">${unit.name} <span class="tag">${unit.type==='land'?'陆':'naval'?'海':'空'}</span></div>
            <div class="list-item-desc">攻${unit.atk} 防${unit.def} 费用${unit.cost}/人</div>
          </div>
          <div class="list-item-actions">
            <button class="btn btn-sm btn-primary" onclick="Game.recruitArmy('${city.id}','${unit.id}',10)">+10</button>
            <button class="btn btn-sm btn-primary" onclick="Game.recruitArmy('${city.id}','${unit.id}',50)">+50</button>
          </div>
        </div>`;
      });
      html += '</div></div>';
    }
    $('panelBody').innerHTML = html;
  },

  editCity(cityId) {
    const city = GameState.cities.find(c=>c.id===cityId);
    if(!city) return;
    const html = `
      <div class="form-row"><label class="form-label">城池名称</label><input class="form-input" id="ecName" value="${city.name}"></div>
      <div class="form-row-inline">
        <div class="form-row"><label class="form-label">人口</label><input type="number" class="form-input" id="ecPop" value="${city.population}"></div>
        <div class="form-row"><label class="form-label">经济等级</label><input type="number" class="form-input" id="ecEcon" value="${city.economyLevel}" min="1" max="100"></div>
      </div>
      <div class="form-row-inline">
        <div class="form-row"><label class="form-label">防御系数</label><input type="number" class="form-input" id="ecDef" value="${city.defense}" min="0"></div>
        <div class="form-row"><label class="form-label">驻军</label><input type="number" class="form-input" id="ecGarrison" value="${city.garrison||0}" min="0"></div>
      </div>
      <div class="form-row"><label class="form-label">城池类型</label><input class="form-input" id="ecType" value="${city.type||''}" placeholder="如：要塞、港口、商业中心"></div>
      <div class="form-row"><label class="form-label">自定义标签（逗号分隔）</label><input class="form-input" id="ecTags" value="${(city.tags||[]).join(',')}"></div>
      <div class="form-row"><label class="form-label">民族文化</label>
        <select class="form-select" id="ecCulture">
          <option value="">无</option>
          ${GameState.cultures.map(c=>`<option value="${c.id}" ${c.id===city.cultureId?'selected':''}>${c.name}</option>`).join('')}
        </select>
      </div>
    `;
    const footer = `
      <button class="btn btn-danger" onclick="GameState.cities=GameState.cities.filter(c=>c.id!=='${city.id}');UI.closeModal();MapCtrl.renderEntities();UI.renderCityListPanel();">删除城池</button>
      <button class="btn btn-secondary" onclick="UI.closeModal()">取消</button>
      <button class="btn btn-primary" onclick="UI.saveCityEdit('${city.id}')">保存</button>
    `;
    this.openModal('编辑城池', html, footer);
  },

  saveCityEdit(cityId) {
    const city = GameState.cities.find(c=>c.id===cityId);
    if(!city) return;
    city.name = $('ecName').value || city.name;
    city.population = parseInt($('ecPop').value)||city.population;
    city.economyLevel = clamp(parseInt($('ecEcon').value)||1,1,100);
    city.defense = Math.max(0,parseInt($('ecDef').value)||0);
    city.garrison = Math.max(0,parseInt($('ecGarrison').value)||0);
    city.type = $('ecType').value;
    city.tags = $('ecTags').value.split(',').map(s=>s.trim()).filter(Boolean);
    city.cultureId = $('ecCulture').value;
    this.closeModal();
    MapCtrl.renderEntities();
    if(this.currentPanel==='cityDetail') this.openCityPanel(cityId);
  },

  // ===== ARMY PANEL =====

    $('panelTitle').textContent = '军事';
    const myArmies = GameState.armies.filter(a=>a.factionId===GameState.playerFaction);
    let html = '';
    myArmies.forEach(army => {
      html += `<div class="list-item">
        <div class="list-item-info">
          <div class="list-item-name">${army.name} <span class="tag">${army.type==='land'?'陆军':army.type==='naval'?'海军':'空军'}</span></div>
          <div class="list-item-desc">兵力:${fmtNum(army.troops)} 攻:${army.atk} 防:${army.def}</div>
        </div>
        <div class="list-item-actions">
          <button class="btn btn-sm btn-secondary" onclick="UI.selectArmyTarget('${army.id}')" title="移动">📍</button>

        </div>
      </div>`;
    });
    if(!myArmies.length) html = '<div class="empty-state">暂无军队<br>在城池中招募</div>';

  },

  openArmyPanel(armyId) {
    const army = GameState.armies.find(a=>a.id===armyId);
    if(!army) return;
    $('panelTitle').textContent = army.name;
    $('sidePanel').classList.add('open');
    this.currentPanel = 'armyDetail';
    const faction = GameState.factions.find(f=>f.id===army.factionId);
    const isMine = army.factionId === GameState.playerFaction;

    let html = `
      <div class="panel-section">
        <div class="panel-section-title">部队信息</div>
        <div class="stat-row"><span class="label">所属</span><span class="value">${faction?.name||'无'}</span></div>
        <div class="stat-row"><span class="label">兵种类型</span><span class="value">${army.type==='land'?'陆军':army.type==='naval'?'海军':'空军'}</span></div>
        <div class="stat-row"><span class="label">兵力</span><span class="value">${fmtNum(army.troops)}</span></div>
        <div class="stat-row"><span class="label">攻击力</span><span class="value">${army.atk}</span></div>
        <div class="stat-row"><span class="label">防御力</span><span class="value">${army.def}</span></div>
        <div class="stat-row"><span class="label">维护费</span><span class="value">${fmtNum(army.upkeep||0)}/月</span></div>
      </div>`;
    
    if(isMine) {
      html += `<div class="panel-section">
        <button class="btn btn-secondary" onclick="UI.selectArmyTarget('${army.id}')" style="width:100%;margin-bottom:0.4rem;">📍 指定目标</button>
        <button class="btn btn-secondary" onclick="UI.armyAttackCity('${army.id}')" style="width:100%;margin-bottom:0.4rem;">⚔ 攻击城池</button>
        <button class="btn btn-danger" onclick="UI.disbandArmy('${army.id}')" style="width:100%;">解散部队</button>
      </div>`;
    }
    $('panelBody').innerHTML = html;
  },

  selectArmyTarget(armyId) {
    UI.notify('在地图上右键点击目标位置');
    window._pendingArmyMove = armyId;
  },

  armyAttackCity(armyId) {
    const army = GameState.armies.find(a=>a.id===armyId);
    if(!army) return;
    const enemyCities = GameState.cities.filter(c=>c.factionId!==army.factionId);
    let html = '<div class="search-bar"><input class="form-input" placeholder="搜索城池..." oninput="UI.filterList(this,\'atkCityList\')"></div>';
    html += '<div id="atkCityList">';
    enemyCities.forEach(c=>{
      html += `<div class="list-item" data-search="${c.name}" onclick="UI.sendArmyToCity('${armyId}','${c.id}')">
        <div class="list-item-info"><div class="list-item-name">${c.name}</div>
        <div class="list-item-desc">防御:${c.defense} 驻军:${c.garrison||0}</div></div>
      </div>`;
    });
    html += '</div>';
    this.openModal('选择攻击目标', html, '<button class="btn btn-secondary" onclick="UI.closeModal()">取消</button>');
  },

  sendArmyToCity(armyId, cityId) {
    const army = GameState.armies.find(a=>a.id===armyId);
    const city = GameState.cities.find(c=>c.id===cityId);
    if(!army||!city) return;
    // Auto declare war
    if(!Game.areAtWar(army.factionId, city.factionId)) {
      Game.declareWar(army.factionId, city.factionId);
    }
    army.targetX = city.x;
    army.targetY = city.y;
    army.targetCityId = city.id;
    this.closeModal();
    UI.notify(`部队已出发前往 ${city.name}`);
  },

  disbandArmy(armyId) {
    if(!confirm('确定解散该部队？')) return;
    GameState.armies = GameState.armies.filter(a=>a.id!==armyId);
    MapCtrl.renderEntities();
    if(this.currentPanel==='army') this.renderArmyPanel();
    this.closePanel();
  },

  // ===== TECH PANEL =====
  renderTechPanel() {
    $('panelTitle').textContent = '科技';
    let html = '';
    if(GameState.currentResearch) {
      const tech = Game.findTech(GameState.currentResearch);
      if(tech) {
        const pct = Math.min(100, (GameState.researchProgress/tech.cost)*100);
        html += `<div class="panel-section">
          <div class="panel-section-title">正在研究</div>
          <div style="font-weight:700;margin-bottom:0.3rem;">${tech.name}</div>
          <div style="background:var(--bg-secondary);height:6px;border-radius:3px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:var(--accent-blue);transition:width 0.3s;"></div>
          </div>
          <div style="font-size:0.7rem;color:var(--text-dim);margin-top:0.2rem;">${Math.floor(GameState.researchProgress)}/${tech.cost}</div>
        </div>`;
      }
    }

    GameState.techTree.forEach(era => {
      html += `<div class="tech-era"><div class="tech-era-label">${era.era}</div><div class="tech-nodes">`;
      era.techs.forEach(tech => {
        const researched = GameState.researchedTechs[tech.id];
        const isResearching = GameState.currentResearch === tech.id;
        const canResearch = !researched && !tech.requires?.some(r=>!GameState.researchedTechs[r]);
        const cls = researched ? 'researched' : isResearching ? 'researching' : canResearch ? '' : 'locked';
        html += `<div class="tech-node ${cls}" onclick="${canResearch&&!researched?`Game.startResearch('${tech.id}');UI.renderTechPanel()`:''}" title="${tech.desc||''}">
          <div class="tech-node-name">${tech.name}</div>
          <div class="tech-node-cost">${researched?'✓ 已完成':'费用:'+tech.cost}</div>
          ${isResearching?`<div class="tech-progress" style="width:${Math.min(100,(GameState.researchProgress/tech.cost)*100)}%"></div>`:''}
        </div>`;
      });
      html += '</div></div>';
    });
    $('panelBody').innerHTML = html;
  },

  // ===== DIPLOMACY PANEL =====
  renderDiplomacyPanel() {
    $('panelTitle').textContent = '外交';
    let html = '';
    GameState.factions.forEach(f => {
      if(f.id === GameState.playerFaction) return;
      const atWar = Game.areAtWar(GameState.playerFaction, f.id);
      html += `<div class="list-item">
        <div class="list-item-info">
          <div class="list-item-name"><span style="display:inline-block;width:12px;height:12px;background:${f.color};border-radius:2px;vertical-align:middle;margin-right:6px;"></span>${f.name}</div>
          <div class="list-item-desc">城池:${GameState.cities.filter(c=>c.factionId===f.id).length} 军队:${fmtNum(GameState.armies.filter(a=>a.factionId===f.id).reduce((s,a)=>s+a.troops,0))}</div>
        </div>
        <div class="list-item-actions">
          ${atWar?
            `<span class="tag" style="border-color:var(--accent-red);color:var(--accent-red);">交战中</span>
            <button class="btn btn-sm btn-secondary" onclick="Game.makePeace('${GameState.playerFaction}','${f.id}');UI.renderDiplomacyPanel();">求和</button>`
            :
            `<span class="tag" style="border-color:var(--accent-green);color:var(--accent-green);">和平</span>
            <button class="btn btn-sm btn-danger" onclick="Game.declareWar('${GameState.playerFaction}','${f.id}');UI.renderDiplomacyPanel();">宣战</button>`
          }
        </div>
      </div>`;
    });
    if(GameState.factions.length <= 1) html = '<div class="empty-state">暂无其他势力</div>';
    $('panelBody').innerHTML = html;
  },

  // ===== LAW PANEL =====
  renderLawPanel() {
    $('panelTitle').textContent = '法律';
    let html = '';
    for(const [key, law] of Object.entries(GameState.laws)) {
      html += `<div class="law-category">
        <div class="law-category-title">${law.name}</div>
        <div class="law-options">`;
      law.options.forEach(opt => {
        html += `<div class="law-option ${opt===law.current?'active':''}" onclick="GameState.laws['${key}'].current='${opt}';UI.renderLawPanel();">${opt}</div>`;
      });
      html += '</div></div>';
    }
    $('panelBody').innerHTML = html;
  },

  // ===== FACTION PANEL =====
  renderFactionPanel() {
    $('panelTitle').textContent = '派系';
    const faction = GameState.factions.find(f=>f.id===GameState.playerFaction);
    if(!faction) { $('panelBody').innerHTML = '<div class="empty-state">无派系</div>'; return; }
    
    let html = `
      <div class="panel-section">
        <div class="panel-section-title">我的派系</div>
        <div class="stat-row"><span class="label">名称</span><span class="value">${faction.name}</span></div>
        <div class="stat-row"><span class="label">金币</span><span class="value">${fmtNum(faction.gold||0)}</span></div>
        <div class="stat-row"><span class="label">总人口</span><span class="value">${fmtNum(faction.totalPop||0)}</span></div>
        <div class="stat-row"><span class="label">旗帜</span><span class="value">
          <div class="flag-preview">${(faction.flagColors||['#c9a84c','#b44040','#0a0e17']).map(c=>`<div class="flag-stripe" style="background:${c}"></div>`).join('')}</div>
        </span></div>
      </div>
      <div class="panel-section">
        <div class="panel-section-title">重要人物</div>`;
    
    const fChars = GameState.characters.filter(ch=>ch.factionId===faction.id);
    fChars.forEach(ch => {
      html += `<div class="list-item">
        <div class="list-item-info">
          <div class="list-item-name">${ch.name} ${ch.role?'<span class="tag tag-gold">'+ch.role+'</span>':''}</div>
          <div class="list-item-desc">统率:${ch.skills?.command||0} 政治:${ch.skills?.admin||0} 外交:${ch.skills?.diplomacy||0}</div>
        </div>
      </div>`;
    });
    if(!fChars.length) html += '<div class="empty-state">暂无人物</div>';
    
    html += `</div>
      <div class="panel-section">
        <div class="panel-section-title">职权结构</div>`;
    
    if(faction.hierarchy && faction.hierarchy.length) {
      html += this.renderHierarchy(faction.hierarchy);
    } else {
      html += '<div class="empty-state">未设置职权结构</div>';
    }
    html += '</div>';
    
    $('panelBody').innerHTML = html;
  },

  renderHierarchy(nodes, depth=0) {
    let html = '<div class="hierarchy-tree">';
    nodes.forEach(node => {
      html += `<div class="hierarchy-node" style="margin-left:${depth*1.5}rem;">
        <span class="hierarchy-handle">☰</span>
        <span>${node.title}: ${node.holder||'空缺'}</span>
      </div>`;
      if(node.children && node.children.length) {
        html += this.renderHierarchy(node.children, depth+1);
      }
    });
    html += '</div>';
    return html;
  },

  // ===== MAP CONTEXT MENU =====
  showMapContextMenu(sx, sy, mx, my) {
    const menu = $('contextMenu');
    let items = '';
    
    if(window._pendingArmyMove) {
      const armyId = window._pendingArmyMove;
      items += `<div class="context-menu-item" onclick="UI.moveArmyTo('${armyId}',${mx},${my})">📍 移动部队到此处</div>`;
      window._pendingArmyMove = null;
    }
    
    items += `<div class="context-menu-item" onclick="UI.addCityAt(${mx},${my})">🏰 放置城池</div>`;
    items += `<div class="context-menu-item" onclick="UI.addBanditAt(${mx},${my})">💀 放置匪寇</div>`;
    items += `<div class="context-menu-sep"></div>`;
    items += `<div class="context-menu-item" onclick="UI.hideContextMenu()">取消</div>`;
    
    menu.innerHTML = items;
    menu.style.left = sx + 'px';
    menu.style.top = sy + 'px';
    menu.classList.add('visible');
    
    const hideHandler = () => { menu.classList.remove('visible'); document.removeEventListener('click',hideHandler); };
    setTimeout(()=>document.addEventListener('click',hideHandler),10);
  },
  hideContextMenu() { $('contextMenu').classList.remove('visible'); },

  moveArmyTo(armyId, mx, my) {
    const army = GameState.armies.find(a=>a.id===armyId);
    if(army) { army.targetX=mx; army.targetY=my; army.targetCityId=null; }
    this.hideContextMenu();
  },

  renderEditableHierarchy(nodes, factionIdx, path='') {
    let html = '<div class="hierarchy-tree" data-path="'+path+'">';
    nodes.forEach((node, i) => {
      const curPath = path ? path+'.'+i : ''+i;
      html += `<div class="hierarchy-node" draggable="true" data-path="${curPath}" 
        ondragstart="UI.hierDragStart(event,'${curPath}')" 
        ondragover="UI.hierDragOver(event)" 
        ondrop="UI.hierDrop(event,'${curPath}',${factionIdx})">
        <span class="hierarchy-handle">☰</span>
        <input class="form-input" style="width:80px;padding:0.2rem 0.4rem;font-size:0.75rem;" value="${node.title}" onchange="UI.updateHierTitle(${factionIdx},'${curPath}',this.value)">
        <span style="color:var(--text-dim);">:</span>
        <input class="form-input" style="flex:1;padding:0.2rem 0.4rem;font-size:0.75rem;" value="${node.holder||''}" placeholder="持有者" onchange="UI.updateHierHolder(${factionIdx},'${curPath}',this.value)">
        <button class="btn btn-sm btn-secondary" onclick="UI.addChildHierNode(${factionIdx},'${curPath}')" title="添加下级">+</button>
        <button class="btn btn-sm btn-danger btn-icon-only" onclick="UI.removeHierNode(${factionIdx},'${curPath}')" title="删除">✕</button>
      </div>`;
      if(node.children && node.children.length) {
        html += '<div class="hierarchy-children">' + this.renderEditableHierarchy(node.children, factionIdx, curPath) + '</div>';
      }
    });
    html += '</div>';
    return html;
  },

  getHierNode(nodes, path) {
    const parts = path.split('.').map(Number);
    let current = nodes;
    for(let i=0;i<parts.length-1;i++) {
      current = current[parts[i]].children;
    }
    return { parent:current, index:parts[parts.length-1], node:current[parts[parts.length-1]] };
  },

  updateHierTitle(fIdx, path, val) {
    const f = this._editingScenario.factions[fIdx];
    const {node} = this.getHierNode(f.hierarchy, path);
    if(node) node.title = val;
  },
  updateHierHolder(fIdx, path, val) {
    const f = this._editingScenario.factions[fIdx];
    const {node} = this.getHierNode(f.hierarchy, path);
    if(node) node.holder = val;
  },
  addHierarchyNode(fIdx) {
    const f = this._editingScenario.factions[fIdx];
    if(!f.hierarchy) f.hierarchy = [];
    f.hierarchy.push({title:'新职位',holder:'',children:[]});
    this.editScenFaction(fIdx);
  },
  addChildHierNode(fIdx, path) {
    const f = this._editingScenario.factions[fIdx];
    const {node} = this.getHierNode(f.hierarchy, path);
    if(!node.children) node.children = [];
    node.children.push({title:'下级',holder:'',children:[]});
    this.editScenFaction(fIdx);
  },
  removeHierNode(fIdx, path) {
    const f = this._editingScenario.factions[fIdx];
    const {parent,index} = this.getHierNode(f.hierarchy, path);
    parent.splice(index,1);
    this.editScenFaction(fIdx);
  },

  _hierDragPath: null,
  hierDragStart(e, path) { this._hierDragPath = path; e.dataTransfer.effectAllowed='move'; },
  hierDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect='move'; },
  hierDrop(e, targetPath, fIdx) {
    e.preventDefault();
    if(!this._hierDragPath || this._hierDragPath === targetPath) return;
    // Simple swap for now
    const f = this._editingScenario.factions[fIdx];
    const src = this.getHierNode(f.hierarchy, this._hierDragPath);
    const dst = this.getHierNode(f.hierarchy, targetPath);
    if(src.node && dst.node) {
      const temp = {...src.node};
      Object.assign(src.node, dst.node);
      Object.assign(dst.node, temp);
    }
    this._hierDragPath = null;
    this.editScenFaction(fIdx);
  },

    const f = this._editingScenario.factions[fIdx];
    const count = parseInt($('flagCount').value)||3;

    while(f.flagColors.length > count) f.flagColors.pop();

  _addTechToEra(ei) {

  _removeTech(ei,ti) {
    this._techEditorData[ei].techs.splice(ti,1);

  },
  _saveTechEditor() {
    // Read all inputs
    document.querySelectorAll('[data-era][data-field]').forEach(input => {
      const ei = parseInt(input.dataset.era);
      const ti = parseInt(input.dataset.tech);
      const field = input.dataset.field;
      if(field==='name') this._techEditorData[ei].techs[ti].name = input.value;
      if(field==='cost') this._techEditorData[ei].techs[ti].cost = parseInt(input.value)||50;
    });
    // Read era names
    this._techEditorData.forEach((era,ei) => {
      const input = $('eraName_'+ei);
      if(input) era.era = input.value;
    });
    Storage.save('customTech', this._techEditorData);
    this.closeModal();
  },

    u.upkeep = parseInt($('euUpkeep').value)||2;
    u.desc = $('euDesc').value;

    this.closeModal();
    this.openUnitEditor();
  },

  // --- Back to Menu ---
  backToMenu() {
    if(GameState.playing && !confirm('返回主菜单？未保存的进度将丢失。')) return;
    GameState.playing = false;
    if(Game.tickInterval) clearInterval(Game.tickInterval);
    $('gameUI').classList.remove('active');
    $('mainMenu').style.display = '';
    this.closePanel();
  },
};
