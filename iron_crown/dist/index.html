<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>铁与王冠 — 万世征途</title>
<style>
/* --- 01-variables.css --- */
/* ===== variables.css — 全局变量与重置 ===== */
@font-face{font-family:'GS';src:local('Noto Serif SC'),local('Microsoft YaHei'),local('SimSun'),serif}
@font-face{font-family:'GB';src:local('Ma Shan Zheng'),local('STXingkai'),local('华文行楷'),local('KaiTi'),cursive}
:root{
  --bg:#f5f0e8;--bg2:#ebe4d6;--bg3:#e0d6c2;--bg4:#d4c9b0;
  --card:#faf7f0;--card2:#f0ebe0;
  --bd:#c8b99a;--bd2:#a89878;--bd3:#8a7a5a;
  --tx:#3a3028;--tx2:#5a5040;--tx3:#8a7a68;
  --gold:#b8963a;--gold2:#d4aa44;--goldBg:rgba(184,150,58,.12);
  --red:#c05040;--redBg:rgba(192,80,64,.1);
  --green:#508050;--greenBg:rgba(80,128,80,.1);
  --blue:#4070a0;--blueBg:rgba(64,112,160,.1);
  --shadow:0 2px 12px rgba(60,40,20,.12);
  --shadow2:0 4px 20px rgba(60,40,20,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'GS',serif;font-size:15px}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--bd2)}
input,textarea,select,button{font-family:'GS',serif}

/* --- 02-menu.css --- */
/* ===== menu.css — 主菜单 ===== */
#menu{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#f8f2e6,#ede4d0 50%,#e2d8c0)}
.m-title{font-family:'GB',cursive;font-size:clamp(2.8rem,6vw,4.5rem);color:var(--bd3);text-shadow:0 2px 8px rgba(100,80,40,.15);letter-spacing:.15em;margin-bottom:.1em}
.m-sub{font-size:clamp(.75rem,1.2vw,.95rem);color:var(--tx3);letter-spacing:.4em;margin-bottom:2.5rem}
.m-btns{display:flex;flex-direction:column;gap:.5rem;width:clamp(280px,30vw,400px)}
.m-btn{background:var(--card);border:1px solid var(--bd);color:var(--tx);padding:.85rem 1.3rem;font-size:.95rem;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:.8rem;border-radius:6px;box-shadow:var(--shadow)}
.m-btn:hover{background:var(--card2);border-color:var(--bd2);transform:translateY(-1px);box-shadow:var(--shadow2)}
.m-btn i{font-size:1.2rem;width:1.6rem;text-align:center;font-style:normal;opacity:.7}
.m-btn em{flex:1;font-style:normal;font-weight:600}
.m-btn small{display:block;font-size:.72rem;color:var(--tx3);font-weight:400;margin-top:2px}

/* --- 03-modal.css --- */
/* ===== modal.css — 弹窗/遮罩 ===== */
.ov{position:fixed;inset:0;z-index:10000;background:rgba(80,60,40,.35);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.on{opacity:1;pointer-events:auto}
.mo{background:var(--card);border:1px solid var(--bd);border-radius:8px;width:clamp(400px,60vw,800px);max-height:82vh;display:flex;flex-direction:column;box-shadow:var(--shadow2)}
.mo.w{width:clamp(500px,80vw,1100px)}
.mo-h{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.2rem;border-bottom:1px solid var(--bd);border-radius:8px 8px 0 0;background:var(--bg2)}
.mo-h h2{font-size:1.05rem;font-weight:700;color:var(--bd3)}
.xb{background:none;border:none;color:var(--tx3);font-size:1.3rem;cursor:pointer;padding:.2rem .5rem;border-radius:4px;transition:all .15s}
.xb:hover{color:var(--red);background:var(--redBg)}
.mo-b{padding:1.2rem;overflow-y:auto;flex:1}
.mo-f{padding:.75rem 1.2rem;border-top:1px solid var(--bd);display:flex;gap:.5rem;justify-content:flex-end;background:var(--bg2);border-radius:0 0 8px 8px}

/* --- 04-forms.css --- */
/* ===== forms.css — 表单与按钮 ===== */
.fr{margin-bottom:.85rem}
.fl{display:block;font-size:.8rem;color:var(--tx2);margin-bottom:.3rem;font-weight:600}
.fi,.fsel,.ft{width:100%;background:#fff;border:1.5px solid var(--bd);color:var(--tx);padding:.55rem .75rem;font-size:.9rem;border-radius:5px;transition:border-color .2s;outline:none}
.fi:focus,.fsel:focus,.ft:focus{border-color:var(--gold)}
.ft{min-height:70px;resize:vertical}
.frr{display:flex;gap:.75rem;flex-wrap:wrap}.frr .fr{flex:1;min-width:100px;margin-bottom:0}

/* Buttons */
.b{padding:.5rem 1.1rem;font-size:.85rem;border:1.5px solid var(--bd);cursor:pointer;transition:all .15s;border-radius:5px;font-weight:600}
.bp{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border-color:var(--gold);text-shadow:0 1px 2px rgba(0,0,0,.15)}
.bp:hover{filter:brightness(1.08);transform:translateY(-1px)}
.bs{background:var(--card);color:var(--tx)}.bs:hover{background:var(--bg2);border-color:var(--bd2)}
.bd{background:var(--redBg);color:var(--red);border-color:var(--red)}.bd:hover{background:rgba(192,80,64,.2)}
.bsm{padding:.35rem .7rem;font-size:.78rem}
.bxs{padding:.25rem .5rem;font-size:.72rem}

/* --- 05-lists.css --- */
/* ===== lists.css — 列表/标签/选项卡 ===== */
.tg{display:inline-block;padding:.12rem .45rem;font-size:.7rem;border-radius:3px;font-weight:600}
.tg-gold{background:var(--goldBg);color:var(--gold);border:1px solid rgba(184,150,58,.3)}
.tg-red{background:var(--redBg);color:var(--red);border:1px solid rgba(192,80,64,.3)}
.tg-green{background:var(--greenBg);color:var(--green);border:1px solid rgba(80,128,80,.3)}
.tg-blue{background:var(--blueBg);color:var(--blue);border:1px solid rgba(64,112,160,.3)}

.sb{display:flex;gap:.5rem;margin-bottom:.8rem}.sb .fi{flex:1}
.li{display:flex;align-items:center;justify-content:space-between;padding:.65rem .9rem;background:var(--card);border:1px solid var(--bd);margin-bottom:.4rem;transition:all .15s;cursor:pointer;border-radius:5px}
.li:hover{border-color:var(--bd2);background:var(--card2);box-shadow:var(--shadow)}
.li-i{flex:1;min-width:0}.li-n{font-size:.9rem;font-weight:700}
.li-d{font-size:.75rem;color:var(--tx3);margin-top:2px}.li-a{display:flex;gap:.3rem;flex-shrink:0;margin-left:.5rem}
.tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:.8rem;gap:.3rem}
.tab{padding:.55rem 1rem;font-size:.85rem;color:var(--tx3);cursor:pointer;border:none;border-bottom:3px solid transparent;background:none;font-family:'GS',serif;font-weight:600;transition:all .15s;margin-bottom:-2px}
.tab:hover{color:var(--tx2)}.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.empty{text-align:center;padding:2rem;color:var(--tx3);font-size:.9rem}

/* --- 06-editor.css --- */
/* ===== editor.css — 编辑器布局 ===== */
#editor{position:fixed;inset:0;display:none;background:var(--bg)}
#editor.on{display:flex;flex-direction:column}
.ed-top{height:48px;background:var(--card);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 1rem;gap:1rem;flex-shrink:0;box-shadow:0 1px 4px rgba(60,40,20,.08)}
.ed-top h2{font-size:1rem;font-weight:700;color:var(--bd3);flex:1}
.ed-main{flex:1;display:flex;overflow:hidden}

/* Map area */
.ed-map{flex:1;position:relative;overflow:hidden;cursor:crosshair;background:#cde0f0}
.ed-map.dragging{cursor:grab}
#edCanvas{position:absolute;transform-origin:0 0}
#edImg{display:block;-webkit-user-drag:none;user-select:none}

/* Sidebar */
.ed-side{width:340px;background:var(--card);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.ed-side-tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--bg2);flex-shrink:0}
.ed-side-tab{flex:1;padding:.6rem;text-align:center;font-size:.82rem;font-weight:600;color:var(--tx3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
.ed-side-tab:hover{color:var(--tx2)}.ed-side-tab.on{color:var(--gold);border-bottom-color:var(--gold);background:var(--card)}
.ed-side-body{flex:1;overflow-y:auto;padding:.8rem}

/* Toolbar floating on map */
.ed-toolbar{position:absolute;top:.8rem;left:50%;transform:translateX(-50%);display:flex;gap:.4rem;background:var(--card);padding:.4rem .6rem;border:1px solid var(--bd);border-radius:8px;box-shadow:var(--shadow);z-index:10}
.ed-tool{width:42px;height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg2);border:1.5px solid var(--bd);border-radius:6px;cursor:pointer;font-size:.65rem;color:var(--tx3);transition:all .15s;gap:1px}
.ed-tool span{font-size:1rem}
.ed-tool:hover{background:var(--bg3);border-color:var(--bd2);color:var(--tx)}
.ed-tool.on{background:var(--goldBg);border-color:var(--gold);color:var(--gold)}

/* --- 07-map-entities.css --- */
/* ===== map-entities.css — 地图实体/小地图/弹出/通知/响应式 ===== */

/* Map entities */
.city-mk{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:5;transition:transform .08s;text-align:center;display:flex;flex-direction:column;align-items:center}
.city-mk:hover{z-index:20;transform:translate(-50%,-50%) scale(1.25)}
.city-mk.selected{z-index:25;filter:drop-shadow(0 0 6px var(--gold))}
.city-dot{border:2px solid rgba(0,0,0,.4);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.city-dot.circle{border-radius:50%}
.city-dot.square{border-radius:2px}
.city-lbl{font-size:.62rem;font-weight:700;color:var(--tx);text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff;white-space:nowrap;margin-top:2px;pointer-events:none;line-height:1}

/* Route/sea styles removed — using pixel-based sea detection now */

/* Color swatch */
.color-grid{display:flex;flex-wrap:wrap;gap:4px;margin:.4rem 0}
.color-sw{width:28px;height:28px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .12s}
.color-sw:hover{transform:scale(1.15)}.color-sw.on{border-color:var(--tx);box-shadow:0 0 0 2px var(--gold)}

/* Flag preview */
.flag-pv{width:72px;height:48px;border:1px solid var(--bd);border-radius:3px;display:flex;overflow:hidden}
.flag-pv div{flex:1}

/* Status bar at bottom of editor map */
.ed-status{position:absolute;bottom:0;left:0;right:0;height:32px;background:rgba(250,247,240,.9);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 1rem;font-size:.75rem;color:var(--tx3);gap:1.5rem;z-index:10;backdrop-filter:blur(4px)}

/* Minimap in editor */
.ed-mini{position:absolute;bottom:40px;left:8px;width:180px;height:110px;background:var(--card);border:1px solid var(--bd);border-radius:5px;overflow:hidden;z-index:10;box-shadow:var(--shadow)}
.ed-mini img{width:100%;height:100%;object-fit:cover;opacity:.8}
.ed-mini-vp{position:absolute;border:1.5px solid var(--gold);background:rgba(184,150,58,.1);pointer-events:none}

/* Popup for quick edit on map */
.map-popup{position:absolute;z-index:100;background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:1rem;box-shadow:var(--shadow2);min-width:260px;max-width:360px}
.map-popup .popup-title{font-size:.95rem;font-weight:700;color:var(--bd3);margin-bottom:.7rem;display:flex;align-items:center;justify-content:space-between}

/* Notification */
.nf{position:absolute;top:56px;right:12px;z-index:200;width:280px;display:flex;flex-direction:column;gap:.3rem}
.nfi{background:var(--card);border:1px solid var(--bd);border-left:4px solid var(--gold);padding:.5rem .75rem;font-size:.8rem;border-radius:0 5px 5px 0;box-shadow:var(--shadow);animation:nfin .25s ease-out,nfout .4s 3.5s forwards}
.nfi.war{border-left-color:var(--red)}.nfi.ok{border-left-color:var(--green)}.nfi.info{border-left-color:var(--blue)}
@keyframes nfin{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes nfout{to{opacity:0;transform:translateY(-8px)}}

/* Game styles now in 08-game.css */

/* Responsive */
@media(max-width:900px){.ed-side{width:280px}.mo{width:95vw}}
@media(max-width:600px){.ed-side{width:100%;position:absolute;bottom:0;height:50vh;border-left:none;border-top:1px solid var(--bd)}}

/* --- 08-game.css --- */
/* ===== game.css — 游戏运行时HUD ===== */

/* Game container */
#game{position:fixed;inset:0;display:none;background:var(--bg);z-index:5000}
#game.on{display:flex;flex-direction:column}

/* Top HUD bar */
.g-hud{height:44px;background:var(--card);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 .8rem;gap:.6rem;flex-shrink:0;box-shadow:0 1px 4px rgba(60,40,20,.08);z-index:100}
.g-hud-faction{font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:.4rem}
.g-hud-faction .fc{width:16px;height:16px;border-radius:3px;display:inline-block}
.g-hud-stat{font-size:.8rem;color:var(--tx2);display:flex;align-items:center;gap:.25rem;padding:.25rem .6rem;background:var(--bg2);border-radius:4px;border:1px solid var(--bd)}
.g-hud-stat b{color:var(--tx);font-weight:700}
.g-hud-stat .pos{color:var(--green)}.g-hud-stat .neg{color:var(--red)}
.g-hud-space{flex:1}

/* Time controls */
.g-time{display:flex;align-items:center;gap:.3rem;font-size:.82rem}
.g-time-date{font-weight:700;color:var(--bd3);min-width:120px;text-align:center}
.g-speed{width:30px;height:28px;background:var(--bg2);border:1px solid var(--bd);border-radius:4px;cursor:pointer;font-size:.72rem;font-weight:700;color:var(--tx3);display:flex;align-items:center;justify-content:center;transition:all .12s}
.g-speed:hover{background:var(--bg3);color:var(--tx)}.g-speed.on{background:var(--goldBg);border-color:var(--gold);color:var(--gold)}

/* Game map area */
.g-map{flex:1;position:relative;overflow:hidden;background:#cde0f0}
#gCanvas{position:absolute;transform-origin:0 0}
#gImg{display:block;-webkit-user-drag:none;user-select:none}
/* Route SVG removed */

/* Army marker on map */
.army-mk{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:8;display:flex;align-items:center;gap:2px;padding:1px 4px;background:rgba(255,255,255,.85);border:1.5px solid #888;border-radius:4px;font-size:.65rem;font-weight:700;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:transform .1s}
.army-mk:hover{z-index:25;transform:translate(-50%,-50%) scale(1.15)}
.army-mk.sel{border-color:var(--gold);box-shadow:0 0 6px var(--gold)}
.army-ico{font-size:.85rem;line-height:1}
.army-cnt{font-size:.65rem}

/* Bandit wandering on game map */
.bandit-gm{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:6;font-size:.9rem;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));transition:left .8s linear,top .8s linear}

/* Game sidebar panels */
.g-panel{position:absolute;right:0;top:0;bottom:0;width:320px;background:var(--card);border-left:1px solid var(--bd);display:flex;flex-direction:column;z-index:50;box-shadow:-2px 0 12px rgba(60,40,20,.1);transform:translateX(100%);transition:transform .2s}
.g-panel.on{transform:translateX(0)}
.g-panel-h{display:flex;align-items:center;justify-content:space-between;padding:.6rem .8rem;border-bottom:1px solid var(--bd);background:var(--bg2)}
.g-panel-h h3{font-size:.95rem;font-weight:700;color:var(--bd3)}
.g-panel-b{flex:1;overflow-y:auto;padding:.8rem}

/* City popup in game */
.g-city-popup{position:absolute;z-index:100;background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:.8rem;box-shadow:var(--shadow2);min-width:280px;max-width:380px}
.g-city-popup h4{font-size:.95rem;font-weight:700;color:var(--bd3);margin-bottom:.5rem}

/* Minimap in game */
.g-mini{position:absolute;bottom:8px;left:8px;width:180px;height:110px;background:var(--card);border:1px solid var(--bd);border-radius:5px;overflow:hidden;z-index:40;box-shadow:var(--shadow)}
.g-mini img{width:100%;height:100%;object-fit:cover;opacity:.8}
.g-mini-vp{position:absolute;border:1.5px solid var(--gold);background:rgba(184,150,58,.1);pointer-events:none}

/* Notification in game */
.g-nf{position:absolute;top:52px;right:12px;z-index:200;width:300px;display:flex;flex-direction:column;gap:.3rem}

/* Quick action buttons */
.g-actions{position:absolute;bottom:8px;right:8px;display:flex;gap:.4rem;z-index:40}
.g-act{padding:.4rem .7rem;font-size:.78rem;font-weight:600;background:var(--card);border:1px solid var(--bd);border-radius:5px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.g-act:hover{background:var(--card2);border-color:var(--bd2)}

/* Confirm dialog */
.g-confirm{position:fixed;inset:0;z-index:10001;background:rgba(80,60,40,.4);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center}
.g-confirm-box{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:1.5rem;min-width:320px;max-width:450px;box-shadow:var(--shadow2);text-align:center}
.g-confirm-box h3{font-size:1rem;font-weight:700;color:var(--bd3);margin-bottom:.8rem}
.g-confirm-box p{font-size:.88rem;color:var(--tx2);margin-bottom:1.2rem}
.g-confirm-btns{display:flex;gap:.5rem;justify-content:center}

/* Research panel */
.g-tech-item{display:flex;align-items:center;justify-content:space-between;padding:.5rem .7rem;background:var(--card);border:1px solid var(--bd);margin-bottom:.3rem;border-radius:5px;font-size:.82rem;cursor:pointer;transition:all .12s}
.g-tech-item:hover{background:var(--card2);border-color:var(--bd2)}
.g-tech-item.researched{opacity:.5;border-color:var(--green);background:var(--greenBg)}
.g-tech-item.active{border-color:var(--gold);background:var(--goldBg)}
.g-tech-bar{height:4px;background:var(--bg3);border-radius:2px;margin-top:3px;overflow:hidden}
.g-tech-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}

/* Law panel */
.g-law-cat{margin-bottom:.8rem}
.g-law-cat-title{font-size:.82rem;font-weight:700;color:var(--bd3);margin-bottom:.3rem}
.g-law-opt{display:flex;align-items:center;padding:.35rem .6rem;font-size:.8rem;cursor:pointer;border:1px solid transparent;border-radius:4px;margin-bottom:.2rem;transition:all .12s}
.g-law-opt:hover{background:var(--bg2)}
.g-law-opt.active{border-color:var(--gold);background:var(--goldBg);font-weight:700}
.g-law-fx{font-size:.7rem;color:var(--tx3);margin-left:auto}

/* Diplomacy */
.g-diplo-item{display:flex;align-items:center;justify-content:space-between;padding:.5rem .7rem;background:var(--card);border:1px solid var(--bd);margin-bottom:.3rem;border-radius:5px}
.g-diplo-item .fc{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:.4rem}

</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
<div class="m-title">铁与王冠</div>
<div class="m-sub">万 世 征 途</div>
<div class="m-btns" id="menuBtns"></div>
</div>

<!-- MODAL -->
<div id="ov" class="ov"><div class="mo" id="moc"><div class="mo-h"><h2 id="mot"></h2><button class="xb" id="moX">✕</button></div><div class="mo-b" id="mob"></div><div class="mo-f" id="mof"></div></div></div>

<!-- SCENARIO EDITOR -->
<div id="editor">
<div class="ed-top">
  <button class="b bs bsm" id="edBack">← 返回</button>
  <h2 id="edTitle">剧本编辑器</h2>
  <button class="b bs bsm" id="edSave">💾 保存剧本</button>
  <button class="b bp bsm" id="edPlay">▶ 测试运行</button>
</div>
<div class="ed-main">
  <div class="ed-map" id="edMap">
    <div id="edCanvas">
      <img id="edImg" draggable="false">
    </div>
    <div class="ed-toolbar" id="edToolbar"></div>
    <div class="ed-mini" id="edMini"><img id="edMiniImg" draggable="false"><div class="ed-mini-vp" id="edMiniVp"></div></div>
    <div class="ed-status" id="edStatus">就绪</div>
    <div class="nf" id="nf"></div>
  </div>
  <div class="ed-side">
    <div class="ed-side-tabs" id="edSideTabs"></div>
    <div class="ed-side-body" id="edSideBody"></div>
  </div>
</div>
</div>

<!-- GAME -->
<div id="game">
  <!-- HUD Top Bar -->
  <div class="g-hud">
    <div class="g-hud-faction"><span class="fc" id="gFacColor"></span><span id="gFacName">—</span></div>
    <div class="g-hud-stat"><span>💰</span><b id="gGold">0</b>(<span id="gIncome" class="pos">+0</span>)</div>
    <div class="g-hud-stat"><span>👥</span><b id="gPop">0</b></div>

// ===== NOTIFICATION =====
function notify(msg,type){
  // 游戏运行时用gNf，编辑器用nf
  var gNf=Q("gNf");
  var nf=Q("nf");
  var game=Q("game");
  var container=(game&&game.classList.contains("on")&&gNf)?gNf:nf;
  if(!container)return;
  var el=document.createElement("div");
  el.className="nfi "+(type||"");
  el.textContent=msg;
  container.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.remove()},4000);
}

var Modal={
  open:function(title,body,footer,wide){
    Q("mot").textContent=title;

// ===== map-ctrl.js — 地图控制器(左键拖拽+点击共存) =====

function MapCtrl(containerId,canvasId,imgId,miniId,miniImgId,miniVpId){
  var self=this;
  this.s=1;this.ox=0;this.oy=0;this.iw=0;this.ih=0;
  this.con=Q(containerId);this.cvs=Q(canvasId);this.img=Q(imgId);
  this.mini=Q(miniId);this.miniImg=Q(miniImgId);this.miniVp=Q(miniVpId);
  this.onClick=null;
  this._dragging=false;
  this._startX=0;this._startY=0;
  this._moved=false;
  this.entityClicked=false; // 实体标记设置此标志防止穿透

  // mousedown: 开始拖拽追踪
  this.con.addEventListener("mousedown",function(e){
    if(e.target.closest(".ed-toolbar,.ed-side,.ed-mini,.ed-status,.g-panel,.g-actions,.g-mini,.g-hud,.g-nf,.nf"))return;
    self._dragging=true;
    self._moved=false;
    self._startX=e.clientX;self._startY=e.clientY;
    self._lastX=e.clientX;self._lastY=e.clientY;
    e.preventDefault();
  });

  // mousemove: 超过5px阈值才开始实际拖拽
  window.addEventListener("mousemove",function(e){
    if(!self._dragging)return;
    var dx=e.clientX-self._startX;
    var dy=e.clientY-self._startY;
    if(!self._moved&&(Math.abs(dx)>5||Math.abs(dy)>5)){
      self._moved=true;
      self.con.style.cursor="grabbing";
    }
    if(self._moved){
      self.ox+=e.clientX-self._lastX;
      self.oy+=e.clientY-self._lastY;
      self.apply();
    }
    self._lastX=e.clientX;self._lastY=e.clientY;
  });

  // mouseup: 结束拖拽；如果没有移动过则触发点击
  window.addEventListener("mouseup",function(e){
    if(!self._dragging)return;
    self._dragging=false;
    self.con.style.cursor="";

    // 如果实体已经处理了点击，跳过
    if(self.entityClicked){self.entityClicked=false;self._moved=false;return}

    // 没有拖拽过 → 视为点击
    if(!self._moved&&self.onClick){
      var ig=e.target.closest(".ed-toolbar,.ed-side,.ed-mini,.ed-status,.g-panel,.g-actions,.g-mini,.g-hud,.g-nf,.nf,button,.b");
      if(!ig){
        var r=self.con.getBoundingClientRect();
        var mx=(e.clientX-r.left-self.ox)/self.s;
        var my=(e.clientY-r.top-self.oy)/self.s;
        self.onClick(mx,my,e);
      }
    }
    self._moved=false;
  });

  // 滚轮缩放
  this.con.addEventListener("wheel",function(e){
    e.preventDefault();
    var r=self.con.getBoundingClientRect();
    var mx=e.clientX-r.left,my=e.clientY-r.top;
    var os=self.s;
    self.s=CL(self.s*(e.deltaY>0?.88:1.12),.08,10);
    var rt=self.s/os;
    self.ox=mx-(mx-self.ox)*rt;self.oy=my-(my-self.oy)*rt;
    self.apply();
  },{passive:false});

  this.con.addEventListener("contextmenu",function(e){e.preventDefault()});

  this.img.onload=function(){
    self.iw=self.img.naturalWidth;self.ih=self.img.naturalHeight;
    var cw=self.con.clientWidth,ch=self.con.clientHeight;
    self.s=Math.min(cw/self.iw,ch/self.ih)*.85;
    self.ox=(cw-self.iw*self.s)/2;self.oy=(ch-self.ih*self.s)/2;
    self.apply();self.miniImg.src=self.img.src;
  };
}
MapCtrl.prototype.load=function(src){this.img.src=src};
MapCtrl.prototype.apply=function(){
  this.cvs.style.transform="translate("+this.ox+"px,"+this.oy+"px) scale("+this.s+")";
  if(!this.iw)return;
  var mw=this.mini.clientWidth,mh=this.mini.clientHeight;
  var sx=mw/this.iw,sy=mh/this.ih;
  var cw=this.con.clientWidth,ch=this.con.clientHeight;
  var vp=this.miniVp;
  vp.style.width=CL((cw/this.s)*sx,3,mw)+"px";
  vp.style.height=CL((ch/this.s)*sy,3,mh)+"px";
  vp.style.left=CL((-this.ox/this.s)*sx,0,mw)+"px";
  vp.style.top=CL((-this.oy/this.s)*sy,0,mh)+"px";
};

// ===== editor-core.js — 编辑器核心：初始化/工具/地图点击/碰撞检测 =====

var ED={
  sc:null, // current scenario
  map:null, // MapCtrl instance
  tool:"select", // current tool: select, city, seapoint, searoute, bandit, delete
  selected:null, // {type:"city"|"sea"|"bandit", id:string}
  sideTab:"factions",

  init:function(){
    var self=this;
    this.map=new MapCtrl("edMap","edCanvas","edImg","edMini","edMiniImg","edMiniVp");

    // Tools
    var tools=[
      {id:"select",ico:"\u{1F5B1}",label:"\u9009\u62E9"},
      {id:"city",ico:"\uD83C\uDFDB",label:"\u57CE\u6C60"},
      {id:"bandit",ico:"\uD83D\uDC80",label:"\u5320\u5BC7"},
      {id:"delete",ico:"\u274C",label:"\u5220\u9664"}
    ];
    var tbEl=Q("edToolbar");
    tools.forEach(function(t){
      var btn=document.createElement("button");
      btn.className="ed-tool"+(t.id===self.tool?" on":"");
      btn.dataset.tool=t.id;
      btn.innerHTML="<span>"+t.ico+"</span>"+t.label;
      btn.addEventListener("click",function(){self.setTool(t.id)});
      tbEl.appendChild(btn);
    });

    // Side tabs
    var sideTabs=[
      {id:"factions",label:"\u52BF\u529B"},
      {id:"cities",label:"\u57CE\u6C60"},
      {id:"bandits",label:"\u5320\u5BC7"},
      {id:"chars",label:"\u4EBA\u7269"},
      {id:"cultures",label:"\u6587\u5316"},
      {id:"system",label:"\u4F53\u7CFB"},
      {id:"settings",label:"\u8BBE\u7F6E"}
    ];
    var stEl=Q("edSideTabs");
    sideTabs.forEach(function(t){
      var btn=document.createElement("button");
      btn.className="ed-side-tab"+(t.id===self.sideTab?" on":"");
      btn.textContent=t.label;
      btn.addEventListener("click",function(){self.setSideTab(t.id)});
      stEl.appendChild(btn);
    });

    // Map click handler
    this.map.onClick=function(mx,my,e){self.onMapClick(mx,my,e)};
    this.map.onContext=function(mx,my,sx,sy){self.onMapContext(mx,my,sx,sy)};

    // Top buttons
    Q("edBack").addEventListener("click",function(){self.close()});
    Q("edSave").addEventListener("click",function(){self.saveScenario()});
    Q("edPlay").addEventListener("click",function(){
      self.saveScenario();
      if(!self.sc.factions.length){notify("\u8BF7\u5148\u6DFB\u52A0\u52BF\u529B","war");return}
      MENU.factionSelect(J(self.sc));
    });

    // Keyboard
    document.addEventListener("keydown",function(e){
      if(!Q("editor").classList.contains("on"))return;
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")return;
      if(e.key==="Escape"){
        if(Q("ov").classList.contains("on"))Modal.close();
        else if(self.selected){self.selected=null;self.render()}
        else self.close();
      }
      if(e.key==="1")self.setTool("select");
      if(e.key==="2")self.setTool("city");
      if(e.key==="3")self.setTool("bandit");
      if(e.key==="4")self.setTool("delete");
      if(e.key==="Delete"||e.key==="Backspace"){
        if(self.selected&&e.target.tagName!=="INPUT"){self.deleteSelected();e.preventDefault()}
      }
    });
  },

  open:function(scenario){
    this.sc=scenario;
    Q("edTitle").textContent="\u5267\u672C: "+E(scenario.name);
    Q("editor").classList.add("on");
    Q("menu").style.display="none";
    if(scenario.map){
      this.map.load(scenario.map);
    }else if(typeof DEFAULT_MAP!=="undefined"){
      scenario.map=DEFAULT_MAP;
      this.map.load(scenario.map);
    }else{
      // Fallback: simple blue canvas
      var c=document.createElement("canvas");c.width=1200;c.height=600;
      var ctx=c.getContext("2d");
      ctx.fillStyle="#6aaed6";ctx.fillRect(0,0,1200,600);
      scenario.map=c.toDataURL("image/jpeg",.7);
      this.map.load(scenario.map);
    }
    this.selected=null;
    this.tool="select";
    this.setTool("select");
    this.setSideTab("factions");
    this.render();
    this.updateStatus("");

  close:function(){
    Q("editor").classList.remove("on");

  },

  setTool:function(t){
    this.tool=t;
    var btns=Q("edToolbar").querySelectorAll(".ed-tool");
    for(var i=0;i<btns.length;i++)btns[i].classList.toggle("on",btns[i].dataset.tool===t);
    var hints={select:"\u62D6\u52A8\u5E73\u79FB\u5730\u56FE | \u70B9\u51FB\u9009\u4E2D\u5B9E\u4F53 | \u6EDA\u8F6E\u7F29\u653E",city:"\u70B9\u51FB\u5730\u56FE\u653E\u7F6E\u57CE\u6C60",bandit:"\u70B9\u51FB\u5730\u56FE\u653E\u7F6E\u5320\u5BC7",delete:"\u70B9\u51FB\u5B9E\u4F53\u5220\u9664"};

  setSideTab:function(t){
    this.sideTab=t;
    var tabs=Q("edSideTabs").querySelectorAll(".ed-side-tab");
    for(var i=0;i<tabs.length;i++)tabs[i].classList.toggle("on",tabs[i].textContent===({factions:"\u52BF\u529B",cities:"\u57CE\u6C60",bandits:"\u5320\u5BC7",chars:"\u4EBA\u7269",cultures:"\u6587\u5316",system:"\u4F53\u7CFB",settings:"\u8BBE\u7F6E"}[t]));
    this.renderSide();
  },

  updateStatus:function(msg){Q("edStatus").textContent=msg||"\u5C31\u7EEA"},

  // ===== MAP CLICK =====
  onMapClick:function(mx,my,e){
    var sc=this.sc;

    if(this.tool==="city"){
      this.showCityTypePopup(mx,my);
    }else if(this.tool==="bandit"){
      var bn={id:U(),name:"\u5320\u5BC7\u636E\u70B9"+(sc.bandits.length+1),x:mx,y:my,n:R(30,300),atk:R(3,8),def:R(2,6),cul:"",fid:""};
      sc.bandits.push(bn);
      notify("\u5320\u5BC7\u636E\u70B9\u5DF2\u653E\u7F6E","ok");
      this.autoSave();this.render();
    }else if(this.tool==="select"){
      var ht=this.hitTest(mx,my);
      if(ht){
        this.selected=ht;
        this.render();
        this.showEntityEditor(ht);
      }else{
        this.selected=null;
        this.render();
      }
    }else if(this.tool==="delete"){
      var ht2=this.hitTest(mx,my);
      if(ht2)this.deleteEntity(ht2);
    }
  },

  onMapContext:function(mx,my,sx,sy){
    // Right-click: always pan mode, no menu needed since we have toolbar
  },

  hitTest:function(mx,my){
    var sc=this.sc;var best=null;var bestDist=30;
    sc.cities.forEach(function(c){var d=Math.hypot(c.x-mx,c.y-my);if(d<bestDist){bestDist=d;best={type:"city",id:c.id}}});
    sc.bandits.forEach(function(b){var d=Math.hypot(b.x-mx,b.y-my);if(d<bestDist){bestDist=d;best={type:"bandit",id:b.id}}});
    return best;
  },

  deleteSelected:function(){
    if(this.selected)this.deleteEntity(this.selected);
  },

  deleteEntity:function(ent){
    var sc=this.sc;
    if(ent.type==="city"){sc.cities=sc.cities.filter(function(c){return c.id!==ent.id})}
    else if(ent.type==="bandit"){sc.bandits=sc.bandits.filter(function(b){return b.id!==ent.id})}
    this.selected=null;
    notify("\u5DF2\u5220\u9664","war");this.autoSave();
    this.render();this.renderSide();
  },

  getPoint:function(ref){
    if(ref.type==="city"){var c=this.sc.cities.find(function(x){return x.id===ref.id});return c?{x:c.x,y:c.y}:null}
    return null;
  },

// --- 07-editor-render.js ---
  // ===== editor-render.js — 地图实体渲染 =====

  render:function(){
    var sc=this.sc;var cvs=this.map.cvs;var self=this;
    var old=cvs.querySelectorAll(".city-mk,.bm");
    for(var i=0;i<old.length;i++)old[i].remove();

    // 城池
    sc.cities.forEach(function(c){
      var ct=CITY_TYPES.find(function(t){return t.id===c.type})||CITY_TYPES[0];
      var fac=sc.factions.find(function(f){return f.id===c.fid});
      var col=fac?fac.col:"#888";
      var sz=ct.size||10;
      var el=document.createElement("div");
      el.className="city-mk"+(self.selected&&self.selected.type==="city"&&self.selected.id===c.id?" selected":"");
      el.style.cssText="left:"+c.x+"px;top:"+c.y+"px";
      var dot=document.createElement("div");
      dot.className="city-dot "+(ct.shape||"circle");
      dot.style.cssText="width:"+sz+"px;height:"+sz+"px;background:"+col;
      el.appendChild(dot);
      var lbl=document.createElement("div");
      lbl.className="city-lbl";
      lbl.textContent=(c.port?"\u2693":"") +c.name;
      el.appendChild(lbl);
      el.addEventListener("mousedown",function(e){
        e.stopPropagation(); // 阻止地图拖拽
        self.map.entityClicked=true;
        self.onMapClick(c.x,c.y,e);
      });
      cvs.appendChild(el);
    });

    // 匪寇(显示图标+名称)
    sc.bandits.forEach(function(b){
      var el=document.createElement("div");
      el.className="bm";
      el.style.cssText="position:absolute;transform:translate(-50%,-50%);left:"+b.x+"px;top:"+b.y+"px;cursor:pointer;z-index:4;text-align:center";
      el.innerHTML="<div style=\"font-size:1rem;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))\">"+(b.ico||"\uD83D\uDC80")+"</div><div class=\"city-lbl\" style=\"font-size:.55rem\">"+E(b.name)+"</div>";
      el.addEventListener("mousedown",function(e){
        e.stopPropagation();
        self.map.entityClicked=true;
        self.onMapClick(b.x,b.y,e);
      });
      cvs.appendChild(el);
    });
  },

      h+="<div class=\"fr\"><label class=\"fl\">\u5267\u672C\u540D\u79F0</label><input class=\"fi\" id=\"setName\" value=\""+E(sc.name)+"\"></div>";

      h+="<div class=\"frr\"><div class=\"fr\"><label class=\"fl\">\u5730\u56FE\u5BBD(px)</label><input type=\"number\" class=\"fi\" id=\"setMapW\" value=\""+(sc.mapW||1495)+"\"></div><div class=\"fr\"><label class=\"fl\">\u5730\u56FE\u9AD8(px)</label><input type=\"number\" class=\"fi\" id=\"setMapH\" value=\""+(sc.mapH||1019)+"\"></div></div>";
      h+="<div class=\"fr\"><label class=\"fl\">\u66F4\u6362\u5730\u56FE\u5E95\u56FE</label><input type=\"file\" accept=\"image/*\" id=\"setMap\"></div>";
      h+="<div style=\"margin-top:.6rem;padding-top:.5rem;border-top:1px solid var(--bd)\">";
      h+="<div style=\"font-size:.85rem;font-weight:700;color:var(--bd3);margin-bottom:.3rem\">\uD83C\uDF0A \u6D77\u57DF\u68C0\u6D4B</div>";
      h+="<div class=\"frr\"><div class=\"fr\"><label class=\"fl\">\u6D77\u57DF\u989C\u8272</label><input type=\"color\" id=\"setSeaColor\" value=\""+(sc.seaColor||"#4a90d9")+"\" style=\"width:100%;height:30px;border:1px solid var(--bd);border-radius:4px\"></div>";
      h+="<div class=\"fr\"><label class=\"fl\">\u5BB9\u5DEE</label><input type=\"number\" class=\"fi\" id=\"setSeaTol\" value=\""+(sc.seaTolerance||35)+"\"></div></div>";
      h+="<div style=\"display:flex;gap:.3rem;margin-top:.3rem\"><button class=\"b bs bxs\" data-action=\"pickSeaColor\">\u5438\u53D6</button><button class=\"b bp bxs\" data-action=\"detectSea\">\u68C0\u6D4B\u6D77\u57DF</button></div>";
      if(sc.seaGrid){var seaN2=0;for(var si=0;si<sc.seaGrid.length;si++){if(sc.seaGrid.charAt(si)==="1")seaN2++}h+="<div style=\"font-size:.72rem;color:var(--green);margin-top:.2rem\">\u2713 \u5DF2\u68C0\u6D4B "+seaN2+"/"+(sc.seaGridW*sc.seaGridH)+"\u683C\u6D77\u57DF</div>"}
      h+="</div>";
      h+="<button class=\"b bs\" data-action=\"applySettings\" style=\"margin-top:.6rem;width:100%\">\u5E94\u7528\u8BBE\u7F6E</button>";
    }

    body.innerHTML=h;

    body.addEventListener("click",function(e){
      var target=e.target.closest("[data-action]");
      if(!target)return;
      var act=target.dataset.action;
      var id=target.dataset.id;
      if(act.indexOf("del")===0||act.indexOf("add")===0)e.stopPropagation();
      switch(act){
        case "addFaction":self.addFaction();break;
        case "editFaction":self.editFaction(id);break;
        case "delFaction":self.delFaction(id);break;
        case "selCity":self.selected={type:"city",id:id};self.render();self.showEntityEditor(self.selected);break;
        case "selBandit":self.selected={type:"bandit",id:id};self.render();self.showEntityEditor(self.selected);break;
        case "delBandit":self.deleteEntity({type:"bandit",id:id});break;
        case "addChar":self.addChar();break;
        case "editChar":self.editChar(id);break;
        case "delChar":self.delChar(id);break;
        case "addCulture":self.addCulture();break;
        case "editCulture":self.editCulture(id);break;
        case "delCulture":self.delCulture(id);break;
        case "viewPreset":self.viewScenarioPreset(parseInt(target.dataset.idx));break;
        case "applySettings":self.applySettings();break;
        case "pickSeaColor":self.pickSeaColor();break;
        case "detectSea":self.detectSea();break;
      }
    });

    if(t==="settings"&&Q("setMap")){
      Q("setMap").addEventListener("change",function(e){
        var f=e.target.files[0];if(!f)return;
        var r=new FileReader();
        r.onload=function(ev){sc.map=ev.target.result;self.map.load(sc.map);self.autoSave();notify("\u5730\u56FE\u5DF2\u66F4\u6362","ok")};
        r.readAsDataURL(f);
      });
    }
  },

  // ===== CRUD: FACTIONS =====
  addFaction:function(){
    var sc=this.sc;
    var col=COLORS[sc.factions.length%COLORS.length];
    sc.factions.push({id:U(),name:"\u65B0\u52BF\u529B"+(sc.factions.length+1),col:col,fc:[col,"#fff","#333"],gold:1000,presetId:"",initTechs:[],initLaws:{}});
    this.autoSave();this.renderSide();
  },
  editFaction:function(fid){
    var sc=this.sc;var self=this;
    var f=sc.factions.find(function(x){return x.id===fid});if(!f)return;
    if(!f.initTechs)f.initTechs=[];
    if(!f.initLaws)f.initLaws={};
    // 获取该势力对应的预设包
    var preset=null;
    if(f.presetId&&sc.presets){preset=sc.presets.find(function(p){return p.id===f.presetId})}
    if(!preset&&sc.presets&&sc.presets.length)preset=sc.presets[0];
    var facTechs=preset?preset.techs:(sc.techs||[]);
    var facLaws=preset?preset.laws:(sc.laws||{});

    var h="<div class=\"fr\"><label class=\"fl\">\u540D\u79F0</label><input class=\"fi\" id=\"ef_n\" value=\""+E(f.name)+"\"></div>";
    h+="<div class=\"fr\"><label class=\"fl\">\u4EE3\u8868\u8272</label><div class=\"color-grid\">";
    COLORS.forEach(function(c){h+="<div class=\"color-sw"+(c===f.col?" on":"")+"\" style=\"background:"+c+"\" data-c=\""+c+"\"></div>"});
    h+="</div></div>";
    h+="<div class=\"frr\"><div class=\"fr\"><label class=\"fl\">\u521D\u59CB\u91D1\u5E01</label><input type=\"number\" class=\"fi\" id=\"ef_g\" value=\""+(f.gold||1000)+"\"></div>";
    h+="<div class=\"fr\"><label class=\"fl\">\u6587\u5316</label><select class=\"fsel\" id=\"ef_cul\"><option value=\"\">\u65E0</option>"+sc.cultures.map(function(cu){return "<option value=\""+cu.id+"\""+(cu.id===f.cul?" selected":"")+">"+E(cu.name)+"</option>"}).join("")+"</select></div></div>";
    // 预设体系
    var presets=sc.presets||[];
    var presetOpts="<option value=\"\">\u9ED8\u8BA4</option>";
    presets.forEach(function(p){presetOpts+="<option value=\""+p.id+"\""+(p.id===f.presetId?" selected":"")+">"+E(p.name)+"</option>"});
    h+="<div class=\"fr\"><label class=\"fl\">\u79D1\u6280+\u6CD5\u5F8B\u4F53\u7CFB</label><select class=\"fsel\" id=\"ef_preset\">"+presetOpts+"</select></div>";
    // 初始科技(多选)
    h+="<div class=\"fr\"><label class=\"fl\">\u521D\u59CB\u5DF2\u7814\u7A76\u79D1\u6280(\u591A\u9009)</label><select class=\"fsel\" id=\"ef_itechs\" multiple style=\"min-height:80px\">";
    facTechs.forEach(function(t){h+="<option value=\""+t.id+"\""+(f.initTechs.indexOf(t.id)>=0?" selected":"")+">"+E(t.name)+"</option>"});
    h+="</select></div>";
    // 初始法律(每类一个下拉)
    h+="<div style=\"font-size:.8rem;font-weight:600;color:var(--tx2);margin:.4rem 0 .2rem\">\u521D\u59CB\u6CD5\u5F8B</div>";
    LAW_CATS.forEach(function(cat){
      var laws=facLaws[cat.id]||[];
      if(!laws.length)return;
      h+="<div class=\"fr\"><label class=\"fl\">"+cat.ico+" "+E(cat.name)+"</label><select class=\"fsel\" id=\"ef_law_"+cat.id+"\">";
      laws.forEach(function(law,li){h+="<option value=\""+li+"\""+(f.initLaws[cat.id]===li?" selected":"")+">"+E(law.name)+"</option>"});
      h+="</select></div>";
    });

    Modal.open("\u7F16\u8F91\u52BF\u529B: "+E(f.name),h,"<button class=\"b bs\" onclick=\"Modal.close()\">\u53D6\u6D88</button><button class=\"b bp\" id=\"efSave\">\u4FDD\u5B58</button>",true);
    var swatches=Q("mob").querySelectorAll(".color-sw");
    for(var i=0;i<swatches.length;i++){
      swatches[i].addEventListener("click",function(){
        for(var j=0;j<swatches.length;j++)swatches[j].classList.remove("on");
        this.classList.add("on");
      });
    }
    Q("efSave").addEventListener("click",function(){
      f.name=Q("ef_n").value||f.name;
      f.gold=parseInt(Q("ef_g").value)||1000;
      f.cul=Q("ef_cul")?Q("ef_cul").value:"";
      f.presetId=Q("ef_preset")?Q("ef_preset").value:"";
      var sel=Q("mob").querySelector(".color-sw.on");
      if(sel)f.col=sel.dataset.c;f.fc=[f.col,"#fff","#333"];
      // 保存初始科技
      f.initTechs=[];
      var itSel=Q("ef_itechs");
      if(itSel){for(var k=0;k<itSel.options.length;k++){if(itSel.options[k].selected)f.initTechs.push(itSel.options[k].value)}}
      // 保存初始法律
      f.initLaws={};
      LAW_CATS.forEach(function(cat){
        var lawSel=Q("ef_law_"+cat.id);
        if(lawSel)f.initLaws[cat.id]=parseInt(lawSel.value)||0;
      });
      self.autoSave();Modal.close();self.render();self.renderSide();notify("\u52BF\u529B\u5DF2\u66F4\u65B0","ok");
    });
  },

  editTech:function(tid){
    var sc=this.sc;var self=this;
    var tech=sc.techs.find(function(x){return x.id===tid});if(!tech)return;
    var eraOpts=TECH_ERAS.map(function(e){return "<option value=\""+e.id+"\""+(e.id===tech.era?" selected":"")+">"+E(e.name)+"</option>"}).join("");
    // 前置科技多选
    var reqOpts=sc.techs.filter(function(x){return x.id!==tid}).map(function(x){var sel=tech.req.indexOf(x.id)>=0?" selected":"";return "<option value=\""+x.id+"\""+sel+">"+E(x.name)+"</option>"}).join("");
    // 效果字段
    var fxKeys=["atk","def","eco","pop","research","speed","naval","siege"];
    var h="<div class=\"fr\"><label class=\"fl\">\u540D\u79F0</label><input class=\"fi\" id=\"et_n\" value=\""+E(tech.name)+"\"></div>";
    h+="<div class=\"frr\"><div class=\"fr\"><label class=\"fl\">\u65F6\u4EE3</label><select class=\"fsel\" id=\"et_era\">"+eraOpts+"</select></div><div class=\"fr\"><label class=\"fl\">\u8D39\u7528</label><input type=\"number\" class=\"fi\" id=\"et_cost\" value=\""+tech.cost+"\"></div></div>";

  // === 海域颜色吸取 ===
  pickSeaColor:function(){
    var self=this;
    notify("\u70B9\u51FB\u5730\u56FE\u4E0A\u7684\u6D77\u57DF\u533A\u57DF\u5438\u53D6\u989C\u8272","info");
    // 临时覆盖地图点击
    var oldClick=this.map.onClick;
    this.map.onClick=function(mx,my,e){
      // 从地图图片读取像素颜色
      var img=self.map.img;
      var cvs=document.createElement("canvas");
      cvs.width=img.naturalWidth;cvs.height=img.naturalHeight;
      var ctx=cvs.getContext("2d");
      ctx.drawImage(img,0,0);
      var px=Math.round(CL(mx,0,cvs.width-1));
      var py=Math.round(CL(my,0,cvs.height-1));
      var pixel=ctx.getImageData(px,py,1,1).data;
      var hex="#"+((1<<24)+(pixel[0]<<16)+(pixel[1]<<8)+pixel[2]).toString(16).slice(1);
      self.sc.seaColor=hex;
      var colorInput=Q("setSeaColor");
      if(colorInput)colorInput.value=hex;
      notify("\u5DF2\u5438\u53D6\u989C\u8272: "+hex,"ok");
      // 恢复原来的点击处理
      self.map.onClick=oldClick;
    };
  },

  // === 海域自动检测(网格位图) ===
  detectSea:function(){
    var sc=this.sc;
    var seaColor=Q("setSeaColor")?Q("setSeaColor").value:(sc.seaColor||"#4a90d9");
    var tolerance=parseInt(Q("setSeaTol")?Q("setSeaTol").value:35)||35;
    sc.seaColor=seaColor;sc.seaTolerance=tolerance;
    var tr=parseInt(seaColor.slice(1,3),16),tg2=parseInt(seaColor.slice(3,5),16),tb=parseInt(seaColor.slice(5,7),16);
    var img=this.map.img;
    if(!img.naturalWidth){notify("\u8BF7\u5148\u4E0A\u4F20\u5730\u56FE","war");return}
    notify("\u68C0\u6D4B\u4E2D...","info");
    var cvs=document.createElement("canvas");
    var w=img.naturalWidth,ht=img.naturalHeight,step=8;
    var gw=Math.ceil(w/step),gh=Math.ceil(ht/step);
    cvs.width=gw;cvs.height=gh;
    var ctx=cvs.getContext("2d");ctx.drawImage(img,0,0,gw,gh);
    var data=ctx.getImageData(0,0,gw,gh).data;
    var grid="";var seaN=0;var tolSq=tolerance*tolerance*3;
    for(var j=0;j<data.length;j+=4){
      var dr=data[j]-tr,dg=data[j+1]-tg2,db2=data[j+2]-tb;
      if(dr*dr+dg*dg+db2*db2<tolSq){grid+="1";seaN++}else{grid+="0"}
    }
    sc.seaGrid=grid;sc.seaGridW=gw;sc.seaGridH=gh;sc.seaStep=step;
    delete sc.seaMask;
    this.autoSave();
    notify("\u6D77\u57DF\u68C0\u6D4B\u5B8C\u6210 "+seaN+"/"+gw*gh+"\u683C","ok");
    this.renderSide();
  },

    Modal.open("\u5B58\u6863\u7BA1\u7406",h,"<button class=\"b bs\" onclick=\"Modal.close()\">\u5173\u95ED</button>",true);

    var loadBtns=Q("mob").querySelectorAll(".save-load");
    for(var i=0;i<loadBtns.length;i++){
      loadBtns[i].addEventListener("click",function(e){

        Modal.close();GAME.loadGame(save);

    var delBtns=Q("mob").querySelectorAll(".save-del");
    for(var j=0;j<delBtns.length;j++){
      delBtns[j].addEventListener("click",function(e){
        e.stopPropagation();if(!confirm("\u5220\u9664\u8BE5\u5B58\u6863\uFF1F"))return;

  // === 预设包管理器 ===
  // 预设包结构: {id, name, techs:[], laws:{}, units:[]}
  getPresets:function(){return LS.get("presets")||[{id:"default",name:"\u6807\u51C6\u4F53\u7CFB",techs:J(DEF_TECHS),laws:J(DEF_LAWS),units:J(DEF_UNIT)}]},
  savePresets:function(list){LS.set("presets",list)},

  presetManager:function(){

    var h="<div style=\"font-size:.82rem;color:var(--tx2);margin-bottom:.6rem\">\u521B\u5EFA\u591A\u5957\u79D1\u6280\u6811+\u6CD5\u5F8B\u9884\u8BBE\u5305\uFF0C\u5728\u5267\u672C\u4E2D\u4E3A\u6BCF\u4E2A\u52BF\u529B\u5206\u914D\u4E0D\u540C\u4F53\u7CFB\u3002</div>";
    h+="<button class=\"b bp\" id=\"pNewPreset\" style=\"width:100%;margin-bottom:.6rem\">+ \u65B0\u5EFA\u9884\u8BBE\u5305</button>";
    presets.forEach(function(p,i){
      var tCount=p.techs?p.techs.length:0;
      var uCount=p.units?p.units.length:0;
      var lCount=0;if(p.laws){LAW_CATS.forEach(function(c){lCount+=(p.laws[c.id]||[]).length})}
      h+="<div class=\"li\" style=\"margin-bottom:.4rem\"><div class=\"li-i\"><div class=\"li-n\">"+E(p.name)+"</div><div class=\"li-d\">"+tCount+"\u79D1\u6280 | "+uCount+"\u5175\u79CD | "+lCount+"\u6CD5\u5F8B</div></div><div class=\"li-a\">";
      h+="<button class=\"b bsm bp p-edit\" data-i=\""+i+"\">\u7F16\u8F91</button>";
      h+="<button class=\"b bsm bs p-dup\" data-i=\""+i+"\">\u590D\u5236</button>";
      if(p.id!=="default")h+="<button class=\"b bsm bd p-del\" data-i=\""+i+"\">\u5220</button>";
      h+="</div></div>";
    });
    Modal.open("\u4E16\u754C\u4F53\u7CFB\u7F16\u8F91\u5668",h,"<button class=\"b bs\" onclick=\"Modal.close()\">\u5173\u95ED</button>",true);

    Q("pNewPreset").addEventListener("click",function(){
      var list=MENU.getPresets();
      list.push({id:U(),name:"\u65B0\u4F53\u7CFB"+(list.length),techs:J(DEF_TECHS),laws:J(DEF_LAWS),units:J(DEF_UNIT)});
      MENU.savePresets(list);Modal.close();MENU.presetManager();
    });
    var editBtns=Q("mob").querySelectorAll(".p-edit");
    for(var i=0;i<editBtns.length;i++){
      editBtns[i].addEventListener("click",function(e){
        e.stopPropagation();
        var idx=parseInt(this.dataset.i);
        Modal.close();MENU.editPreset(idx);
      });
    }
    var dupBtns=Q("mob").querySelectorAll(".p-dup");
    for(var d=0;d<dupBtns.length;d++){
      dupBtns[d].addEventListener("click",function(e){
        e.stopPropagation();
        var idx=parseInt(this.dataset.i);
        var list=MENU.getPresets();
        var src=J(list[idx]);src.id=U();src.name=src.name+"\u526F\u672C";
        list.push(src);MENU.savePresets(list);Modal.close();MENU.presetManager();
      });
    }
    var delBtns=Q("mob").querySelectorAll(".p-del");
    for(var j=0;j<delBtns.length;j++){
      delBtns[j].addEventListener("click",function(e){
        e.stopPropagation();if(!confirm("\u5220\u9664\u8FD9\u4E2A\u9884\u8BBE\u5305\uFF1F"))return;
        var idx=parseInt(this.dataset.i);
        var list=MENU.getPresets();list.splice(idx,1);MENU.savePresets(list);
        Modal.close();MENU.presetManager();
      });
    }
  },

  editPreset:function(idx){
    var presets=this.getPresets();
    var p=presets[idx];if(!p)return;
    this._editingPreset=p;
    this._editingPresetIdx=idx;
    this._presetTab="tech"; // tech or law
    this.renderPresetEditor();
  },

  renderPresetEditor:function(){
    var self=this;
    var p=this._editingPreset;
    var idx=this._editingPresetIdx;
    var presets=this.getPresets();
    var tab=this._presetTab;

    var h="<div class=\"fr\"><label class=\"fl\">\u9884\u8BBE\u5305\u540D\u79F0</label><input class=\"fi\" id=\"epName\" value=\""+E(p.name)+"\"></div>";
    if(!p.units)p.units=J(DEF_UNIT);
    // 标签切换
    h+="<div class=\"tabs\" style=\"margin-bottom:.6rem\">";
    h+="<div class=\"tab"+(tab==="tech"?" on":"")+"\" data-action=\"presetTab\" data-tab=\"tech\">\uD83D\uDD2C \u79D1\u6280 ("+p.techs.length+")</div>";
    h+="<div class=\"tab"+(tab==="unit"?" on":"")+"\" data-action=\"presetTab\" data-tab=\"unit\">\uD83D\uDEE1 \u5175\u79CD ("+(p.units?p.units.length:0)+")</div>";
    var lc=0;if(p.laws){LAW_CATS.forEach(function(c){lc+=(p.laws[c.id]||[]).length})}
    h+="<div class=\"tab"+(tab==="law"?" on":"")+"\" data-action=\"presetTab\" data-tab=\"law\">\uD83D\uDCDC \u6CD5\u5F8B ("+lc+")</div>";
    h+="</div>";

    if(tab==="tech"){
      h+="<button class=\"b bp bsm\" data-action=\"addPresetTech\" style=\"margin-bottom:.5rem\">+ \u65B0\u589E\u79D1\u6280</button>";
      h+="<div style=\"max-height:50vh;overflow-y:auto\">";
      TECH_ERAS.forEach(function(era){
        var arr=p.techs.filter(function(t){return t.era===era.id});
        if(!arr.length)return;
        h+="<div style=\"font-size:.75rem;font-weight:700;color:var(--gold);margin:.5rem 0 .2rem;border-bottom:1px solid var(--bd);padding-bottom:.15rem\">\u2606 "+E(era.name)+" ("+arr.length+")</div>";
        arr.forEach(function(t){
          var reqNames=t.req.map(function(rid){var rt=p.techs.find(function(x){return x.id===rid});return rt?rt.name:rid}).join(",");
          h+="<div class=\"li\" style=\"font-size:.8rem\" data-action=\"editPresetTech\" data-id=\""+t.id+"\"><div class=\"li-i\"><div class=\"li-n\">"+E(t.name)+" <span class=\"tg tg-gold\">\u8D39"+t.cost+"</span></div><div class=\"li-d\">"+E(t.desc||"")+(reqNames?" | \u524D\u7F6E:"+reqNames:"")+"</div></div><div class=\"li-a\"><button class=\"b bxs bd\" data-action=\"delPresetTech\" data-id=\""+t.id+"\">\u2715</button></div></div>";
        });
      });
      h+="</div>";
    }else if(tab==="unit"){
      h+="<button class=\"b bp bsm\" data-action=\"addPresetUnit\" style=\"margin-bottom:.5rem\">+ \u65B0\u589E\u5175\u79CD</button>";
      h+="<div style=\"max-height:50vh;overflow-y:auto\">";
      (p.units||[]).forEach(function(u){
        var techName="";if(u.reqTech){var rt2=p.techs.find(function(x){return x.id===u.reqTech});if(rt2)techName=" \u9700:"+rt2.name}
        h+="<div class=\"li\" style=\"font-size:.8rem\" data-action=\"editPresetUnit\" data-id=\""+u.id+"\"><div class=\"li-i\"><div class=\"li-n\">"+E(u.name)+" <span class=\"tg tg-blue\">"+({land:"\u9646",naval:"\u6D77",air:"\u7A7A"}[u.tp]||u.tp)+"</span> <span class=\"tg tg-gold\">"+E(u.cul)+"</span></div><div class=\"li-d\">\u653B"+u.atk+" \u9632"+u.def+" \u8D39"+u.cost+E(techName)+"</div></div><div class=\"li-a\"><button class=\"b bxs bd\" data-action=\"delPresetUnit\" data-id=\""+u.id+"\">\u2715</button></div></div>";
      });
      h+="</div>";
    }else{
      // 法律编辑
      h+="<div style=\"max-height:50vh;overflow-y:auto\">";
      LAW_CATS.forEach(function(cat){
        var items=(p.laws||{})[cat.id]||[];
        h+="<div style=\"font-size:.78rem;font-weight:700;color:var(--bd3);margin:.5rem 0 .2rem\">"+cat.ico+" "+E(cat.name)+" ("+items.length+")</div>";
        items.forEach(function(law,li){
          var tn="\u65E0";if(law.reqTech){var tt=p.techs.find(function(x){return x.id===law.reqTech});if(tt)tn=tt.name}
          var fxStr=Object.keys(law.fx||{}).map(function(k){return k+(law.fx[k]>0?"+":"")+law.fx[k]+"%"}).join(" ");
          h+="<div class=\"li\" style=\"font-size:.8rem\" data-action=\"editPresetLaw\" data-cat=\""+cat.id+"\" data-idx=\""+li+"\"><div class=\"li-i\"><div class=\"li-n\">"+E(law.name)+"</div><div class=\"li-d\">"+(fxStr||"")+(" | \u9700:"+E(tn))+"</div></div><div class=\"li-a\"><button class=\"b bxs bd\" data-action=\"delPresetLaw\" data-cat=\""+cat.id+"\" data-idx=\""+li+"\">\u2715</button></div></div>";
        });
        h+="<button class=\"b bs bxs\" data-action=\"addPresetLaw\" data-cat=\""+cat.id+"\" style=\"width:100%;margin-bottom:.4rem\">+ \u6DFB\u52A0"+E(cat.name)+"\u9009\u9879</button>";
      });
      h+="</div>";
    }

    // 底部工具
    h+="<div style=\"display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.6rem;padding-top:.5rem;border-top:1px solid var(--bd)\">";
    h+="<button class=\"b bs bsm\" id=\"epExport\">\u5BFC\u51FAJSON</button>";
    h+="<label class=\"b bs bsm\" style=\"cursor:pointer\">\u5BFC\u5165<input type=\"file\" accept=\".json\" id=\"epImport\" style=\"display:none\"></label>";
    h+="<button class=\"b bd bsm\" id=\"epResetDef\">\u91CD\u7F6E\u9ED8\u8BA4</button>";
    h+="</div>";

    Modal.open("\u7F16\u8F91\u4F53\u7CFB: "+E(p.name),h,"<button class=\"b bs\" id=\"epBack\">\u8FD4\u56DE\u5217\u8868</button><button class=\"b bp\" id=\"epSave\">\u4FDD\u5B58</button>",true);

    // 替换mob节点清除旧事件
    var oldMob=Q("mob");
    var newMob=document.createElement("div");
    newMob.id="mob";newMob.className=oldMob.className;
    newMob.innerHTML=oldMob.innerHTML;
    oldMob.parentNode.replaceChild(newMob,oldMob);

    // 事件委托（绑在新节点上，不会重复）
    newMob.addEventListener("click",function(e){
      var tgt=e.target.closest("[data-action]");
      if(!tgt)return;
      var act=tgt.dataset.action;
      if(act==="presetTab"){self._presetTab=tgt.dataset.tab;self.renderPresetEditor();return}
      if(act==="addPresetTech"){self.addPresetTech();return}
      if(act==="editPresetTech"){self.editPresetTechItem(tgt.dataset.id);return}
      if(act==="delPresetTech"){e.stopPropagation();self.delPresetTechItem(tgt.dataset.id);return}
      if(act==="addPresetLaw"){self.addPresetLawItem(tgt.dataset.cat);return}
      if(act==="editPresetLaw"){self.editPresetLawItem(tgt.dataset.cat,parseInt(tgt.dataset.idx));return}
      if(act==="delPresetLaw"){e.stopPropagation();self.delPresetLawItem(tgt.dataset.cat,parseInt(tgt.dataset.idx));return}
      if(act==="addPresetUnit"){self.addPresetUnitItem();return}
      if(act==="editPresetUnit"){self.editPresetUnitItem(tgt.dataset.id);return}
      if(act==="delPresetUnit"){e.stopPropagation();self.delPresetUnitItem(tgt.dataset.id);return}
    });

    Q("epSave").addEventListener("click",function(){
      p.name=Q("epName").value||p.name;
      presets[idx]=p;MENU.savePresets(presets);
      notify("\u4F53\u7CFB\u5DF2\u4FDD\u5B58","ok");Modal.close();MENU.presetManager();
    });
    Q("epBack").addEventListener("click",function(){
      p.name=Q("epName").value||p.name;
      presets[idx]=p;MENU.savePresets(presets);
      Modal.close();MENU.presetManager();
    });
    Q("epExport").addEventListener("click",function(){
      var blob=new Blob([JSON.stringify(p,null,2)],{type:"application/json"});
      var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=p.name+".json";a.click();
    });
    Q("epImport").addEventListener("change",function(e){
      var f=e.target.files[0];if(!f)return;
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var data=JSON.parse(ev.target.result);
          if(data.techs&&data.laws){
            p.techs=data.techs;p.laws=data.laws;if(data.name)p.name=data.name;
            self._editingPreset=p;
            notify("\u5DF2\u5BFC\u5165","ok");self.renderPresetEditor();
          }else{notify("\u683C\u5F0F\u9519\u8BEF","war")}
        }catch(ex){notify("\u89E3\u6790\u5931\u8D25","war")}
      };reader.readAsText(f);
    });
    Q("epResetDef").addEventListener("click",function(){
      p.techs=J(DEF_TECHS);p.laws=J(DEF_LAWS);p.units=J(DEF_UNIT);self._editingPreset=p;
      notify("\u5DF2\u91CD\u7F6E","ok");self.renderPresetEditor();
    });
  },

  // === 科技项编辑 ===
  addPresetTech:function(){
    var p=this._editingPreset;
    p.techs.push({id:U(),name:"\u65B0\u79D1\u6280",era:"ancient",cost:100,req:[],fx:{},desc:""});
    this.renderPresetEditor();
  },
  delPresetTechItem:function(tid){
    var p=this._editingPreset;
    p.techs=p.techs.filter(function(t){return t.id!==tid});
    this.renderPresetEditor();
  },
  editPresetTechItem:function(tid){
    var self=this;var p=this._editingPreset;
    var tech=p.techs.find(function(t){return t.id===tid});if(!tech)return;
    var eraOpts=TECH_ERAS.map(function(e){return "<option value=\""+e.id+"\""+(e.id===tech.era?" selected":"")+">"+E(e.name)+"</option>"}).join("");
    var reqOpts=p.techs.filter(function(x){return x.id!==tid}).map(function(x){return "<option value=\""+x.id+"\""+(tech.req.indexOf(x.id)>=0?" selected":"")+">"+E(x.name)+"</option>"}).join("");
    var fxKeys=["atk","def","eco","pop","research","speed","naval","siege"];
    var h2="<div class=\"fr\"><label class=\"fl\">\u540D\u79F0</label><input class=\"fi\" id=\"pt_n\" value=\""+E(tech.name)+"\"></div>";
    h2+="<div class=\"frr\"><div class=\"fr\"><label class=\"fl\">\u65F6\u4EE3</label><select class=\"fsel\" id=\"pt_era\">"+eraOpts+"</select></div><div class=\"fr\"><label class=\"fl\">\u8D39\u7528</label><input type=\"number\" class=\"fi\" id=\"pt_cost\" value=\""+tech.cost+"\"></div></div>";
    h2+="<div class=\"fr\"><label class=\"fl\">\u524D\u7F6E\u79D1\u6280(\u591A\u9009)</label><select class=\"fsel\" id=\"pt_req\" multiple style=\"min-height:60px\">"+reqOpts+"</select></div>";
    h2+="<div class=\"fr\"><label class=\"fl\">\u63CF\u8FF0</label><input class=\"fi\" id=\"pt_desc\" value=\""+E(tech.desc||"")+"\"></div>";
    h2+="<div style=\"font-size:.78rem;font-weight:600;color:var(--tx2);margin-bottom:.3rem\">\u6548\u679C(%)</div><div class=\"frr\">";
    fxKeys.forEach(function(k){h2+="<div class=\"fr\" style=\"min-width:70px\"><label class=\"fl\">"+k+"</label><input type=\"number\" class=\"fi bsm\" id=\"pt_fx_"+k+"\" value=\""+(tech.fx[k]||0)+"\"></div>"});
    h2+="</div>";
    Modal.open("\u7F16\u8F91\u79D1\u6280",h2,"<button class=\"b bs\" id=\"ptCancel\">\u53D6\u6D88</button><button class=\"b bp\" id=\"ptOk\">\u786E\u5B9A</button>");
    Q("ptOk").addEventListener("click",function(){
      tech.name=Q("pt_n").value||tech.name;tech.era=Q("pt_era").value;tech.cost=parseInt(Q("pt_cost").value)||100;
      tech.desc=Q("pt_desc").value;tech.req=[];
      var sel=Q("pt_req");for(var i=0;i<sel.options.length;i++){if(sel.options[i].selected)tech.req.push(sel.options[i].value)}
      tech.fx={};fxKeys.forEach(function(k){var v=parseInt(Q("pt_fx_"+k).value);if(v)tech.fx[k]=v});
      Modal.close();self.renderPresetEditor();
    });
    Q("ptCancel").addEventListener("click",function(){Modal.close();self.renderPresetEditor()});
  },

  // === 法律项编辑 ===
  addPresetLawItem:function(catId){
    var p=this._editingPreset;
    if(!p.laws)p.laws={};if(!p.laws[catId])p.laws[catId]=[];
    p.laws[catId].push({id:U(),name:"\u65B0\u6CD5\u5F8B",fx:{},desc:"",reqTech:""});
    this.renderPresetEditor();
  },
  delPresetLawItem:function(catId,idx){
    var p=this._editingPreset;
    if(p.laws&&p.laws[catId])p.laws[catId].splice(idx,1);
    this.renderPresetEditor();
  },
  editPresetLawItem:function(catId,idx){
    var self=this;var p=this._editingPreset;
    var law=(p.laws[catId]||[])[idx];if(!law)return;
    var fxKeys=["atk","def","eco","pop","research","speed","naval"];
    var techOpts="<option value=\"\">\u65E0\u9700\u79D1\u6280</option>";
    p.techs.forEach(function(t){techOpts+="<option value=\""+t.id+"\""+(t.id===law.reqTech?" selected":"")+">"+E(t.name)+"</option>"});
    var h2="<div class=\"fr\"><label class=\"fl\">\u540D\u79F0</label><input class=\"fi\" id=\"pl_n\" value=\""+E(law.name)+"\"></div>";
    h2+="<div class=\"fr\"><label class=\"fl\">\u63CF\u8FF0</label><input class=\"fi\" id=\"pl_desc\" value=\""+E(law.desc||"")+"\"></div>";
    h2+="<div class=\"fr\"><label class=\"fl\">\u9700\u8981\u79D1\u6280</label><select class=\"fsel\" id=\"pl_req\">"+techOpts+"</select></div>";
    h2+="<div style=\"font-size:.78rem;font-weight:600;color:var(--tx2);margin-bottom:.3rem\">\u6548\u679C(%)</div><div class=\"frr\">";
    fxKeys.forEach(function(k){h2+="<div class=\"fr\" style=\"min-width:70px\"><label class=\"fl\">"+k+"</label><input type=\"number\" class=\"fi bsm\" id=\"pl_fx_"+k+"\" value=\""+(law.fx[k]||0)+"\"></div>"});
    h2+="</div>";
    Modal.open("\u7F16\u8F91\u6CD5\u5F8B",h2,"<button class=\"b bs\" id=\"plCancel\">\u53D6\u6D88</button><button class=\"b bp\" id=\"plOk\">\u786E\u5B9A</button>");
    Q("plOk").addEventListener("click",function(){
      law.name=Q("pl_n").value||law.name;law.desc=Q("pl_desc").value;law.reqTech=Q("pl_req").value;
      law.fx={};fxKeys.forEach(function(k){var v=parseInt(Q("pl_fx_"+k).value);if(v)law.fx[k]=v});
      Modal.close();self.renderPresetEditor();
    });
    Q("plCancel").addEventListener("click",function(){Modal.close();self.renderPresetEditor()});
  },

  // === 兵种项编辑 ===
  addPresetUnitItem:function(){
    var p=this._editingPreset;
    if(!p.units)p.units=[];
    p.units.push({id:U(),name:"\u65B0\u5175\u79CD",cul:"\u901A\u7528",tp:"land",atk:5,def:5,cost:20,up:2,reqTech:""});
    this.renderPresetEditor();
  },
  delPresetUnitItem:function(uid){
    var p=this._editingPreset;
    p.units=(p.units||[]).filter(function(u){return u.id!==uid});
    this.renderPresetEditor();
  },
  editPresetUnitItem:function(uid){
    var self=this;var p=this._editingPreset;
    var u=(p.units||[]).find(function(x){return x.id===uid});if(!u)return;
    var techOpts="<option value=\"\">\u65E0\u9700\u79D1\u6280</option>";
    p.techs.forEach(function(t){techOpts+="<option value=\""+t.id+"\""+(t.id===u.reqTech?" selected":"")+">"+E(t.name)+"</option>"});
    var h2="<div class=\"fr\"><label class=\"fl\">\u540D\u79F0</label><input class=\"fi\" id=\"pu_n\" value=\""+E(u.name)+"\"></div>";
    h2+="<div class=\"frr\"><div class=\"fr\"><label class=\"fl\">\u6587\u5316</label><input class=\"fi\" id=\"pu_cul\" value=\""+E(u.cul||"\u901A\u7528")+"\"></div>";
    h2+="<div class=\"fr\"><label class=\"fl\">\u7C7B\u578B</label><select class=\"fsel\" id=\"pu_tp\"><option value=\"land\""+(u.tp==="land"?" selected":"")+">\u9646\u519B</option><option value=\"naval\""+(u.tp==="naval"?" selected":"")+">\u6D77\u519B</option><option value=\"air\""+(u.tp==="air"?" selected":"")+">\u7A7A\u519B</option></select></div></div>";

// --- 11-game-core.js ---
// ===== game-core.js — 游戏运行时核心：状态/时间/经济/HUD =====

var GAME={
  sc:null,       // 剧本数据(深拷贝)
  fid:null,      // 玩家势力ID
  fac:null,      // 玩家势力引用
  running:false,
  speed:0,       // 0=暂停,1=1x,2=2x,3=3x
  tick:0,        // 累计tick
  day:1,month:1,year:1,
  armies:[],     // [{id,fid,units:[{uid,count}],x,y,targetX,targetY,moving}]
  wars:[],       // [{a:fid,b:fid}]
  researched:{}, // {fid:{techId:true}}
  researching:{},// {fid:{techId:str,progress:num}}
  activeLaws:{}, // {fid:{catId:lawIdx}}
  map:null,      // MapCtrl
  timer:null,
  battleCooldown:{},

  // === 启动游戏 ===
  start:function(scenario,factionId){
    var self=this;
    this.sc=J(scenario);
    this.fid=factionId;
    this.fac=this.sc.factions.find(function(f){return f.id===factionId});
    if(!this.fac){notify("\u627E\u4E0D\u5230\u52BF\u529B","war");return}

    // 初始化状态
    this.day=1;this.month=1;this.year=this.sc.sy||1;
    this.speed=0;this.tick=0;this.running=true;
    this.armies=[];this.wars=[];this.battleCooldown={};
    this.researched={};this.researching={};this.activeLaws={};

    // 为每个势力初始化
    this.sc.factions.forEach(function(f){
      self.researched[f.id]={};
      self.researching[f.id]={techId:"",progress:0};
      // 应用初始科技
      if(f.initTechs&&f.initTechs.length){
        f.initTechs.forEach(function(tid){self.researched[f.id][tid]=true});
      }
      // 应用初始法律(从势力设置或默认第一个)
      self.activeLaws[f.id]={};
      var fLaws=self.getFactionLaws(f.id);
      LAW_CATS.forEach(function(cat){
        var opts=fLaws[cat.id];
        if(opts&&opts.length){
          self.activeLaws[f.id][cat.id]=(f.initLaws&&f.initLaws[cat.id]!==undefined)?f.initLaws[cat.id]:0;
        }
      });
      if(!f.gold)f.gold=1000;
    });

    // 显示游戏界面
    Q("menu").style.display="none";
    Q("editor").classList.remove("on");
    Q("game").classList.add("on");
    Modal.close();

    // 初始化地图
    if(!this.map){
      this.map=new MapCtrl("gMap","gCanvas","gImg","gMini","gMiniImg","gMiniVp");
    }
    this.map.load(this.sc.map);

    // 地图点击
    this.map.onClick=function(mx,my,e){self.onMapClick(mx,my,e)};

    // 按钮绑定
    this.bindUI();
    this.setSpeed(0);
    this.updateHUD();
    this.renderMap();
    notify("\u6E38\u620F\u5F00\u59CB\uFF01\u4F60\u626E\u6F14 "+E(this.fac.name),"ok");
  },

  bindUI:function(){
    var self=this;
    // 辅助：移除旧事件绑定
    function rebind(id,evt,fn){
      var el=Q(id);if(!el)return;
      var n=el.cloneNode(true);
      el.parentNode.replaceChild(n,el);
      n.id=id; // 确保ID不丢失
      n.addEventListener(evt,fn);
      return n;
    }

    // 速度控制
    rebind("gPause","click",function(){self.setSpeed(0)});
    rebind("gSpeed1","click",function(){self.setSpeed(1)});
    rebind("gSpeed2","click",function(){self.setSpeed(2)});
    rebind("gSpeed3","click",function(){self.setSpeed(3)});

    // 面板按钮
    var panelBinds=[
      ["gBtnTech","gPanelTech","gCloseTech"],
      ["gBtnLaw","gPanelLaw","gCloseLaw"],
      ["gBtnDiplo","gPanelDiplo","gCloseDiplo"]
    ];
    panelBinds.forEach(function(pb){
      var panel=Q(pb[1]);
      rebind(pb[0],"click",function(){
        // 关闭其他面板
        panelBinds.forEach(function(p2){if(p2[1]!==pb[1])Q(p2[1]).classList.remove("on")});
        panel.classList.toggle("on");
        if(panel.classList.contains("on"))self.renderPanel(pb[1]);
      });
      rebind(pb[2],"click",function(){panel.classList.remove("on")});
    });

    // 菜单按钮
    rebind("gMenuBtn","click",function(){self.showGameMenu()});

    // 键盘 - 先移除旧的
    if(this._keyHandler){document.removeEventListener("keydown",this._keyHandler)}
    this._keyHandler=function(e){
      if(!self.running)return;
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
      if(e.key===" "){e.preventDefault();self.setSpeed(self.speed===0?1:0)}
      if(e.key==="Escape"){
        Q("gPanelTech").classList.remove("on");
        Q("gPanelLaw").classList.remove("on");
        Q("gPanelDiplo").classList.remove("on");
      }
    };
    document.addEventListener("keydown",this._keyHandler);
  },

  // === 速度控制 ===
  setSpeed:function(s){
    this.speed=s;
    var btns=Q("game").querySelectorAll(".g-speed");
    for(var i=0;i<btns.length;i++)btns[i].classList.toggle("on",i===s);

    if(this.timer){clearInterval(this.timer);this.timer=null}
    if(s>0){
      var interval=[0,500,250,120][s];
      var self=this;
      this.timer=setInterval(function(){self.gameTick()},interval);
    }
  },

  // === 每日tick ===
  gameTick:function(){
    if(!this.running)return;
    this.tick++;
    this.day++;
    if(this.day>30){this.day=1;this.month++;this.onMonthEnd()}
    if(this.month>12){this.month=1;this.year++;this.onYearEnd()}

    // 移动军队
    this.moveArmies();
    // 检查战斗
    this.checkBattles();
    // 匪寇游荡
    if(this.tick%10===0)this.wanderBandits();
    // AI每5天
    if(this.tick%5===0)this.aiTick();

    // 更新显示
    this.updateDate();
    if(this.tick%3===0)this.renderMap();
  },

  // === 月末处理 ===
  onMonthEnd:function(){
    var self=this;
    this.sc.factions.forEach(function(f){
      // 经济：税收 + 人物经济加成
      var income=0,expense=0;
      var mods=self.getFactionMods(f.id);
      self.sc.cities.forEach(function(c){
        if(c.fid===f.id){
          var charBonus=0;
          // 驻城人物的经济/工程加成
          (self.sc.characters||[]).forEach(function(ch){
            if(ch.alive!==false&&ch.bindType==="city"&&ch.bindId===c.id&&ch.sk){
              charBonus+=((ch.sk.eco||0)-50)/100; // 50为基准，超过50给正加成
              // 工程加成城防(每月微量)
              c.def=Math.max(c.def,c.def+Math.round(((ch.sk.eng||0)-50)*0.01));
            }
          });
          income+=Math.round(c.pop/100*c.eco*(1+mods.eco/100+charBonus));
        }
      });
      // 军队维护
      self.armies.forEach(function(a){
        if(a.fid===f.id){
          a.units.forEach(function(u){
            var unit=self.sc.units.find(function(x){return x.id===u.uid});
            if(unit)expense+=unit.up*u.count;
          });
        }
      });
      f.gold+=(income-expense);
      f._income=income;f._expense=expense;

      // 金币为负：军队逃散
      if(f.gold<0){
        self.armies.forEach(function(a){
          if(a.fid===f.id){
            a.units.forEach(function(u){u.count=Math.max(1,Math.floor(u.count*0.8))});
          }
        });
        if(f.id===self.fid)notify("\u91D1\u5E01\u4E0D\u8DB3\uFF0C\u519B\u961F\u9003\u6563\u4E2D\uFF01","war");
      }

      // 科研
      var rp=self.getResearchPoints(f.id);
      var res=self.researching[f.id];
      if(res&&res.techId){
        res.progress+=rp;
        var tech=self.getFactionTechs(f.id).find(function(t){return t.id===res.techId});
        if(tech&&res.progress>=tech.cost){
          self.researched[f.id][tech.id]=true;
          res.techId="";res.progress=0;
          if(f.id===self.fid)notify("\u79D1\u6280\u300C"+tech.name+"\u300D\u7814\u7A76\u5B8C\u6210\uFF01","ok");
        }
      }

      // 人口增长
      self.sc.cities.forEach(function(c){
        if(c.fid===f.id){
          var growth=Math.max(0,Math.round(c.pop*0.002*(1+mods.pop/100)));
          c.pop+=growth;
        }
      });
    });
    this.updateHUD();
  },

  onYearEnd:function(){
    // 年度总结（简化）
  },

  // === 获取势力对应的科技/法律列表（根据预设包） ===
  getFactionTechs:function(fid){
    var fac=this.sc.factions.find(function(f){return f.id===fid});
    if(fac&&fac.presetId&&this.sc.presets){
      var preset=this.sc.presets.find(function(p){return p.id===fac.presetId});
      if(preset&&preset.techs)return preset.techs;
    }
    return this.sc.techs||[];
  },
  getFactionUnits:function(fid){
    var fac=this.sc.factions.find(function(f){return f.id===fid});
    if(fac&&fac.presetId&&this.sc.presets){
      var preset=this.sc.presets.find(function(p){return p.id===fac.presetId});
      if(preset&&preset.units)return preset.units;
    }
    return this.sc.units||[];
  },
  getFactionLaws:function(fid){
    var fac=this.sc.factions.find(function(f){return f.id===fid});
    if(fac&&fac.presetId&&this.sc.presets){
      var preset=this.sc.presets.find(function(p){return p.id===fac.presetId});
      if(preset&&preset.laws)return preset.laws;
    }
    return this.sc.laws||{};
  },

  // === 获取势力修正值 ===
  getFactionMods:function(fid){
    var mods={atk:0,def:0,eco:0,pop:0,research:0,speed:0,naval:0,siege:0};
    var self=this;
    // 科技加成 — 使用势力对应的科技列表
    var rd=this.researched[fid]||{};
    this.getFactionTechs(fid).forEach(function(tech){
      if(rd[tech.id]&&tech.fx){
        Object.keys(tech.fx).forEach(function(k){if(mods[k]!==undefined)mods[k]+=tech.fx[k]});
      }
    });
    // 法律加成 — 使用势力对应的法律列表
    var al=this.activeLaws[fid]||{};
    var fLaws=this.getFactionLaws(fid);
    LAW_CATS.forEach(function(cat){
      var idx=al[cat.id];
      if(idx!==undefined&&fLaws[cat.id]){
        var law=fLaws[cat.id][idx];
        if(law&&law.fx){
          Object.keys(law.fx).forEach(function(k){if(mods[k]!==undefined)mods[k]+=law.fx[k]});
        }
      }
    });
    return mods;
  },

  getResearchPoints:function(fid){
    var base=5;
    var mods=this.getFactionMods(fid);
    return Math.round(base*(1+mods.research/100));
  },

  // === HUD更新 ===
  updateHUD:function(){
    var f=this.fac;
    Q("gFacName").textContent=f.name;
    Q("gFacColor").style.background=f.col;
    Q("gGold").textContent=F(Math.round(f.gold));
    var netInc=(f._income||0)-(f._expense||0);
    var incEl=Q("gIncome");
    incEl.textContent=(netInc>=0?"+":"")+F(netInc);
    incEl.className=netInc>=0?"pos":"neg";

    var totalPop=0;var self=this;
    this.sc.cities.forEach(function(c){if(c.fid===self.fid)totalPop+=c.pop});
    Q("gPop").textContent=F(totalPop);

    var totalArmy=0;
    this.armies.forEach(function(a){
      if(a.fid===self.fid)a.units.forEach(function(u){totalArmy+=u.count});
    });
    Q("gArmy").textContent=F(totalArmy);

    var techCount=Object.keys(this.researched[this.fid]||{}).length;
    Q("gTech").textContent=String(techCount);
  },

  updateDate:function(){
    Q("gDate").textContent=this.year+"\u5E74"+this.month+"\u6708"+this.day+"\u65E5";
  },

    el.className="nfi "+(type||"");
    el.textContent=msg;
    Q("gNf").appendChild(el);

    var self=this;
    var oldSpeed=this.speed;
    this.setSpeed(0);
    var h="<div style=\"text-align:center;padding:1rem\">";
    h+="<div style=\"font-size:1.2rem;font-weight:700;color:var(--bd3);margin-bottom:1rem\">\u6E38\u620F\u83DC\u5355</div>";
    h+="<button class=\"b bp\" id=\"gmResume\" style=\"width:100%;margin-bottom:.5rem\">\u7EE7\u7EED\u6E38\u620F</button>";
    h+="<button class=\"b bs\" id=\"gmSave\" style=\"width:100%;margin-bottom:.5rem\">\u4FDD\u5B58\u6E38\u620F</button>";
    h+="<button class=\"b bd\" id=\"gmQuit\" style=\"width:100%\">\u9000\u51FA\u5230\u4E3B\u83DC\u5355</button>";

    Modal.open("\u83DC\u5355",h,"");
    Q("gmResume").addEventListener("click",function(){Modal.close();self.setSpeed(oldSpeed||1)});
    Q("gmSave").addEventListener("click",function(){self.saveGame();notify("\u6E38\u620F\u5DF2\u4FDD\u5B58","ok")});
    Q("gmQuit").addEventListener("click",function(){
      if(!confirm("\u786E\u5B9A\u9000\u51FA\uFF1F\u672A\u4FDD\u5B58\u8FDB\u5EA6\u5C06\u4E22\u5931"))return;
      self.quit();
    });

  saveGame:function(){
    var save={
      sc:this.sc,fid:this.fid,day:this.day,month:this.month,year:this.year,
      armies:this.armies,wars:this.wars,researched:this.researched,
      researching:this.researching,activeLaws:this.activeLaws,tick:this.tick
    };

  },

  loadGame:function(saveData){
    this.sc=saveData.sc;this.fid=saveData.fid;
    this.fac=this.sc.factions.find(function(f){return f.id===saveData.fid});
    this.day=saveData.day;this.month=saveData.month;this.year=saveData.year;
    this.armies=saveData.armies||[];this.wars=saveData.wars||[];
    this.researched=saveData.researched||{};this.researching=saveData.researching||{};
    this.activeLaws=saveData.activeLaws||{};this.tick=saveData.tick||0;
    this.running=true;this.speed=0;
    Q("menu").style.display="none";Q("editor").classList.remove("on");
    Q("game").classList.add("on");Modal.close();

  quit:function(){
    this.running=false;
    if(this.timer){clearInterval(this.timer);this.timer=null}
    if(this._keyHandler){document.removeEventListener("keydown",this._keyHandler);this._keyHandler=null}

  },

// --- 12-game-map.js ---
  // ===== game-map.js — 游戏地图渲染/军队显示/城池交互 =====

  renderMap:function(){
    var sc=this.sc;var cvs=this.map.cvs;var self=this;
    var old=cvs.querySelectorAll(".city-mk,.army-mk,.bandit-gm");
    for(var i=0;i<old.length;i++)old[i].remove();

    // 城池 — 色块
    sc.cities.forEach(function(c){
      var ct=CITY_TYPES.find(function(t){return t.id===c.type})||CITY_TYPES[0];
      var fac=sc.factions.find(function(f){return f.id===c.fid});
      var col=fac?fac.col:"#888";
      var sz=ct.size||10;
      var el=document.createElement("div");
      el.className="city-mk";
      el.style.cssText="left:"+c.x+"px;top:"+c.y+"px";
      var dot=document.createElement("div");
      dot.className="city-dot "+(ct.shape||"circle");
      dot.style.cssText="width:"+sz+"px;height:"+sz+"px;background:"+col;
      el.appendChild(dot);
      var lbl=document.createElement("div");lbl.className="city-lbl";
      lbl.textContent=(c.port?"\u2693":"")+c.name;
      el.appendChild(lbl);
      el.addEventListener("mousedown",function(e){e.stopPropagation();self.map.entityClicked=true;self.onCityClick(c)});
      cvs.appendChild(el);
    });

    // 海权点
    // 军队(显示兵种名称)
    this.armies.forEach(function(a){
      var total=0;a.units.forEach(function(u){total+=u.count});
      if(total<=0)return;
      var fac=sc.factions.find(function(f){return f.id===a.fid});
      var col=fac?fac.col:"#888";
      // 生成兵种标签文字
      var unitLabels=a.units.map(function(au){
        var unit=sc.units.find(function(x){return x.id===au.uid});
        return(unit?unit.name:"")+au.count;
      }).join(" ");
      var el=document.createElement("div");
      el.className="army-mk"+(self._selArmy===a.id?" sel":"");
      el.style.cssText="left:"+a.x+"px;top:"+a.y+"px;border-color:"+col;
      el.innerHTML="<span class=\"army-ico\">\u2694</span><span class=\"army-cnt\">"+F(total)+"</span>";
      // 兵种名称标签
      var lbl=document.createElement("div");
      lbl.style.cssText="position:absolute;top:100%;left:50%;transform:translateX(-50%);font-size:.5rem;white-space:nowrap;color:var(--tx2);text-shadow:0 0 2px #fff,0 0 2px #fff;pointer-events:none;max-width:80px;overflow:hidden;text-overflow:ellipsis";
      lbl.textContent=unitLabels;
      el.appendChild(lbl);
      el.addEventListener("mousedown",function(e){e.stopPropagation();self.map.entityClicked=true;self.onArmyClick(a)});
      cvs.appendChild(el);
    });

    // 匪寇
    sc.bandits.forEach(function(b){
      if(b.n<=0)return;
      var el=document.createElement("div");
      el.className="bandit-gm";
      el.style.cssText="left:"+b.x+"px;top:"+b.y+"px";
      el.textContent="\uD83D\uDC80";
      el.title=b.name+" \u5175\u529B"+b.n;
      cvs.appendChild(el);
    });
  },

  getPoint:function(ref){
    if(ref.type==="city"){var c=this.sc.cities.find(function(x){return x.id===ref.id});return c?{x:c.x,y:c.y}:null}
    return null;
  },

  _selArmy:null,

  // === 地图点击(移动选中军队) ===
  onMapClick:function(mx,my,e){
    var self=this;
    if(this._selArmy){
      var army=this.armies.find(function(a){return a.id===self._selArmy});
      if(army&&army.fid===this.fid){
        army.targetX=mx;army.targetY=my;army.moving=true;
        notify("\u519B\u961F\u51FA\u53D1","info");
      }
      this._selArmy=null;
      this.renderMap();
    }
  },

  // === 城池点击 ===
  onCityClick:function(city){
    var self=this;var sc=this.sc;
    var isOwn=city.fid===this.fid;
    var isEnemy=city.fid&&city.fid!==this.fid;
    var fac=sc.factions.find(function(f){return f.id===city.fid});
    var facName=fac?fac.name:"\u65E0\u4E3B";
    var ct=CITY_TYPES.find(function(t){return t.id===city.type})||CITY_TYPES[0];

    // 如果有选中军队且点击敌方城池 → 自动攻击
    if(this._selArmy&&isEnemy){

      if(army&&army.fid===this.fid){
        army.targetX=city.x;army.targetY=city.y;army.moving=true;

    var h="<div style=\"display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem\"><span style=\"font-size:1.2rem\">"+E(ct.name)+"</span><div><div style=\"font-weight:700;font-size:.95rem\">"+(city.port?"\u2693":"")+E(city.name)+"</div><div style=\"font-size:.75rem;color:var(--tx3)\">"+E(facName)+"</div></div></div>";
    h+="<div class=\"frr\" style=\"margin-bottom:.5rem\">";
    h+="<div style=\"font-size:.8rem\">\u4EBA\u53E3: <b>"+F(city.pop)+"</b></div>";
    h+="<div style=\"font-size:.8rem\">\u7ECF\u6D4E: <b>"+city.eco+"</b></div>";
    h+="<div style=\"font-size:.8rem\">\u9632\u5FA1: <b>"+city.def+"</b></div>";

      footer="<button class=\"b bp\" id=\"gcRecruit\">\u62DB\u52DF\u519B\u961F</button>";

    footer+="<button class=\"b bs\" onclick=\"Modal.close()\">\u5173\u95ED</button>";

    if(isOwn&&Q("gcRecruit")){
