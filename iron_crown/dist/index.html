  // === 招募面板 ===
  showRecruitPanel:function(city){
    var self=this;var sc=this.sc;
    var facCul=this.fac.cul;
    var cityCul=city.cul;
    // 可招募兵种：文化匹配 + 科技解锁 + 海军需要港口
    var available=sc.units.filter(function(u){
      // 海军只能在港口城市建造
      if(u.tp==="naval"&&!city.port)return false;
      // 文化限制
      if(u.cul!=="\u901A\u7528"){
        var culMatch=false;
        if(facCul){var fc=sc.cultures.find(function(x){return x.id===facCul});if(fc&&fc.name===u.cul)culMatch=true}
        if(cityCul){var cc=sc.cultures.find(function(x){return x.id===cityCul});if(cc&&cc.name===u.cul)culMatch=true}
        if(!culMatch)return false;
      }
      // 科技限制
      if(u.reqTech&&!self.researched[self.fid][u.reqTech])return false;
      return true;
    });

    var portNote=city.port?"":"\uFF08\u975E\u6E2F\u53E3\uFF0C\u65E0\u6CD5\u5EFA\u9020\u6D77\u519B\uFF09";
    var h="<div style=\"font-size:.8rem;color:var(--tx3);margin-bottom:.6rem\">\u5728 "+E(city.name)+" \u62DB\u52DF\u519B\u961F"+portNote+"\uFF08\u91D1\u5E01: "+F(Math.round(self.fac.gold))+"\uFF09</div>";
    available.forEach(function(u,i){
      h+="<div class=\"li\" data-uid=\""+u.id+"\"><div class=\"li-i\"><div class=\"li-n\">"+E(u.name)+" <span class=\"tg tg-blue\">"+({land:"\u9646",naval:"\u6D77",air:"\u7A7A"}[u.tp]||u.tp)+"</span></div><div class=\"li-d\">\u653B"+u.atk+" \u9632"+u.def+" | \u8D39\u7528"+u.cost+" \u7EF4\u62A4"+u.up+"</div></div><div class=\"li-a\"><input type=\"number\" min=\"0\" max=\"999\" value=\"0\" style=\"width:60px\" class=\"fi bsm\" id=\"rc_"+i+"\"><button class=\"b bsm bp rc-btn\" data-i=\""+i+"\" data-uid=\""+u.id+"\">\u62DB</button></div></div>";
    });
    if(!available.length)h+="<div class=\"empty\">\u6CA1\u6709\u53EF\u62DB\u52DF\u5175\u79CD</div>";
    // 指派将领
    var freeChars=(sc.characters||[]).filter(function(ch){return ch.alive!==false&&ch.fid===self.fid&&ch.bindType!==""&&ch.bindType!=="army"||!ch.bindType});
    if(freeChars.length){
      h+="<div class=\"fr\" style=\"margin-top:.5rem\"><label class=\"fl\">\u6307\u6D3E\u5C06\u9886(\u53EF\u9009)</label><select class=\"fsel\" id=\"rc_cmd\"><option value=\"\">\u65E0</option>";
      freeChars.forEach(function(ch){h+="<option value=\""+ch.id+"\">"+E(ch.name)+" \u7EDF"+((ch.sk&&ch.sk.cmd)||50)+"</option>"});
      h+="</select></div>";
    }
    Modal.open("\u62DB\u52DF\u519B\u961F",h,"<button class=\"b bs\" onclick=\"Modal.close()\">\u5173\u95ED</button>");

    // 绑定招募按钮
    var rcBtns=Q("mob").querySelectorAll(".rc-btn");
    for(var i=0;i<rcBtns.length;i++){
      rcBtns[i].addEventListener("click",function(){
        var idx=parseInt(this.dataset.i);
        var uid=this.dataset.uid;
        var count=parseInt(Q("rc_"+idx).value)||0;
        if(count<=0)return;
        var unit=sc.units.find(function(x){return x.id===uid});
        if(!unit)return;
        var totalCost=unit.cost*count;
        if(self.fac.gold<totalCost){
          notify("\u91D1\u5E01\u4E0D\u8DB3\uFF01\u9700\u8981"+F(totalCost)+"\uFF0C\u5F53\u524D"+F(Math.round(self.fac.gold)),"war");
          return;
        }
        self.fac.gold-=totalCost;
        // 查找城池现有军队或创建新军队
        var army=self.armies.find(function(a){return a.fid===self.fid&&Math.hypot(a.x-city.x,a.y-city.y)<20&&!a.moving});
        if(!army){
          army={id:U(),fid:self.fid,units:[],x:city.x,y:city.y+20,targetX:0,targetY:0,moving:false};
          self.armies.push(army);
        }
        var eu=army.units.find(function(x){return x.uid===uid});
        if(eu){eu.count+=count}else{army.units.push({uid:uid,count:count})}
        // 绑定将领
        var cmdSel=Q("rc_cmd");
        if(cmdSel&&cmdSel.value){
          var ch=(sc.characters||[]).find(function(x){return x.id===cmdSel.value});
          if(ch){ch.bindType="army";ch.bindId=army.id}
        }
        notify("\u62DB\u52DF "+count+" "+unit.name,"ok");
        self.updateHUD();
        self.renderMap();
        Modal.close();
      });
    }
  },

// --- 13-game-military.js ---
  // ===== game-military.js — 军队移动/战斗/攻城/匪寇 =====

  moveArmies:function(){
    var self=this;
    this.armies.forEach(function(a){
      if(!a.moving)return;
      // 计算军队平均移速(取最慢单位)
      var minSpd=99;
      var hasNaval=false,hasLand=false,hasAir=false;
      a.units.forEach(function(u){
        var unit=self.sc.units.find(function(x){return x.id===u.uid});
        if(unit){
          var s=unit.spd||2;if(s<minSpd)minSpd=s;
          if(unit.tp==="naval")hasNaval=true;
          if(unit.tp==="land")hasLand=true;
          if(unit.tp==="air")hasAir=true;
        }
      });
      var mods=self.getFactionMods(a.fid);
      var spd=minSpd*(1+(mods.speed||0)/100);

      var dx=a.targetX-a.x,dy=a.targetY-a.y;
      var dist=Math.hypot(dx,dy);
      if(dist<spd+1){
        a.x=a.targetX;a.y=a.targetY;a.moving=false;
      }else{
        var nx=a.x+dx/dist*spd;
        var ny=a.y+dy/dist*spd;

        // 地形检测(如果有seaGrid)
        if(self.sc.seaGrid&&!hasAir){
          var onSea=self.isPointSea(nx,ny);
          if(hasNaval&&!hasLand&&!onSea){
            // 纯海军不能上陆地
            a.moving=false;
            if(a.fid===self.fid)notify("\u6D77\u519B\u65E0\u6CD5\u767B\u9646\uFF01","war");
            return;
          }
          if(hasLand&&!hasNaval&&onSea){
            // 纯陆军在海上减速50%
            spd=spd*0.5;
            nx=a.x+dx/dist*spd;
            ny=a.y+dy/dist*spd;
          }
        }
        a.x=nx;a.y=ny;
      }
    });
  },

  // 检测某点是否在海域(O(1)网格查询)
  isPointSea:function(px,py){
    var sc=this.sc;
    if(!sc.seaGrid||!sc.seaGridW)return false;
    var gx=Math.floor(px/sc.seaStep);
    var gy=Math.floor(py/sc.seaStep);
    if(gx<0||gy<0||gx>=sc.seaGridW||gy>=sc.seaGridH)return false;
    return sc.seaGrid.charAt(gy*sc.seaGridW+gx)==="1";
  },

  checkBattles:function(){
    var self=this;
    // 军队vs军队
    for(var i=0;i<this.armies.length;i++){
      var a=this.armies[i];
      if(!a||self.getArmyTotal(a)<=0)continue;
      for(var j=i+1;j<this.armies.length;j++){
        var b=this.armies[j];
        if(!b||self.getArmyTotal(b)<=0)continue;
        if(a.fid===b.fid)continue;
        if(!self.isAtWar(a.fid,b.fid))continue;
        if(Math.hypot(a.x-b.x,a.y-b.y)>30)continue;
        var key=[a.id,b.id].sort().join("-");
        if(self.battleCooldown[key]&&self.tick-self.battleCooldown[key]<8)continue;
        self.doBattle(a,b);
        self.battleCooldown[key]=self.tick;
      }
    }

    // 军队vs匪寇
    for(var k=0;k<this.armies.length;k++){
      var army=this.armies[k];
      if(!army||self.getArmyTotal(army)<=0)continue;
      for(var m=0;m<this.sc.bandits.length;m++){
        var ban=this.sc.bandits[m];
        if(!ban||ban.n<=0)continue;
        if(Math.hypot(army.x-ban.x,army.y-ban.y)>25)continue;
        var bkey="b_"+army.id+"_"+ban.id;
        if(self.battleCooldown[bkey]&&self.tick-self.battleCooldown[bkey]<15)continue;
        self.doBanditBattle(army,ban);
        self.battleCooldown[bkey]=self.tick;
      }
    }

    // 军队攻城
    for(var n=0;n<this.armies.length;n++){
      var sa=this.armies[n];
      if(!sa||self.getArmyTotal(sa)<=0||sa.moving)continue;
      self.checkSiege(sa);
    }

    // 清除空军队 + 击杀绑定人物
    var deadArmyIds={};
    this.armies.forEach(function(a){
      if(self.getArmyTotal(a)<=0)deadArmyIds[a.id]=true;
    });
    if(Object.keys(deadArmyIds).length){
      (this.sc.characters||[]).forEach(function(ch){
        if(ch.alive!==false&&ch.bindType==="army"&&deadArmyIds[ch.bindId]){
          ch.alive=false;
          if(ch.fid===self.fid)notify("\u4EBA\u7269 "+ch.name+" \u968F\u519B\u961F\u8986\u706D\uFF01","war");
        }
      });
    }
    this.armies=this.armies.filter(function(a){return self.getArmyTotal(a)>0});
  },

  getArmyTotal:function(army){
    var t=0;if(!army||!army.units)return 0;
    army.units.forEach(function(u){t+=u.count});return t;
  },

  getArmyStrength:function(army,fid){
    var self=this;var atk=0,def=0;
    var mods=this.getFactionMods(fid);
    army.units.forEach(function(u){
      var unit=self.sc.units.find(function(x){return x.id===u.uid});
      if(unit){
        atk+=unit.atk*u.count;
        def+=unit.def*u.count;
      }
    });
    // 人物统帅加成: 绑定此军队的人物cmd属性
    var cmdBonus=0;
    (this.sc.characters||[]).forEach(function(ch){
      if(ch.alive!==false&&ch.bindType==="army"&&ch.bindId===army.id&&ch.sk){
        cmdBonus+=((ch.sk.cmd||50)-50)/100;
      }
    });
    return{
      atk:Math.round(atk*(1+(mods.atk||0)/100+cmdBonus)),
      def:Math.round(def*(1+(mods.def||0)/100+cmdBonus*0.5)),
      total:self.getArmyTotal(army)
    };
  },

  doBattle:function(a,b){
    var self=this;
    var sa=this.getArmyStrength(a,a.fid);
    var sb=this.getArmyStrength(b,b.fid);

    // 伤亡公式：攻击方造成 atk*0.2 ~ atk*0.4 的伤害，被防御减免
    var dmgToB=Math.max(1,Math.round((sa.atk*R(20,40)/100)-(sb.def*0.08)));
    var dmgToA=Math.max(1,Math.round((sb.atk*R(20,40)/100)-(sa.def*0.08)));

    this.applyDamage(b,dmgToB);
    this.applyDamage(a,dmgToA);

    // 战败方后退
    var taAfter=this.getArmyTotal(a);
    var tbAfter=this.getArmyTotal(b);
    if(taAfter<tbAfter&&taAfter>0){a.x+=R(-30,30);a.y+=R(-30,30);a.moving=false}
    if(tbAfter<taAfter&&tbAfter>0){b.x+=R(-30,30);b.y+=R(-30,30);b.moving=false}

    // 通知（只通知玩家相关的）
    if(a.fid===this.fid||b.fid===this.fid){
      var facA=this.sc.factions.find(function(f){return f.id===a.fid});
      var facB=this.sc.factions.find(function(f){return f.id===b.fid});
      notify("\u2694 "+(facA?facA.name:"?")+"\u2694"+(facB?facB.name:"?")+" \u6b8b"+F(taAfter)+"vs"+F(tbAfter),"war");
    }
  },

  doBanditBattle:function(army,bandit){
    var self=this;
    var sa=this.getArmyStrength(army,army.fid);
    var banditStr=bandit.atk*bandit.n;
    var banditDef=bandit.def*bandit.n;

    var dmgToBandit=Math.max(1,Math.round(sa.atk*0.3-banditDef*0.05));
    var dmgToArmy=Math.max(1,Math.round(banditStr*0.2-sa.def*0.05));

    this.applyDamage(army,dmgToArmy);
    var killed=Math.min(bandit.n,Math.round(dmgToBandit/Math.max(1,bandit.def)));
    bandit.n=Math.max(0,bandit.n-killed);

    if(army.fid===this.fid){
      if(bandit.n<=0){
        notify("\u5320\u5BC7 "+bandit.name+" \u88AB\u6D88\u706D\uFF01","ok");
      }else{
        notify("\u4E0E "+bandit.name+" \u4EA4\u6218\uFF0C\u5320\u5BC7\u6b8b"+bandit.n,"war");
      }
    }
  },

  applyDamage:function(army,dmg){
    var total=this.getArmyTotal(army);
    if(total<=0||dmg<=0)return;
    // 按比例分配伤亡给各兵种
    army.units.forEach(function(u){
      var ratio=u.count/total;
      var loss=Math.min(u.count,Math.max(1,Math.round(dmg*ratio)));
      u.count=Math.max(0,u.count-loss);
    });
    army.units=army.units.filter(function(u){return u.count>0});
  },

  checkSiege:function(army){
    var self=this;
    this.sc.cities.forEach(function(c){
      if(c.fid===army.fid)return; // 自己的城
      if(Math.hypot(c.x-army.x,c.y-army.y)>35)return; // 太远
      // 必须处于战争状态（或城池无主）
      if(c.fid&&!self.isAtWar(army.fid,c.fid))return;

      var skey="siege_"+army.id+"_"+c.id;
      if(self.battleCooldown[skey]&&self.tick-self.battleCooldown[skey]<15)return;
      self.battleCooldown[skey]=self.tick;

      var sa=self.getArmyStrength(army,army.fid);
      var mods=self.getFactionMods(army.fid);
      var siegeBonus=1+(mods.siege||0)/100;
      var attackPower=Math.round(sa.atk*siegeBonus);
      var cityDef=(c.def||10)*10+(c.gar||0)*3;

      if(attackPower>cityDef){
        // 攻克！
        var losses=Math.round(self.getArmyTotal(army)*R(8,18)/100);
        self.applyDamage(army,losses);
        var oldFid=c.fid;
        c.fid=army.fid;
        c.gar=0;
        c.def=Math.max(5,Math.round(c.def*0.7));

        // 驻城人物死亡
        (self.sc.characters||[]).forEach(function(ch){
          if(ch.alive!==false&&ch.bindType==="city"&&ch.bindId===c.id&&ch.fid===oldFid){
            ch.alive=false;
            if(oldFid===self.fid)notify("\u4EBA\u7269 "+ch.name+" \u5728 "+c.name+" \u9635\u4EA1\uFF01","war");
          }
        });

        if(army.fid===self.fid){
          notify("\u2694 \u653B\u514B "+c.name+"\uFF01","ok");
        }else if(oldFid===self.fid){
          notify("\u2694 "+c.name+" \u5931\u5B88\uFF01","war");
        }
      }else{
        // 攻城失败，双方损耗
        var armyLoss=Math.round(self.getArmyTotal(army)*R(5,12)/100);
        self.applyDamage(army,armyLoss);
        c.gar=Math.max(0,(c.gar||0)-Math.round(attackPower*0.02));

        if(army.fid===self.fid){
          notify("\u653B\u57CE "+c.name+" \u53D7\u963B\uFF0C\u635F\u5931"+armyLoss,"war");
        }
      }
    });
  },

  wanderBandits:function(){
    this.sc.bandits.forEach(function(b){
      if(b.n<=0)return;
      b.x+=R(-12,12);
      b.y+=R(-12,12);
    });
  },

  isAtWar:function(fidA,fidB){
    if(!fidA||!fidB)return false;
    return this.wars.some(function(w){
      return(w.a===fidA&&w.b===fidB)||(w.a===fidB&&w.b===fidA);
    });
  },

  declareWar:function(targetFid){
    if(this.isAtWar(this.fid,targetFid))return;
    this.wars.push({a:this.fid,b:targetFid});
    var fac=this.sc.factions.find(function(f){return f.id===targetFid});
    notify("\u5411 "+(fac?fac.name:"\u672A\u77E5")+" \u5BA3\u6218\uFF01","war");
  },

  makePeace:function(targetFid){
    var self=this;
    this.wars=this.wars.filter(function(w){
      return!((w.a===self.fid&&w.b===targetFid)||(w.a===targetFid&&w.b===self.fid));
    });
    var fac=this.sc.factions.find(function(f){return f.id===targetFid});
    notify("\u4E0E "+(fac?fac.name:"\u672A\u77E5")+" \u8BAE\u548C","ok");
  },

// --- 14-game-panels.js ---
  // ===== game-panels.js — 科技/法律/外交面板 =====

  renderPanel:function(panelId){
    if(panelId==="gPanelTech")this.renderTechPanel();
    else if(panelId==="gPanelLaw")this.renderLawPanel();
    else if(panelId==="gPanelDiplo")this.renderDiploPanel();
  },

  // === 科技面板 ===
  renderTechPanel:function(){
    var self=this;
    var body=Q("gTechBody");
    var rd=this.researched[this.fid]||{};
    var res=this.researching[this.fid]||{techId:"",progress:0};
    var rp=this.getResearchPoints(this.fid);

    var h="<div style=\"font-size:.8rem;color:var(--tx3);margin-bottom:.5rem\">\u6BCF\u6708\u79D1\u7814\u70B9: <b>"+rp+"</b></div>";
    var myTechs=this.getFactionTechs(this.fid);
    if(res.techId){
      var ct=myTechs.find(function(t){return t.id===res.techId});
      if(ct){
        var pct=Math.min(100,Math.round(res.progress/ct.cost*100));
        h+="<div style=\"padding:.5rem;background:var(--goldBg);border:1px solid var(--gold);border-radius:5px;margin-bottom:.8rem;font-size:.82rem\">\u6B63\u5728\u7814\u7A76: <b>"+E(ct.name)+"</b> ("+pct+"%)<div class=\"g-tech-bar\"><div class=\"g-tech-bar-fill\" style=\"width:"+pct+"%\"></div></div></div>";
      }
    }

    TECH_ERAS.forEach(function(era){
      var techs=myTechs.filter(function(t){return t.era===era.id});
      if(!techs.length)return;
      h+="<div style=\"font-size:.78rem;font-weight:700;color:var(--gold);margin:.5rem 0 .2rem\">\u2606 "+E(era.name)+"</div>";
      techs.forEach(function(tech){
        var isRes=!!rd[tech.id];
        var isActive=res.techId===tech.id;
        // 检查前置是否满足
        var canResearch=!isRes&&tech.req.every(function(r){return!!rd[r]});
        var cls="g-tech-item"+(isRes?" researched":"")+(isActive?" active":"");
        h+="<div class=\""+cls+"\" data-tid=\""+tech.id+"\">";
        h+="<div><div style=\"font-weight:600\">"+E(tech.name)+(isRes?" \u2713":"")+"</div><div style=\"font-size:.72rem;color:var(--tx3)\">"+E(tech.desc||"")+" | \u8D39"+tech.cost+"</div></div>";
        if(canResearch&&!isActive)h+="<button class=\"b bxs bp tech-sel\" data-tid=\""+tech.id+"\">\u7814\u7A76</button>";
        h+="</div>";
      });
    });

    body.innerHTML=h;

    // 绑定研究按钮
    var btns=body.querySelectorAll(".tech-sel");
    for(var i=0;i<btns.length;i++){
      btns[i].addEventListener("click",function(e){
        e.stopPropagation();
        var tid=this.dataset.tid;
        self.researching[self.fid]={techId:tid,progress:0};
        notify("\u5F00\u59CB\u7814\u7A76\u79D1\u6280","ok");
        self.renderTechPanel();
      });
    }
  },

  // === 法律面板 ===
  renderLawPanel:function(){
    var self=this;
    var body=Q("gLawBody");
    var al=this.activeLaws[this.fid]||{};
    var rd=this.researched[this.fid]||{};

    var h="<div style=\"font-size:.8rem;color:var(--tx3);margin-bottom:.5rem\">\u70B9\u51FB\u5207\u6362\u6CD5\u5F8B\uFF08\u9700\u8981\u5BF9\u5E94\u79D1\u6280\uFF09</div>";
    var myLaws=this.getFactionLaws(this.fid);
    var myTechs=this.getFactionTechs(this.fid);
    LAW_CATS.forEach(function(cat){
      var laws=myLaws[cat.id];
      if(!laws||!laws.length)return;
      h+="<div class=\"g-law-cat\"><div class=\"g-law-cat-title\">"+cat.ico+" "+E(cat.name)+"</div>";
      laws.forEach(function(law,idx){
        var isActive=al[cat.id]===idx;
        var locked=false;
        var lockReason="";
        // 检查科技需求
        if(law.reqTech){
          if(!rd[law.reqTech]){
            locked=true;
            var reqT=myTechs.find(function(t){return t.id===law.reqTech});
            lockReason="\u9700\u8981\u79D1\u6280: "+(reqT?reqT.name:law.reqTech);
          }
        }
        var fxStr=Object.keys(law.fx||{}).map(function(k){return k+":"+((law.fx[k]>0?"+":"")+law.fx[k])+"%"}).join(" ");
        if(locked){
          h+="<div class=\"g-law-opt locked\" style=\"opacity:.4;cursor:not-allowed\" title=\""+E(lockReason)+"\"><span>\uD83D\uDD12 "+E(law.name)+"</span><span class=\"g-law-fx\">"+E(lockReason)+"</span></div>";
        }else{
          h+="<div class=\"g-law-opt"+(isActive?" active":"")+"\" data-cat=\""+cat.id+"\" data-idx=\""+idx+"\"><span>"+E(law.name)+"</span><span class=\"g-law-fx\">"+fxStr+"</span></div>";
        }
      });
      h+="</div>";
    });
    body.innerHTML=h;

    // 绑定切换（跳过locked）
    var opts=body.querySelectorAll(".g-law-opt:not(.locked)");
    for(var i=0;i<opts.length;i++){
      opts[i].addEventListener("click",function(){
        var catId=this.dataset.cat;
        var idx=parseInt(this.dataset.idx);
        if(!catId||isNaN(idx))return;
        if(!self.activeLaws[self.fid])self.activeLaws[self.fid]={};
        self.activeLaws[self.fid][catId]=idx;
        var fLaws=self.getFactionLaws(self.fid);
        var law=(fLaws[catId]||[])[idx];
        notify("\u6CD5\u5F8B\u5207\u6362: "+law.name,"info");
        self.renderLawPanel();
        self.updateHUD();
      });
    }
  },

  // === 外交面板 ===
  renderDiploPanel:function(){
    var self=this;
    var body=Q("gDiploBody");

    var h="<div style=\"font-size:.8rem;color:var(--tx3);margin-bottom:.5rem\">\u5916\u4EA4\u5173\u7CFB</div>";
    this.sc.factions.forEach(function(f){
      if(f.id===self.fid)return;
      var atWar=self.isAtWar(self.fid,f.id);
      h+="<div class=\"g-diplo-item\"><div><span class=\"fc\" style=\"background:"+f.col+"\"></span>"+E(f.name);
      if(atWar)h+=" <span class=\"tg tg-red\">\u6218\u4E89</span>";
      else h+=" <span class=\"tg tg-green\">\u548C\u5E73</span>";
      // 城池数和军力
      var cities=self.sc.cities.filter(function(c){return c.fid===f.id}).length;
      var mil=0;self.armies.forEach(function(a){if(a.fid===f.id)a.units.forEach(function(u){mil+=u.count})});
      h+="<div style=\"font-size:.72rem;color:var(--tx3)\">"+cities+"\u57CE | "+F(mil)+"\u5175 | \u91D1"+F(Math.round(f.gold))+"</div>";
      h+="</div><div>";
      if(atWar){
        h+="<button class=\"b bsm bs diplo-peace\" data-fid=\""+f.id+"\">\u6C42\u548C</button>";
      }else{
        h+="<button class=\"b bsm bd diplo-war\" data-fid=\""+f.id+"\">\u5BA3\u6218</button>";
      }
      h+="</div></div>";
    });
    body.innerHTML=h;

    // 绑定
    var warBtns=body.querySelectorAll(".diplo-war");
    for(var i=0;i<warBtns.length;i++){
      warBtns[i].addEventListener("click",function(){
        var fid=this.dataset.fid;
        var fac=self.sc.factions.find(function(f){return f.id===fid});
        if(!confirm("\u786E\u5B9A\u5411 "+(fac?fac.name:"")+"\u5BA3\u6218\uFF1F\u8FD9\u5C06\u65E0\u6CD5\u64A4\u56DE\uFF01"))return;
        self.declareWar(fid);
        self.renderDiploPanel();
      });
    }
    var peaceBtns=body.querySelectorAll(".diplo-peace");
    for(var j=0;j<peaceBtns.length;j++){
      peaceBtns[j].addEventListener("click",function(){
        var fid=this.dataset.fid;
        self.makePeace(fid);
        self.renderDiploPanel();
      });
    }
  },

// --- 15-game-ai.js ---
  // ===== game-ai.js — AI系统：自动招兵/经济/宣战/攻城/剿匪 =====

  aiTick:function(){
    var self=this;
    this.sc.factions.forEach(function(f){
      if(f.id===self.fid)return; // 跳过玩家

      // AI自动选择研究
      var res=self.researching[f.id];
      if(res&&!res.techId){
        var rd=self.researched[f.id]||{};
        var available=self.getFactionTechs(f.id).filter(function(t){
          return!rd[t.id]&&t.req.every(function(r){return!!rd[r]});
        });
        if(available.length){
          res.techId=available[Math.floor(Math.random()*available.length)].id;
          res.progress=0;
        }
      }

      // AI招兵(有钱时)
      if(f.gold>300&&Math.random()<0.3){
        var myCities=self.sc.cities.filter(function(c){return c.fid===f.id});
        if(myCities.length){
          var city=P(myCities);
          var cheapUnits=self.sc.units.filter(function(u){return u.tp!=="bandit"&&u.cost<=f.gold*0.3&&(u.cul==="\u901A\u7528"||true)});
          if(cheapUnits.length){
            var unit=P(cheapUnits);
            var count=Math.min(50,Math.floor(f.gold*0.15/unit.cost));
            if(count>0){
              f.gold-=unit.cost*count;
              var army=self.armies.find(function(a){return a.fid===f.id&&Math.hypot(a.x-city.x,a.y-city.y)<30&&!a.moving});
              if(!army){
                army={id:U(),fid:f.id,units:[],x:city.x,y:city.y+15,targetX:0,targetY:0,moving:false};
                self.armies.push(army);
              }
              var eu=army.units.find(function(x){return x.uid===unit.id});
              if(eu)eu.count+=count;else army.units.push({uid:unit.id,count:count});
            }
          }
        }
      }

      // AI宣战（实力比较）
      if(Math.random()<0.05){
        var myStr=self.getAIFactionStrength(f.id);
        self.sc.factions.forEach(function(target){
          if(target.id===f.id)return;
          if(self.isAtWar(f.id,target.id))return;
          var tStr=self.getAIFactionStrength(target.id);
          // 只在明显优势时宣战
          if(myStr>tStr*1.5&&Math.random()<0.2){
            self.wars.push({a:f.id,b:target.id});
            if(target.id===self.fid){
              var facName=f.name||"\u672A\u77E5";
              notify(facName+" \u5411\u6211\u4EEC\u5BA3\u6218\uFF01","war");
            }
          }
        });
      }

      // AI求和（弱势时）
      if(Math.random()<0.08){
        self.wars.forEach(function(w){
          var enemyId=(w.a===f.id)?w.b:((w.b===f.id)?w.a:null);
          if(!enemyId)return;
          var myStr2=self.getAIFactionStrength(f.id);
          var eStr=self.getAIFactionStrength(enemyId);
          if(myStr2<eStr*0.4&&Math.random()<0.3){
            // AI求和
            self.wars=self.wars.filter(function(ww){
              return!((ww.a===f.id&&ww.b===enemyId)||(ww.a===enemyId&&ww.b===f.id));
            });
            if(enemyId===self.fid){
              notify(f.name+" \u8BF7\u6C42\u8BAE\u548C\uFF0C\u5DF2\u63A5\u53D7","ok");
            }
          }
        });
      }

      // AI军队移动：攻击敌方城池
      self.armies.forEach(function(a){
        if(a.fid!==f.id||a.moving)return;
        var total=self.getArmyTotal(a);
        if(total<10)return;

        // 寻找可攻击的敌方城池
        var targets=self.sc.cities.filter(function(c){
          return c.fid!==f.id&&self.isAtWar(f.id,c.fid);
        });
        // 或者无主城池
        var neutral=self.sc.cities.filter(function(c){return!c.fid});
        targets=targets.concat(neutral);

        if(targets.length&&Math.random()<0.4){
          // 选最近的
          var best=null,bestDist=Infinity;
          targets.forEach(function(c){
            var d=Math.hypot(c.x-a.x,c.y-a.y);
            if(d<bestDist){bestDist=d;best=c}
          });
          if(best){
            a.targetX=best.x;a.targetY=best.y;a.moving=true;
          }
        }
      });

      // AI剿匪
      if(Math.random()<0.1){
        self.armies.forEach(function(a){
          if(a.fid!==f.id||a.moving)return;
          var total=self.getArmyTotal(a);
          if(total<20)return;
          // 寻找附近匪寇
          var nearBandit=null,nearDist=200;
          self.sc.bandits.forEach(function(b){
            if(b.n<=0)return;
            var d=Math.hypot(b.x-a.x,b.y-a.y);
            if(d<nearDist){nearDist=d;nearBandit=b}
          });
          if(nearBandit){
            a.targetX=nearBandit.x;a.targetY=nearBandit.y;a.moving=true;
          }
        });
      }

      // 匪寇与军队碰撞检测
      self.armies.forEach(function(a){
        self.sc.bandits.forEach(function(b){
          if(b.n<=0)return;
          if(Math.hypot(a.x-b.x,a.y-b.y)>25)return;
          // 战斗
          var armyStr=0;
          a.units.forEach(function(u){
            var unit=self.sc.units.find(function(x){return x.id===u.uid});
            if(unit)armyStr+=unit.atk*u.count;
          });
          var banditStr=b.atk*b.n;
          if(armyStr>banditStr*0.5){
            var losses=Math.round(self.getArmyTotal(a)*0.05);
            self.applyDamage(a,losses);
            b.n=Math.max(0,b.n-Math.round(b.n*0.6));
            if(a.fid===self.fid){
              notify("\u6211\u519B\u4E0E "+b.name+" \u4EA4\u6218\uFF01","war");
            }
          }else{
            var losses2=Math.round(self.getArmyTotal(a)*0.15);
            self.applyDamage(a,losses2);
            b.n=Math.max(0,b.n-Math.round(b.n*0.2));
          }
        });
      });
    });
  },

  getAIFactionStrength:function(fid){
    var self=this;
    var str=0;
    this.sc.cities.forEach(function(c){if(c.fid===fid)str+=c.pop/100+c.def});
    this.armies.forEach(function(a){
      if(a.fid===fid){
        a.units.forEach(function(u){
          var unit=self.sc.units.find(function(x){return x.id===u.uid});
          if(unit)str+=unit.atk*u.count;
        });
      }
    });
    return str;
  },

// --- 16-game-boot.js ---
  // ===== game-boot.js — 游戏启动流程/存档管理 =====
  _placeholder:true
};

// Expose GAME
window.GAME=GAME;


})();
</script>
